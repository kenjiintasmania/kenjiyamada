<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#4f7cff" />
<title>単語アプリ｜基本編＆拡張編</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div id="app">
  <!-- ヘッダー -->
  <header id="topbar" class="hidden">
    <button id="backBtn" class="icon-btn" aria-label="もどる">‹</button>
    <a class="totop" href="../index.html" aria-label="3つのアプリのトップへもどる">トップ</a>
    <div id="topTitle">単語アプリ</div>
    <button id="topRight" class="icon-btn" aria-label="メニュー">⚙</button>
  </header>

  <!-- ① ホーム：モード選択 -->
  <section id="screen-home" class="screen">
    <a class="totop home" href="../index.html">← トップ（3つのアプリ）</a>
    <div class="hero">
      <h1>単語アプリ</h1>
      <p class="sub">基本編は先生の単語集／拡張編は NEW HORIZON。<br>ぜんぶで <strong id="totalWords">2000</strong> 語。</p>
    </div>
    <div class="mode-cards">
      <button class="mode-card basic" data-mode="b">
        <span class="mode-emoji">📕</span>
        <span class="mode-name">基本編</span>
        <span class="mode-desc">先生の単語集（品詞ごと）</span>
        <span class="mode-prog"><span class="bar"><i></i></span><em></em></span>
      </button>
      <button class="mode-card ext" data-mode="e">
        <span class="mode-emoji">📗</span>
        <span class="mode-name">拡張編</span>
        <span class="mode-desc">NEW HORIZON データベース</span>
        <span class="mode-prog"><span class="bar"><i></i></span><em></em></span>
      </button>
    </div>
    <div class="home-foot">
      <button id="settingsBtn" class="text-btn">⚙ 設定</button>
      <button id="aboutBtn" class="text-btn">？ このアプリについて</button>
    </div>
  </section>

  <!-- ② カテゴリ選択（品詞ごと） -->
  <section id="screen-cats" class="screen hidden">
    <div class="cat-head">
      <h2 id="catModeTitle">基本編</h2>
      <div id="catModeProg" class="modeprog"></div>
    </div>
    <div class="special-row">
      <button class="special-tile shuffle" data-special="shuffle">
        <span class="st-emoji">🔀</span><span class="st-name">ぜんぶシャッフル</span>
        <span class="st-sub">全品詞からランダム出題</span>
      </button>
      <button class="special-tile retry" data-special="retry">
        <span class="st-emoji">🔄</span><span class="st-name">再挑戦</span>
        <span class="st-sub">クリア済みを復習</span>
      </button>
    </div>
    <h3 class="section-label">品詞ごとに挑戦</h3>
    <div id="catList" class="cat-list"></div>
  </section>

  <!-- ③ 学習（カード） -->
  <section id="screen-study" class="screen hidden">
    <div class="study-top">
      <div id="studyTitle" class="study-title"></div>
      <div class="study-progress">
        <span class="bar big"><i id="studyBar"></i></span>
        <span id="studyCount" class="count"></span>
      </div>
    </div>

    <div id="card" class="card quiz" tabindex="-1">
      <div id="retryBadge" class="retry-badge hidden">🔄 再挑戦単語</div>
      <div class="card-pos" id="cardPos"></div>
      <div class="card-front jp" id="cardFront"></div>
      <div id="feedback" class="feedback hidden"></div>
      <button id="speakBtn" class="speak-btn hidden" aria-label="音声">🔊</button>
    </div>

    <div class="answer-row">
      <input id="answerInput" class="answer-input" type="text" inputmode="latin"
             autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false"
             enterkeyhint="done" placeholder="英語を入力" />
    </div>

    <div id="inputActions" class="actions">
      <button id="submitBtn" class="btn show">答え合わせ</button>
    </div>
    <div id="nextActions" class="actions hidden">
      <button id="nextBtn" class="btn clear">次へ ›</button>
    </div>
  </section>

  <!-- ④ 完了 -->
  <section id="screen-done" class="screen hidden">
    <div class="done-box">
      <div class="done-emoji">🎉</div>
      <h2>おつかれさま！</h2>
      <p id="doneSummary" class="done-summary"></p>
      <div class="done-actions">
        <button id="doneAgainBtn" class="btn clear">もう一周する</button>
        <button id="doneBackBtn" class="btn show">カテゴリにもどる</button>
      </div>
    </div>
  </section>
</div>

<!-- 設定モーダル -->
<div id="modal" class="modal hidden">
  <div class="modal-box">
    <button id="modalClose" class="modal-close" aria-label="閉じる">×</button>
    <div id="modalBody"></div>
  </div>
</div>

<script src="data/words.js"></script>
<script src="js/app.js"></script>
</body>
</html>
