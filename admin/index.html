<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#324a86">
<title>先生用 管理ページ｜単元テスト</title>
<style>
  :root{--ink:#26303f;--paper:#f7f9fc;--line:#dbe2ee;--brand:#324a86;--brand2:#3f73c4;
    --ok:#2e9e57;--okbg:#e3f6e8;--lock:#d9603e;--lockbg:#fde7e1;}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--paper);color:var(--ink);
    font-family:'游ゴシック','Yu Gothic',sans-serif;line-height:1.6;padding:16px 14px 60px}
  .wrap{max-width:720px;margin:0 auto}
  .crumbs{font-size:13px;margin-bottom:10px}
  .crumbs a{color:var(--brand2);text-decoration:none;font-weight:bold}
  h1{font-size:22px;margin:4px 0}
  .sub{color:#6a7689;font-size:13px;margin-bottom:14px}
  .card{background:#fff;border:2px solid var(--line);border-radius:14px;padding:14px 16px;margin:12px 0;
    box-shadow:0 4px 0 #eef2f8}
  .pinrow{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .pinrow input{font:inherit;font-size:16px;padding:8px 10px;border:2px solid var(--line);
    border-radius:10px;width:160px}
  label.rm{font-size:13px;color:#6a7689;display:flex;align-items:center;gap:5px}
  .exam-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .exam-title{font-size:18px;font-weight:bold}
  .badge{font-weight:bold;font-size:13px;padding:4px 12px;border-radius:999px;white-space:nowrap}
  .badge.open{background:var(--okbg);color:var(--ok)}
  .badge.lock{background:var(--lockbg);color:var(--lock)}
  .badge.unknown{background:#eef0f4;color:#8a93a3}
  .meta{font-size:13px;color:#6a7689;margin:8px 0}
  .meta b{color:var(--ink);font-size:18px}
  .btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}
  button{font:inherit;font-size:16px;font-weight:bold;border:none;border-radius:11px;
    padding:11px 22px;cursor:pointer;color:#fff}
  .start{background:var(--ok);box-shadow:0 4px 0 #248049}
  .stop{background:var(--lock);box-shadow:0 4px 0 #b94e30}
  .start:active,.stop:active{transform:translateY(2px);box-shadow:none}
  button[disabled]{opacity:.45;box-shadow:none;cursor:default}
  .link{font-size:13px}.link a{color:var(--brand2)}
  #msg{font-size:13px;color:#6a7689;margin-top:6px;min-height:18px}
  #msg.ok{color:var(--ok)}#msg.err{color:var(--lock)}
  .note{font-size:12px;color:#9aa3b2;margin-top:18px;border-top:1px dashed var(--line);padding-top:10px}
  #serverNote{display:none}
  #serverNote.warn{border-color:#f0b4a0;background:#fff4f0;color:#b3441f;font-size:14px;line-height:1.7}
  #serverNote.okline{font-size:13px;color:var(--ok);padding:9px 14px}
</style>
</head>
<body>
<div class="wrap">
  <div class="crumbs"><a href="../index.html">← トップ（英語学習アプリ）</a></div>
  <h1>🛠 先生用 管理ページ</h1>
  <div class="sub">単元テストの受付を、授業中だけ「スタート」できます。生徒は受付中のみ受験・提出できます。</div>

  <div class="card">
    <div class="pinrow">
      <span style="font-weight:bold">合言葉(PIN)</span>
      <input id="pin" type="password" placeholder="先生の合言葉" autocomplete="off">
      <label class="rm"><input type="checkbox" id="remember"> この端末に記憶</label>
    </div>
    <div style="font-size:12px;color:#9aa3b2;margin-top:6px">※ GAS の TEACHER_PIN と同じ合言葉を入れてください。</div>
  </div>

  <div id="serverNote" class="card"></div>
  <div id="exams"></div>
  <div id="msg"></div>

  <div class="note">
    このページのアドレスは生徒に教えないでください（合言葉でも保護されています）。<br>
    スタート＝受付開始（新しいセッション）／ ストップ＝受付終了。状態は数秒ごとに自動更新します。
  </div>
</div>

<script>
(function(){
  var GAS_URL="https://script.google.com/macros/s/AKfycbySJy2-r6GcYvwOIeoJRb360TkV0uglWjRvPAxJM5WDgVjhsn-qOhBcqNRebOe3Qbgn-A/exec";
  // GAS の UNIT_EXAMS と同じ並び
  var EXAMS=[{id:"unit1", title:"中3 単元テスト①"}];

  var $=function(i){return document.getElementById(i);};
  var pin=$("pin"), remember=$("remember"), msg=$("msg");
  try{ var saved=localStorage.getItem("admin_pin"); if(saved){ pin.value=saved; remember.checked=true; } }catch(e){}
  function savePin(){ try{ if(remember.checked) localStorage.setItem("admin_pin",pin.value); else localStorage.removeItem("admin_pin"); }catch(e){} }
  pin.addEventListener("input",savePin); remember.addEventListener("change",savePin);

  function post(obj){
    return fetch(GAS_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},
      body:JSON.stringify(obj)}).then(function(r){return r.json();});
  }

  // 画面組み立て
  var box=$("exams"), cards={};
  EXAMS.forEach(function(ex){
    var c=document.createElement("div"); c.className="card";
    c.innerHTML=
      '<div class="exam-head"><span class="exam-title">'+ex.title+'</span>'+
        '<span class="badge unknown" data-r="badge">確認中…</span></div>'+
      '<div class="meta">提出した人数：<b data-r="subs">–</b> 人'+
        '<span data-r="sess" style="margin-left:10px"></span></div>'+
      '<div class="btns">'+
        '<button class="start" data-r="start">▶ スタート</button>'+
        '<button class="stop" data-r="stop">■ ストップ</button></div>'+
      '<div class="link" style="margin-top:8px"><a href="../mogi/exam.html?id='+ex.id+'" target="_blank">テスト画面を開く（生徒用）↗</a></div>';
    box.appendChild(c);
    var refs={badge:c.querySelector('[data-r=badge]'),subs:c.querySelector('[data-r=subs]'),
      sess:c.querySelector('[data-r=sess]'),start:c.querySelector('[data-r=start]'),stop:c.querySelector('[data-r=stop]')};
    cards[ex.id]=refs;
    refs.start.addEventListener("click",function(){ setGate(ex,true); });
    refs.stop.addEventListener("click",function(){ setGate(ex,false); });
  });

  function paint(ex, st){
    var r=cards[ex.id]; if(!r) return;
    if(st && st.result==="ok"){
      if(st.open){ r.badge.textContent="✅ 受付中"; r.badge.className="badge open"; }
      else{ r.badge.textContent="🔒 ロック中"; r.badge.className="badge lock"; }
      r.subs.textContent=(st.submissions!=null?st.submissions:0);
      r.sess.textContent=st.session?("セッション："+st.session):"";
      r.start.disabled=!!st.open; r.stop.disabled=!st.open;
    }else{
      r.badge.textContent="？ 取得できません"; r.badge.className="badge unknown";
    }
  }

  // サーバー（GAS）が新版かどうかを ver で判定して表示
  var STALE='⚠️ <b>サーバー（GAS）が古いコードのままです。</b><br>'+
    'Apps Scriptで〔デプロイ〕→〔デプロイを管理〕→ ✏️（編集）→ バージョン「新バージョン」→〔デプロイ〕してください。'+
    '<br>これを直すまで、スタートを押してもロックは解除されません。';
  function updateServerNote(st){
    var el=document.getElementById("serverNote");
    if(st && st.result==="ok" && !st.ver){ el.style.display=""; el.className="card warn"; el.innerHTML=STALE; }
    else if(st && st.ver){ el.style.display=""; el.className="card okline"; el.textContent="サーバー："+st.ver+" ✓（最新）"; }
  }

  function setGate(ex, open){
    if(!pin.value.trim()){ msg.className="err"; msg.textContent="合言葉(PIN)を入れてください。"; return; }
    msg.className=""; msg.textContent=(open?"スタートしています…":"ストップしています…");
    post({action:"gate", pin:pin.value.trim(), exam:ex.id, open:open}).then(function(res){
      updateServerNote(res);
      if(res && res.result==="ok" && !res.ver){
        msg.className="err"; msg.textContent="サーバーが旧バージョンのため反映できません。上の案内のとおり再デプロイしてください。";
      }else if(res && res.result==="ok" && (open ? res.open===true : true)){
        msg.className="ok"; msg.textContent=(open?"受付を開始しました ▶（新しいセッション）":"受付を終了しました ■");
        pollOne(ex);
      }else{
        msg.className="err"; msg.textContent="できませんでした："+((res&&res.message)||"不明なエラー");
      }
    }).catch(function(){ msg.className="err"; msg.textContent="通信エラー。電波を確認してね。"; });
  }
  function pollOne(ex){ post({action:"status", exam:ex.id}).then(function(st){ updateServerNote(st); paint(ex,st); }).catch(function(){}); }
  function pollAll(){ EXAMS.forEach(pollOne); }
  pollAll(); setInterval(pollAll, 5000);
})();
</script>
</body>
</html>
