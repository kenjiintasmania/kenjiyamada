<p class="chname">双魚宮</p>
<h2 class="pnum">1260</h2>

<p>　流氷の真下のキューブ状の空間にいる。</p>
<p>　やはり流氷は巨大な氷山か氷塊だったようで、広いキューブ状の氷の部屋の四方にも隣のキューブに進むための通用門がくり抜かれていた。</p>
<ul class="choices">
  <li>東に進むなら<a href="p1262.xhtml">１２６２</a>へ進む。</li>
  <li>西に進むなら<a href="p1264.xhtml">１２６４</a>へ進む。</li>
  <li>南に進むなら<a href="p1266.xhtml">１２６６</a>へ進む。</li>
  <li>北に進むなら<a href="p1268.xhtml">１２６８</a>へ進む。</li>
</ul>
