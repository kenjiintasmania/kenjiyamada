<p class="chname">宝瓶宮</p>
<h2 class="pnum">450</h2>

<p>　東西２ブロックの部屋にいる。東壁には２ブロック上に登るはしごが設置されており、西壁には何やら不思議な装置がついている。</p>
<p>　装置は縦横３マスずつの隙間に、１～９の数字の付いた石柱が突き刺さっており、そばのプレートに『所定の数を引くべし』と書いてある。</p>
<ul class="choices">
  <li>どうすべきか分かるなら、ここのパラグラフ番号（<a href="p450.xhtml">４５０</a>）から『所定の数』を引いたパラグラフへ進め。</li>
  <li>分からないなら、この先へは進めない。東のはしごからドドドという音の聞こえ始めた上階に戻ること。<a href="p447.xhtml">４４７</a>へ進め。</li>
</ul>
