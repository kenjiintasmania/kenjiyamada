<p class="chname">双児宮</p>
<h2 class="pnum">939</h2>

<p>　南北２ブロックの通路の北側にいる。</p>
<p>　南には通路があり、東には向日葵をあしらった装飾の扉が、西には蛍をあしらった扉がある。向日葵の扉にはノースヤードと、蛍の扉にはウエストヤードとゾディアック文字で書かれている。</p>
<ul class="choices">
  <li>北に進むなら<a href="p000.xhtml">９２９</a>へ進む。</li>
  <li>東の扉に入るなら<a href="p999.xhtml">９９９</a>へ進む。</li>
  <li>西の扉に入るなら<a href="p990.xhtml">９９０</a>へ進む。</li>
  <li>・・・・・・・・・・・・・・</li>
</ul>
