<p class="chname">マクロの街２</p>
<h2 class="pname">波打ち際</h2>

<p>寄せては返す波は、黒く濁っている。気がつくと背後に巫女リオネが立っていた。</p>
<p>「金龍が殺されてからというもの、闇色の雨が降り続き、翠玉のようだった海の色も今は真っ黒になってしまいました……金龍の力を取り戻すためにも十二群島を解放し、魔法書を取り戻して下さい。すべての魔法書を解読すれば、あるいはゾディアック群島の人々が希望を取り戻せるなら、再び金龍の力が戻るかもしれません」</p>
<ul class="choices">
  <li><a href="macro2-01.xhtml">呪門</a>に戻る</li>
</ul>
