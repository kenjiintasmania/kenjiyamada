<p class="chname">巨蟹宮</p>
<h2 class="pnum">644</h2>

<p>　１×１ブロックの小部屋にいる。天井と床にゲートがある。下よりも上の方が揺れている気がするのは、ここが腕の付け根だからだろうか。</p>
<ul class="choices">
  <li>上の部屋に飛び上がるなら<a href="p642.xhtml">６４２</a>へ進む。</li>
  <li>下の部屋まで落ちるなら<a href="p648.xhtml">６４８</a>へ進む。</li>
</ul>
