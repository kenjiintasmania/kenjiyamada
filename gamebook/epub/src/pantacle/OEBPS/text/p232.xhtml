<p class="chname">獅子宮</p>
<h2 class="pnum">232</h2>

<p>　心臓の彫り物を差し込むと、ゴトンと音がした。</p>
<p>『神の数を数えよ』</p>
<p>　声ならぬ音がした気がした。神の数を知っているなら、その数だけここにとどまってみてもよい。</p>
<ul class="choices">
  <li>その場合は、今いるパラグラフ番号（<a href="p232.xhtml">２３２</a>）に神の数を足したパラグラフへ進め</li>
  <li>知らないなら、該当するパラグラフが出てくるまで無闇矢鱈とページをめくってもよい</li>
  <li>諦めて引き返すなら<a href="p251.xhtml">２５１</a>へ進む。</li>
</ul>

</section>
