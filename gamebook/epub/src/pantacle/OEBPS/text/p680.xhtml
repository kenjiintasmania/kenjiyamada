<p class="chname">巨蟹宮</p>
<h2 class="pnum">680</h2>

<p>　ぼくは巨蟹宮の瓦礫の前にいる。島の砂浜を、巨大なカニの姿をした迷宮が走り回っている。右手の方が大きいシオマネキ型の迷宮は、中くらいの砂丘で左手をついて一休みしたあと、一番大きな砂丘で大きな右手をひと掻きし、そのあと海へと猛ダッシュして押し寄せる波へとヘッドスライディングし、また再び中くらいの砂丘へと戻るルーティンを繰り返している。</p>
<ul class="choices">
  <li>中くらいの砂丘から左手に飛び移るなら<a href="p630.xhtml">６３０</a>へ進む。</li>
  <li>今いる高い砂丘から右手に飛び移るなら<a href="p640.xhtml">６４０</a>へ進む。</li>
  <li>波へとスライディングした瞬間に胴体にしがみつくなら<a href="p650.xhtml">６５０</a>へ進む。</li>
  <li><a href="p001.xhtml">オフィユカス島の【呪門】</a>へ戻る</li>
</ul>

</section>
