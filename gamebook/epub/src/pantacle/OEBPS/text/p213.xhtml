<p class="chname">獅子宮</p>
<h2 class="pnum">213</h2>

<p>　２匹の獅子が引く戦車――チャリオットの上に立つ女性の姿はむしろ雄々しく描かれている。レリーフの下部には『無数の従者を連れ従える強く美しきキュベレー様』と碑銘が刻まれていた。この女性が女神なのか実在の女性なのかはわからないが、崇拝の対象となっているようだ。</p>
<p>　ぼくは入口へと通路を戻った。</p>
<ul class="choices">
  <li><a href="p270.xhtml">２７０</a>へ進む。</li>
