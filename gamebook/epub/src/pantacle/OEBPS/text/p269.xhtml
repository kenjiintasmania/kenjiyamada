<p class="chname">獅子宮</p>
<h2 class="pnum">269</h2>

<p>　薄暗いのでかなり近づかないと読めなかったが、近くによって見ると、何ということはない。壁には『押してもダメなら引いてみな』という言葉が書かれているだけだた。</p>
<p>――はいはい。もう立ち去りますよ。</p>
<p>　ひとこと愚痴ってぼくは部屋を出た。</p>
