<p class="chname">獅子宮</p>
<h2 class="pnum">223</h2>

<p>　卓には走り書きしたメモの紙切れが残っていた。</p>
<p>『彼は私のいない間に来て食い物をつまみ食いしているようだ。絶対に許さない。次に彼がやって来たら藁山に隠れておいて、彼が食べている隙にスキの攻撃をプレゼントしてやる。食い物にされる気持ちを味わったらよいのだ』</p>
<p>　怒りの伝わってくる文面だった。自分の決意を書き残したのだろうか。</p>
<ul class="choices">
  <li>北の扉に入る<a href="p235.xhtml">２３５</a>ならへ進む。</li>
  <li>南の扉から出るなら<a href="p270.xhtml">２７０</a>へ進む。</li>
</ul>
