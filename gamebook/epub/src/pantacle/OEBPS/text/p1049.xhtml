<p class="chname">処女宮</p>
<h2 class="pnum">1049</h2>

<p>　行き止まりだった。</p>
<p>　疲れてきたときの袋小路は精神的被害が大きくぼくは痛く凹んでいたが隣の不死戦士は人の感情まで亡くしてしまったのか労ろうともしないことに何か一言いってやろうかと思ったが口に出す労力さえも無意義に感じられたぼくはただただ口を貝のように紡いだ。</p>
<ul class="choices">
  <li>通路は北（<a href="p1048.xhtml">一〇四八</a>）にだけ続いている。</li>
</ul>
