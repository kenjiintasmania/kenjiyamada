<p class="chname">双児宮</p>
<h2 class="pnum">911ーＢ</h2>

<p>　１ブロック進んだところで、ふとぼくは立ち止まった。</p>
<p>「はて。こんな長い道だったかしら」</p>
<p>　通路が暗いせいか、どこまで続いているかはよくわからない。</p>
<ul class="choices">
  <li>先へ進むなら<a href="p918b.xhtml">９１８</a>へ進む。</li>
  <li>後ろへ１ブロック進むならへ<a href="p914b.xhtml">９１４</a>進む。</li>
</ul>

</section>
