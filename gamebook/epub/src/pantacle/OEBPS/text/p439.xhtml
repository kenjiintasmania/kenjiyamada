<p class="chname">宝瓶宮</p>
<h2 class="pnum">439</h2>

<p>　勢いよくレバーを引くと、階下でゴトトンと音がした。</p>
<p>　気になって部屋の中央まで戻って下をのぞき込むと、上下２ブロック×東西３ブロックの空間の西寄りに設置されていた２×２ブロックサイズの巨大水車が、ゆっくりと東寄りへと位置を変えつつあった。</p>
<ul class="choices">
  <li>すぐに水車の上へと身を躍らせるなら<a href="p435.xhtml">４３５</a>へ進め。</li>
  <li>水車が移動しきってから飛び乗るなら<a href="p445.xhtml">４４５</a>へ進め。</li>
  <li>どうするかしばし逡巡するなら<a href="p441.xhtml">４４１</a>へ進め。</li>
</ul>

</section>
