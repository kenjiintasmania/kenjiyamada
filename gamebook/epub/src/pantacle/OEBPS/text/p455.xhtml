<p class="chname">宝瓶宮</p>
<h2 class="pnum">455</h2>

<p>　東西７ブロックの通路の中央にいる。</p>
<p>　見上げると大きな空洞が上へとつながっている。獅四肢で軽く跳躍してみると、大きな水瓶があり、今は真下ではなくどこかの地下へと迷宮内の水を送り込んでいるのが見えた。ぼくが先ほど巫女の予備キーで流れる方向を変更した水瓶の真下が、ここというわけだ。</p>
<ul class="choices">
  <li>通路を東端まで行くなら<a href="p461.xhtml">４６１</a>へ進む。</li>
  <li>通路を西端まで行くなら<a href="p481.xhtml">４８１</a>へ進む。</li>
</ul>

</section>
