<p class="chname">人馬宮</p>
<h2 class="pnum">1184</h2>

<p>　ぼくは足を踏み出したが、そこに段はなく、ぼくは足を踏み外した。</p>
<p>　「痛っ」ぼくは硬い床に落ちて、斜めに足をついてしまった。「いたたたた」</p>
<p>　どうやら、軽く足を痛めたようだ。龍尾を使うまでもないが、気になる……という微妙なラインだ。</p>
<ul class="choices">
  <li>あらためて階段を左足から踏み出すなら<a href="p1186.xhtml">１１８６</a>へ進む。</li>
  <li>南東の扉を抜けるなら<a href="p1175.xhtml">１１７５</a>へ進む。</li>
  <li>南西の扉を抜けるなら<a href="p1177.xhtml">１１７７</a>へ進む。</li>
</ul>
