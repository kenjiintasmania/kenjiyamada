<p class="chname">巨蟹宮</p>
<h2 class="pnum">665</h2>

<p>　カニさんが腹這いになってるのをいいことに、ぼくは前方へと流動体をかき分け進む。</p>
<p>――よし！</p>
<p>　やっとブロック進めたと思ったところで、カニさんが立ち上がった。砂丘方面へと移動するために。</p>
<p>――しまった！</p>
<p>　ぼくは狂乱する子ガニの群れに頭から突っ込んだ。ぼくは連中の栄養素となるのだろうか。</p>
<ul class="choices">
  <li><a href="p608.xhtml">６０８</a>へ進め。</li>
