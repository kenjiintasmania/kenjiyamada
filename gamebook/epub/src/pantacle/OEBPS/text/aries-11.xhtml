<section id="aries-11" class="paragraph">
<p class="chname">白羊宮</p>
<h2 class="pname">上空の風</h2>

<p>　上空の風に乗ると、この夢のような空間の全景が見渡せた。<a href="aries-13.xhtml">【山岳】</a>から<a href="aries-15.xhtml">【白滝】</a>を抜けて<a href="aries-03.xhtml">【草原】</a>へ。そして<a href="aries-17.xhtml">【海岸】</a>から<a href="aries-09.xhtml">【深海】</a>へ。自分以外にはヒツジくらいしか動くものが見えなかったが、山岳の裏手にも何かがいる気配がした。</p>
