<p class="chname">巨蟹宮</p>
<h2 class="pnum">648</h2>

<p>　１×１ブロックの部屋にいる。天井にしかゲートはなく、落とし穴の底のような行き止まりとなっている。獅四肢でジャンプして、上の部屋に行くしか道はなさそうだ。床にはくすんだ染みがところどころに見られる。</p>
<p>――過去の犠牲者かな？</p>
<p>　ぼくは龍尾の術に感謝した。</p>
<ul class="choices">
  <li>上の部屋へ飛び上がり、<a href="p644.xhtml">６４４</a>へ進む。</li>
</ul>

</section>
