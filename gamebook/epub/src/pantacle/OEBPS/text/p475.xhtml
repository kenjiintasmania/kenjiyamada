<p class="chname">宝瓶宮</p>
<h2 class="pnum">475</h2>

<p>「ふーむ」</p>
<p>　ぼくは文字通り首をひねって考えた。</p>
<p>　壁画の一番上、天井に接した部分に小さな穴が空いていることを考えると、壁画のすき間に水が流れ込むことで壁画の一部分が浮き上がって見えるようになっているのかもしれない。だが今は、水は一滴たりとも流れてこない。</p>
<p>「屋上の水瓶を止めちゃったせいかな？」</p>
<p>　もしぼくに多少なりとも絵画の才能、あるいは図形認識能力があるなら、何かが見えるかもしれない。もし読み取れたら、それを覚えておくこと。</p>
<ul class="choices">
  <li>何か閃いたなら部屋を<a href="p414.xhtml">４１４</a>へ戻れ。</li>
  <li>もう少しヒントを探すなら<a href="p480.xhtml">４８０</a>へ進む。</li>
</ul>
