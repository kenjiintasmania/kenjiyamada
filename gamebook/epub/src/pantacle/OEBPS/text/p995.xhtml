<p class="chname">双児宮</p>
<h2 class="pnum">995</h2>

<p>　ゾディアック群島の太陽光が十分ではないとはいえ、昼ひなかから花を咲かせるということはないようだ。ただの草が風に揺れているその茂みの中に、風雨にさらされて汚れきったぬいぐるみを見つけた。手作りなのだろう。所々にアラが見られる。</p>
<p>「クマのぬいぐるみでしょうか」</p>
<p>　しかし、その目と口はバッテンに縫い込まれている。</p>
<p>「猟奇的だなぁ」</p>
<p>　ぼくは苦笑した。</p>
<p>　他には特に目を引くものはない。</p>
<ul class="choices">
  <li>サウスヤードを出て<a href="p920.xhtml">９２０</a>へ進む。</li>
</ul>
