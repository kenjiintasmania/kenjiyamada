<p class="chname">天蝎宮</p>
<h2 class="pnum">330</h2>

<p>　東と西に扉があり、南には３ブロックの長さの通路が伸びている。通路はガタガタと揺れており、東の扉には『入るな危険』という張り紙がしてある。</p>
<ul class="choices">
  <li>あえて東の扉に入るなら<a href="p314.xhtml">３１４</a>へ進む。</li>
  <li>いったん西の扉に入るなら<a href="p327.xhtml">３２７</a>へ進む。</li>
  <li>とりあえず通路を南に進むなら<a href="p332.xhtml">３３２</a>へ進む。</li>
</ul>

</section>
