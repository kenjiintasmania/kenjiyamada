<p class="chname">天蝎宮</p>
<h2 class="pnum">390</h2>

<p>　ぼくは迷宮戦車クアドルアガの破壊に成功した。</p>
<p>――結局、御者のドルイドはどこにいたんだろう。</p>
<p>　迷宮戦車と運命を共にしたことだけは確かだ。ご愁傷さま。</p>
<p>　<strong>星読み表に３００</strong>を足すこと。</p>
<ul class="choices">
  <li><a href="p399.xhtml">３９９</a>へ進む。</li>
</ul>
