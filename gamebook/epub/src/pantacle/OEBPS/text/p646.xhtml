<p class="chname">巨蟹宮</p>
<h2 class="pnum">646</h2>

<p>　ひとブロック飛び降りたところで、迷宮が大きく揺れた。</p>
<p>「ぅわっ……と！」</p>
<p>　ぼくは自分でも驚くほどの声を上げた。飛び降りた先の部屋の床にもゲートがあって、連続してさらに落ちる羽目になったからだ。ぼくはさらに２ブロック下まで落下した。</p>
<p>「い……ってててて」</p>
<p>　片足がありえない方向に曲がっている。すぐさま龍尾の術を使って回復につとめる。死ななかっただけ感謝すべきだろう。</p>
<p>――カニさんが大きな砂丘から離れたのかな。</p>
<p>　２ブロックの落下で、これだ。それ以上落ちたら命はないかもしれない。気をつけて進もう。</p>
