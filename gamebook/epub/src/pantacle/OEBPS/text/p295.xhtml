<p class="chname">獅子宮</p>
<h2 class="pnum">295</h2>

<pre class="grid">■□■</pre>
<pre class="grid">□□■</pre>
<pre class="grid">■■■</pre>
<p>　第５層の西に位置する、３×３の合計９ブロックの大部屋にいる。北と西に進めるようになっているが、西側はピラミッドの外壁だ。足元にスイッチが設置されている。また西側の外壁には、何かで削られた跡がある。</p>
<ul class="choices">
  <li>北へ進むなら<a href="p293.xhtml">２９３</a>へ進む。</li>
  <li>スイッチを押すなら<a href="p286.xhtml">２８６</a>へ進む。</li>
  <li>西の外壁に近づいてみるなら<a href="p292.xhtml">２９２</a>へ進む。</li>
</ul>
