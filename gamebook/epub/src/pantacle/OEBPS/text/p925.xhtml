<p class="chname">双児宮</p>
<h2 class="pnum">925</h2>

<p>　Ｔ字路にいる。</p>
<p>　東西６ブロックの通路の東から２ブロックめで、南北７ブロックの通路の北端だ。</p>
<p>　西は３ブロック先で南へ、４ブロック先で北へ折れており、東は１ブロック先で北へ折れている。また南は７ブロック先の突き当りで東西に分かれている。</p>
<ul class="choices">
  <li>南に７ブロック進むなら<a href="p913.xhtml">９１３</a>へ進む。</li>
  <li>西に３ブロック進むなら<a href="p922.xhtml">９２２</a>へ進む。</li>
  <li>東に１ブロック進むなら<a href="p935.xhtml">９３５</a>へ進む。</li>
</ul>

</section>
