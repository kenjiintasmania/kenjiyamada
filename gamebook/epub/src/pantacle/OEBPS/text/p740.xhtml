<p class="chname">天秤宮</p>
<h2 class="pnum">740</h2>

<p>　ぼくは天秤宮の天秤を支える支柱の４階部分にいる。</p>
<p>　４階は東西７ブロックにわたって伸びており、それぞれ東西の端に上へ登るハシゴがついている。一方、足元にあったハシゴは、左右からせり出した床によって塞がれており、下に下りていくことはできない。</p>
<ul class="choices">
  <li>東端のハシゴを登るなら<a href="p743.xhtml">７４３</a>へ進む。</li>
  <li>西端のハシゴを登るなら<a href="p747.xhtml">７４７</a>へ進む。</li>
</ul>

</section>
