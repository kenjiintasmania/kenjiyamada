<p class="chname">巨蟹宮</p>
<h2 class="pnum">645</h2>

<p>　カニ型迷宮の右手の出入口にいる。正確に１×１ブロックの小部屋になっており、足元の床（カニ胴体側）に円形のゲートがある。迷宮の激しい揺れや、下側へ落下する衝撃を我慢すれば、そのゲートをくぐり抜けて階下の部屋へと行けるはずだ。また壁に細く開いた亀裂からは迷宮の外に出られる。</p>
<ul class="choices">
  <li>下へ進むなら<a href="p641.xhtml">６４１</a>へ進む。</li>
  <li>ハサミの付け根から帰還するなら<a href="p680.xhtml">６８０</a>へ進む。</li>
</ul>
