<p class="chname">宝瓶宮</p>
<h2 class="pnum">405</h2>

<p>　宮殿に平穏が戻っている。滝の中腹を見上げると、中央の水瓶が規則的に回転していた。助け出した巫女の話によると、きちんと調整された水瓶は水時計として機能しているらしく、中央の水瓶は１２秒ごとに、左の水瓶は１２分ごとに、右の水瓶は１２時間ごとに回転しているという。位置による滝の水量をうまく利用して、細かく時間を知ることができるようになっているという。魔法ではなく匠の技法だそうだ。</p>
<p>　星読み表の十の位が……</p>
<ul class="choices">
  <li>１か４か６か９なら<a href="p403.xhtml">４０３</a>へ進む。（雨石入手済み）</li>
  <li>それ以外なら<a href="p408.xhtml">４０８</a>へ進む。</li>
</ul>
