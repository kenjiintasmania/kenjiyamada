<section id="scorpio-23" class="paragraph">
<p class="chname">天蝎宮</p>
<h2 class="pname">V</h2>

<p>　毒尾の部屋の１ブロック南にいる。</p>
<p>　この状況からできることは多くない。</p>
<ul class="choices">
  <li>北に戻ってさらに北の壁を破るなら２カウント追加して<a href="scorpio-22.xhtml">U</a>へ</li>
  <li>北に戻って東側の壁を破るなら２カウント追加して<a href="scorpio-20.xhtml">S</a>へ</li>
  <li>東へ進むなら１カウント追加して<a href="scorpio-17.xhtml">P</a>へ</li>
  <li>カウントが２１以上になったら<a href="scorpio-27.xhtml">Z</a>へ</li>
  <li>行動の結果２１以上になる場合も<a href="scorpio-27.xhtml">Z</a>へ</li>
</ul>
