<p class="chname">獅子宮</p>
<h2 class="pnum">236</h2>

<p>　壁を念入りに調べると、壁の一部が押し込めるようになっていた。罠である可能性もあるが、罠なら見つけにくくする意味がない。</p>
<ul class="choices">
  <li>壁のスイッチを押してみるなら<a href="p238.xhtml">２３８</a>へ進め。</li>
  <li>自分は危うきに近寄らない君子だと思うなら<a href="p237.xhtml">２３７</a>へ戻れ。</li>
</ul>
