<p class="chname">パンタクル終盤</p>
<h2 class="pname">魔王との最終決戦</h2>

<p>無荒星を落として十三群島を滅ぼそうとする魔王vs無荒星に無荒星をぶつけて相殺しようとするメスロンの対決</p>
<p>空から降る星の軌道計算をして、衝突の早い順に潰していけば勝利</p>
<p>人の書（この時点では、まだ不老不死の術だと思われている）を使おうとした魔王から、直前に魔法書を奪って決着</p>
<p>「お祭りのクライマックスに真昼の流星なんてお洒落だね」</p>
<p>　事情を知らない異国の騎士が、笑いながら隣の女性に呟いた。</p>
