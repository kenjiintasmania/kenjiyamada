<p class="chname">双児宮</p>
<h2 class="pnum">937</h2>

<p>　南北２ブロックの通路の北側にいる。</p>
<p>　南には通路があり、東には薔薇をあしらった装飾の扉が、西には向日葵をあしらった扉がある。薔薇の扉にはイーストヤードと、向日葵の扉にはノースヤードとゾディアック文字で書かれている。</p>
<ul class="choices">
  <li>南に進むなら<a href="p935.xhtml">９３５</a>へ進む。</li>
  <li>東の扉に入るなら<a href="p970.xhtml">９７０</a>へ進む。</li>
  <li>西の扉に入るなら<a href="p975.xhtml">９７５</a>へ進む。</li>
</ul>

</section>
