<p class="chname">処女宮</p>
<h2 class="pnum">1005</h2>

<p>　再訪して驚いたのは、あの広大な迷宮が更地になっていたことだ。</p>
<p>　正確に言うと、迷宮の一階部分を土に埋めてしまい、その丘の上に唯一残ったガラス製のテラスを簡易の宮殿としたらしい。</p>
<p>「祭祀場に広さや豪奢さは必要ありませんから」</p>
<p>　ぼくは素直に感嘆した。</p>
<ul class="choices">
  <li><a href="p001.xhtml">オフィユカス島の【呪門】</a>へ戻る。</li>
</ul>
