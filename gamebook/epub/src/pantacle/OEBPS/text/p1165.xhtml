<p class="chname">人馬宮</p>
<h2 class="pnum">1165</h2>

<p>　柱だけの第４層を、風が吹き抜けている。</p>
<p>　ここは７つの正六角形からなるフロアの南東ブロックだ。床には２つの呪印が描かれている。</p>
<p>♏：天蝎宮の象形。その呪印に触れたのち、左中指を突き出せば、いかな巨人とて打ち倒す猛毒を差し入れるだろう。</p>
<p>♎：天秤宮の象形。その呪印に触れたのち、人差し指と中指を突き出すべし。相手に二択を突きつけた二択は、正と誤、真と偽、生と死となるだろう。</p>
<ul class="choices">
  <li>北のブロックへ向かうなら<a href="p1162.xhtml">１１６２</a>へ進む。</li>
  <li>北西のブロックへ向かうなら<a href="p1169.xhtml">１１６９</a>へ進む。</li>
  <li>西のブロックへ向かうなら<a href="p1163.xhtml">１１６３</a>へ進む。</li>
</ul>

</section>
