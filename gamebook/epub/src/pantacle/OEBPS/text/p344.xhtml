<p class="chname">天蝎宮</p>
<h2 class="pnum">344</h2>

<p>　ぼくは東西２ブロック×南北１ブロックの部屋にいる……いた。一瞬前まで。部屋に入るなり床が抜けて、ぼくは下の地面に落ちたのだ。</p>
<p>――下に地面がある！？</p>
<p>　そう。ぼくは地上に落ちていた。</p>
<p>――じゃあ、さっきまでいた一階の迷宮は？</p>
