<p class="chname">巨蟹宮</p>
<h2 class="pnum">624</h2>

<p>　ゲート越しに前後５ブロック繋がった小部屋の中央――前後から３ブロックめの小部屋にいる。</p>
<p>――ど真ん中からなら、上下どちらに落ちても大丈夫かな。</p>
<p>　どれくらいの高さで自分は死ぬだろうかと考える。若干身震いがする話題だ。</p>
<ul class="choices">
  <li>前（旧天井側）へゲートを抜けるなら<a href="p622.xhtml">６２２</a>へ進む。</li>
  <li>後ろ（旧床側）へゲートを抜けるなら<a href="p628.xhtml">６２８</a>へ進む。</li>
</ul>

</section>
