<p class="chname">人馬宮</p>
<h2 class="pnum">1190</h2>

<p>　ぼくは屋上である第６層のテラスにたどり着いた。</p>
<p>　蓋をおろし、そこで蓋に魔法でロックがかかったことを知った。下層に戻れないし、巫女やタウルスともコンタクトが取れないということだ。</p>
<p>　だが、どうしようか逡巡する暇はなかった。何者かが急速に接近し、剣でぼくを薙ぎ払ってきたからだ。ぼくはとっさに床へと転がってかわそうとしたが、そのとき足に鈍い痛みが走った。ほんのわずかな痛みだったが、それが致命傷だった。</p>
<p>　峻烈な熱い痛みとともに、ぼくの視界がグルグルと回転した。</p>
<p>　どうやら、ぼくの首が第六層の床を転がったらしい……</p>
