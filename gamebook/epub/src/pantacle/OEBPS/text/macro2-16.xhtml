<p class="chname">マクロの街２</p>
<h2 class="pname">南門</h2>

<p>獣帯コンパスが【魚－金牛】を示している。ここはマクロの街の南門だ。門から南を眺めると、小川にそって小高い丘や山へと小道が続いている。かつては山菜を取ったり川魚を釣ったりしていたのだろうが、今は葉をつけた木々さえ見えない。</p>
