<p class="chname">獅子宮</p>
<h2 class="pnum">253</h2>

<p>　ちょうど４２を数えたところで、門がひとりでに開き出した。</p>
<p>　中は、東西２ブロック×南北３ブロックの部屋だった。北壁の東側と、南壁の東側とに扉がある。</p>
<p>　部屋は質素ながらもしっかりとした作りの机椅子が並んでおり、卓上には客をもてなすための皿には果物類がもられ、銀の盃には果実酒が注がれていた。少しだけ飲み残しがある。部屋の客が急いでこの部屋を離れたのは間違いない。</p>
<ul class="choices">
  <li>北壁の東側の扉から廊下に出るなら<a href="p251.xhtml">２５１</a>へ進む。</li>
  <li>南壁の東側の扉から先に進むなら<a href="p272.xhtml">２７２</a>へ進む。</li>
</ul>

</section>
