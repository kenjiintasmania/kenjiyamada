<p class="chname">宝瓶宮</p>
<h2 class="pnum">417</h2>

<p>　マンホールの取手をつかんで、かなり重そうなフタをグッと引っ張ってみる。</p>
<p>「わっ……と！」</p>
<p>　いきなり飛び散った水飛沫に驚き、そのままマンホールを落としてしまう。片側がヒンジになっていて持ち上げられずに落としたというのもあるが、それで助かったともいえる。水圧で水が吹き出すのを、重いフタがかろうじて食い止めてくれたのだ。</p>
<p>「そうか。ここは水面下なのか」</p>
<p>　魔道士たるもの、状況を正確に把握せねばならない。ぼくは自分を戒めた。</p>
<ul class="choices">
  <li>壁の装置をいじってみるなら<a href="p419.xhtml">４１９</a>へ進む。</li>
  <li>螺旋階段を上がるなら<a href="p426.xhtml">４２６</a>へ進む。</li>
</ul>

</section>
