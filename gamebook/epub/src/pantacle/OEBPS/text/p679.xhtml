<p class="chname">巨蟹宮</p>
<h2 class="pnum">679</h2>

<p>　左右４ブロックの通路の左端にいる。ここから前方（上方）へと進めるのだが、カニさんがヘッドスライディングするまでには、もうしばらくかかりそうで、でも子ガニの軍団はすぐそこまで迫ってきてるわけで、ぼくは、つまり、子ガニの群れに飲み込まれた。</p>
