<h2 class="pnum">1068</h2>

<p>　通路はここで行き止まりだった。</p>
<p>　行き止まりの壁に迷宮建設記念の碑が刻まれている。</p>
<p>『複雑性は、これまさに迷宮と同義である――迷宮作家ラ＝ビリンバス』</p>
<ul class="choices">
  <li>通路は北（<a href="p1024.xhtml">一〇二四</a>）にだけ続いている。</li>
