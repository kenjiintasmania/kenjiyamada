<p class="chname">獅子宮</p>
<h2 class="pnum">257</h2>

<p>　床石に乗って西へ進み、自分の浅はかさを呪った。</p>
<p>　自分の乗っている床石、西に道は続いていたが、その先はピラミッドの西壁だった。</p>
<p>　東に道は続いていたが、そこは自分で穴を開けてしまった。</p>
<p>　南に道は続いていたが、向こう側が石壁になっていて渡れない。</p>
<p>――何やってんだ、メスロン。</p>
<p>　しばし立ちすくんだ。</p>
<p>　床石はすべて初期配置へと戻っていった。</p>
