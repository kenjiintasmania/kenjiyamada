<p class="chname">宝瓶宮</p>
<h2 class="pnum">409</h2>

<p>　南北７ブロック×東西７ブロックくらいの広さの滝壺のちょうど中央の飛び石にいる。１×１ブロック程度の大きさの足場には水濡れた呪門がひっそりと、たたずんでいる。</p>
<p>　この滝壺の最北端である南北１ブロック×東西７ブロックは、滝壺というよりは迷宮の土台となっているようだったが、滝の飛沫のせいでよく見えない。</p>
<p>　また東西を見ると、どちらも２ブロック先に１×１ブロックの飛び石が設置されており、獅四肢を使えば文字通り『飛んで』移動できそうだった。</p>
<ul class="choices">
  <li>獅四肢で右側（東）の飛び石に移るなら<a href="p407.xhtml">４０７</a>へ進む。</li>
  <li>獅四肢で左側（西）の飛び石に移るなら<a href="p413.xhtml">４１３</a>へ進む。</li>
</ul>

</section>
