<p class="chname">天蝎宮</p>
<h2 class="pnum">322</h2>

<p>　西に扉が、東に６ブロックの長さの通路があり、天井から大きな骨が１本突き出ている。けっこう派手に揺れており、なかなかアバンギャルドな絵面だ。</p>
<ul class="choices">
  <li>東へ歩くなら<a href="p329.xhtml">３２９</a>へ進む。</li>
  <li>西の扉を入るなら<a href="p326.xhtml">３２６</a>へ進む。</li>
</ul>
