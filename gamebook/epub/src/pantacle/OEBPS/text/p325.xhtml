<p class="chname">天蝎宮</p>
<h2 class="pnum">325</h2>

<p>　外壁が接する東南角の足元からナナメに突き出ているのは、やはりどう見ても骨だった。巨大な大腿骨……といったところだろうか。よく見ると若干震えており、足元の砂利が振動しているのは、この骨が原因のようだ。</p>
<p>「気持ちわるっ！」</p>
<p>　思わず声が出で周りを見渡す。幸い誰かに聞かれて襲いかかられる……ということはなかった。先へ進もう。</p>
<ul class="choices">
  <li>北へ歩くなら<a href="p323.xhtml">３２３</a>へ進む。</li>
  <li>西へ歩くなら<a href="p328.xhtml">３２８</a>へ進む。</li>
</ul>
