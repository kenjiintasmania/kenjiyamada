<p class="chname">人馬宮</p>
<h2 class="pnum">1117</h2>

<p>　六角形のブロックにいる。</p>
<p>「かわりばえ、しないね」</p>
<p>「気を抜くな、メスロン。そういやって惑わせようという作戦かもしれないぞ」</p>
<p>　ここから、つながる扉は３つ。</p>
<ul class="choices">
  <li>北東の壁面に設置された扉を抜けるなら<a href="p1123.xhtml">１１２３</a>へ進む。</li>
  <li>北西の壁面に設置された扉を抜けるなら<a href="p1113.xhtml">１１１３</a>へ進む。</li>
  <li>西の壁面に設置された扉を抜けるなら<a href="p1114.xhtml">１１１４</a>へ進む。</li>
</ul>

</section>
