<p class="chname">宝瓶宮</p>
<h2 class="pnum">462</h2>

<p>　ぼくは通路の曲がり角にいる。</p>
<p>　通路の東は１ブロック先で行き止まり、その北側に扉がある。北は２ブロック先で東に折れている。</p>
<ul class="choices">
  <li>東へ１ブロック進み、扉を開けるなら<a href="p459.xhtml">４５９</a>へ進む。</li>
  <li>北へ進むなら<a href="p464.xhtml">４６４</a>へ進む。</li>
</ul>

</section>
