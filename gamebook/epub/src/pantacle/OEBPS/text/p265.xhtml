<p class="chname">獅子宮</p>
<h2 class="pnum">265</h2>

<p>　東西１ブロック×南北１ブロックの部屋にいる。足元には下り階段があり、北壁には扉がついている。その扉は他とは違って少し豪華で少し頑丈に見える。</p>
<ul class="choices">
  <li>扉を入るなら<a href="p275.xhtml">２７５</a>へ進む。</li>
  <li>階段を下りるなら<a href="p289.xhtml">２８９</a>へ進む。</li>
</ul>
