<h2 class="pnum">289</h2>

<pre class="grid">■■■</pre>
<pre class="grid">□□■</pre>

<p>　第５層の北東に位置する、３×３の合計９ブロックの大部屋にいる。西と南に進めるようになっており、東と北はピラミッドの外壁だ。足元にスイッチが設置されてはいるが、今のままではこの床石はどこへも移動できない。</p>
<ul class="choices">
  <li>西へ進むなら<a href="p291.xhtml">２９１</a>へ進む。</li>
  <li>南へ進むなら<a href="p287.xhtml">２８７</a>へ進む。</li>
</ul>
