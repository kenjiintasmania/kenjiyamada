<section id="macro2-08" class="paragraph">
<p class="chname">マクロの街２</p>
<h2 class="pname">大通り西</h2>

<p>獣帯コンパスが【人馬－金牛】を示している。ぼくはマクロの街を東西につらぬく大通りの西側にある十字路に立っている。十字路を北に進めば井戸のある広場に入り、南に進めば古びた看板の並ぶ通りを進むことになる。西に少し行けば街の西門があり、東には大通りが続いている。かつてはこの大通りに行商が露天を連ねていたのかもしれないが、今はただただ広い通りが続いているだけだ。</p>
<ul class="choices">
  <li>北の<a href="macro2-10.xhtml">広場</a>へ向かう</li>
  <li><a href="part-macro2.xhtml">南のさびれた通りへと向かう</a></li>
  <li><a href="macro2-09.xhtml">西門</a>に近づく</li>
  <li><a href="part-macro2.xhtml">大通りを東に向かう</a></li>
</ul>

</section>
