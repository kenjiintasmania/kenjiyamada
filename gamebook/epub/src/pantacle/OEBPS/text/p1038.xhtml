<h2 class="pnum">1038</h2>

<p>　三叉路にいる。</p>
<p>「どれも少し行けば次の選択が待ってるぞ」</p>
<p>「もう選び疲れてきたよ」</p>

  <li>通路は北（<a href="p1037.xhtml">一〇三七</a>）、南（<a href="p1039.xhtml">一〇三九</a>）、東（<a href="p1048.xhtml">一〇四八</a>）に続いている。</li>
</ul>
