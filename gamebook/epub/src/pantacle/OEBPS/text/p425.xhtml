<p class="chname">宝瓶宮</p>
<h2 class="pnum">425</h2>

<p>　重いマンホールのヒンジのついてない側をナナメに持ち上げながら、内側のはしごに足をかけて降りていく。</p>
<p>「あっ」</p>
<p>　マンホールが重すぎて落としてしまう。</p>
<p>――もしや。</p>
<p>　内側からマンホールを押そうとしてみるが、あまりに重いうえ、はしごという不安定な足場からでは全く押し開けることができなかった。</p>
<p>――進むしかないな。</p>
<p>　ぼくは覚悟を決めて滝壺の底へと向かった。</p>
<ul class="choices">
  <li><a href="p451.xhtml">４５１</a>へ進め。</li>
