<p class="chname">処女宮</p>
<h2 class="pnum">1061</h2>

<p>　三叉路にいる。</p>
<p>「東西はそこそこ歩かないと次の角には着かないな。南は少し行くだけでよさそうだが」</p>
<p>「少し……ねぇ」</p>
<ul class="choices">
  <li>通路は南（<a href="p1062.xhtml">一〇六二</a>）、東（<a href="p1081.xhtml">一〇八一</a>）、西（<a href="p1041.xhtml">一〇四一</a>）に続いている。</li>
</ul>
