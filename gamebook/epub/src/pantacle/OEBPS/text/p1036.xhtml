<p class="chname">処女宮</p>
<h2 class="pnum">1036</h2>

<p>　通路はここで行き止まりだった。</p>
<p>　行き止まりの壁に迷宮建設記念の碑が刻まれている。</p>
<p>『変動性だけは、迷宮での実現が難しい。アゾットなる人物が研究しているという地殻変動を起こす魔法書、あれが解明されれば完璧な迷宮が完成するのだが――迷宮作家ラ＝ビリンバス』</p>
<ul class="choices">
  <li>通路は南（<a href="p1037.xhtml">一〇三七</a>）にだけ続いている。</li>
</ul>
