<p class="chname">巨蟹宮</p>
<h2 class="pnum">675</h2>

<p>　左右４ブロックの通路の右端にいる。後方（下方）からは子ガニ暴走族が迫ってきているが、左に進めば２ブロック先で前方（上方）へ曲がれそうだ。</p>
<p>　ここは左に進むしかない。</p>
