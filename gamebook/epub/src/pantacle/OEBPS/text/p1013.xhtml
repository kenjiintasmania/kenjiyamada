<p class="chname">処女宮</p>
<h2 class="pnum">1013</h2>

<p>　三叉路にいる。</p>
<p>「アバドン、どうかな？」</p>
<p>「北と東は、少し行ったところに曲がり角が見えるな。だが南は、そこそこ行ったところで曲がり角になっているようだ」</p>
<p>「”少し”と”そこそこ”の違いは？」</p>
<p>「少し歩くか、そこそこ歩くかの違いだ」</p>
<p>　アバドンは、それで説明になっていると本当に思っているのだろうか。そもそもゾンビに聞いたぼくが悪いのだろうか。</p>
<ul class="choices">
  <li>通路は北（<a href="p1012.xhtml">一〇一二</a>）、南（<a href="p1015.xhtml">一〇一五</a>）、東（<a href="p1033.xhtml">一〇三三</a>）に続いている。</li>
</ul>

</section>
