<p class="chname">獅子宮</p>
<h2 class="pnum">229</h2>

<p>　南北２ブロック×東西１ブロックの部屋にいる。部屋の南側には上に登る螺旋階段があり、西壁の北側には扉が、南側には小さな窓がある。北壁に沿うように調理台が設置されていて、壁には調理ナイフが並んでいた。</p>
<ul class="choices">
  <li>小窓を調べてみるなら<a href="p221.xhtml">２２１</a>へ進む。</li>
  <li>螺旋階段を登るなら<a href="p220.xhtml">２２０</a>へ進む。</li>
  <li>西壁の北側には扉に入るなら<a href="p227.xhtml">２２７</a>へ進む。</li>
</ul>
