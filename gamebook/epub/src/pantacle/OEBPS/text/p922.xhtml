<p class="chname">双児宮</p>
<h2 class="pnum">922</h2>

<p>　Ｔ字路にいる。</p>
<p>　東西６ブロックの通路の西から２ブロックめで、南北７ブロックの通路の北端だ。</p>
<p>　東は３ブロック先で南へ、４ブロック先で北へ折れており、西は１ブロック先で北へ折れている。また南は７ブロック先の突き当りで東西に分かれており、その通路の中央辺りに複数の人影が倒れているのがわかる。始末された侵入者の末路だろうか。</p>
<ul class="choices">
  <li>南に７ブロック進むなら<a href="p944.xhtml">９４４</a>へ進む。</li>
  <li>東に３ブロック進むなら<a href="p925.xhtml">９２５</a>へ進む。</li>
  <li>西に１ブロック進むなら<a href="p933.xhtml">９３３</a>へ進む。</li>
</ul>

</section>
