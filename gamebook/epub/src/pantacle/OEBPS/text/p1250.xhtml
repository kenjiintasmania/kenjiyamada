<p class="chname">双魚宮</p>
<h2 class="pnum">1250</h2>

<p>　双魚宮の流氷の上に、たった一人で立っている。</p>
<p>　中央が縦に裂けていて、二つに分かれた氷塊が、魚の口先に見えないこともない。その二つの氷塊の片方には下に降りる階段が、もう片方には欠けた呪門が埋まっている。</p>
<p>　パンタクルをかざすと、残留魔力を手に感じ取ることができる。弱い信号のため、ここを目標に飛んでくることはできなさそうだが、<a href="p001.xhtml">オフィユカス島の呪門</a>に帰還するだけなら可能なようだ。</p>
<ul class="choices">
  <li>階段を降りるなら<a href="p1260.xhtml">１２６０</a>へ進む。</li>
  <li>帰還するなら<a href="p001.xhtml">オフィユカス島の【呪門】</a>へ戻る。</li>
</ul>

</section>
