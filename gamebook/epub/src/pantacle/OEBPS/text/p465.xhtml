<p class="chname">宝瓶宮</p>
<h2 class="pnum">465</h2>

<p>　東西４ブロック幅の通路の西から３ブロック目にいる。この通路は、すべてのブロックから北へと道がつながっており、ここからは北に４ブロック進んだ先で左折する道が見える。</p>
<ul class="choices">
  <li>北に進むなら<a href="p467.xhtml">４６７</a>へ進む。</li>
  <li>東へ１ブロック進むなら<a href="p454.xhtml">４５４</a>へ進む。</li>
  <li>西へ１ブロック進むなら<a href="p494.xhtml">４９４</a>へ進む。</li>
</ul>

</section>
