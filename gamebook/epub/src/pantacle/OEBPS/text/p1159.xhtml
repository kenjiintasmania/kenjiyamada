<p class="chname">人馬宮</p>
<h2 class="pnum">1159</h2>

<p>　第３層の六角形のクリスタルブロックにいる。</p>
<p>　ブロック中央のクリスタル柱には『と』という文字が刻まれている。何を意味しているのだろうか。</p>
<p>　不思議なことに、南東の壁面にだけは、扉が設置されていなかった。</p>
<ul class="choices">
  <li>東の壁面に設置された扉を抜けるなら<a href="p1153.xhtml">１１５３</a>へ進む。</li>
  <li>北東の壁面に設置された扉を抜けるなら<a href="p1131.xhtml">１１３１</a>へ進む。</li>
  <li>北西の壁面に設置された扉を抜けるなら<a href="p1155.xhtml">１１５５</a>へ進む。</li>
  <li>西の壁面に設置された扉を抜けるなら<a href="p1154.xhtml">１１５４</a>へ進む。</li>
  <li>南東の壁面に設置された扉を抜けるなら<a href="p1130.xhtml">１１３０</a>へ進む。</li>
</ul>

</section>
