<p class="chname">宝瓶宮</p>
<h2 class="pnum">459</h2>

<p>　東へ１ブロック進み、北にある扉に手をかける。</p>
<p>――動かない。</p>
<p>　扉には鍵がかかっていた。複雑な錠前なのかピッキングはできなさそうだし、鍵自体に魔法がかかっているのか腕力で強引に開けることもできなさそうだった。</p>
<p>　しかたなく、ぼくは１ブロック西の曲がり角まで戻った。</p>
<ul class="choices">
  <li><a href="p462.xhtml">４６２</a>へ進む。</li>
</ul>
