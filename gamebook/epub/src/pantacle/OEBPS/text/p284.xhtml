<p class="chname">獅子宮</p>
<h2 class="pnum">284</h2>

<p>　ゴクンゴクンと予備動作をしたあと、床が南の大穴の上へとガリガリ移動した。</p>
<p>――あちゃあ……</p>
<p>　移動してから気づいたのだが、移動後は北が穴、東西は道はつながっているものの向こう側の石壁が邪魔をして通れず、結局南にしか行けない状況だった。</p>
<p>　床石がゴクンゴクンと音を立てて元の位置へ戻ろうとしている。</p>
<ul class="choices">
  <li>急いで南へ進むなら<a href="p281.xhtml">２８１</a>へ進む。</li>
  <li>何もせず床石が戻るに任せるなら<a href="p291.xhtml">２９１</a>へ進む。</li>
</ul>

</section>
