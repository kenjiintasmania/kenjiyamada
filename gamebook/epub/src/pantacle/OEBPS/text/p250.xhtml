<p class="chname">獅子宮</p>
<h2 class="pnum">250</h2>

<p>　東西７ブロックを貫く通路にいる。Ｔ字路の南壁には鉄製の両開き扉があり、東と西に突き当たったところの南壁にも、それぞれ小さな鉄扉がある。北に１ブロック入れば、牢屋と５層へつながる入口があるが、いまはそっちへ行く必要はないだろう。また、Ｔ字路の角には椅子が置いてあり、見張りのドルイドの勤務地となっているようだが、いまは誰もいない。</p>
<ul class="choices">
  <li>目の前の大扉に入るなら<a href="p215.xhtml">２１５</a>へ進む。</li>
  <li>西端の南扉に向かうなら<a href="p242.xhtml">２４２</a>へ進む。</li>
  <li>東端の南扉に向かうなら<a href="p246.xhtml">２４６</a>へ進む。</li>
</ul>

</section>
