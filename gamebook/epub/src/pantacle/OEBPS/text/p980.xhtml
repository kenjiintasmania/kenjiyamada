<p class="chname">双児宮</p>
<h2 class="pnum">980</h2>

<p>　南北２ブロックの通路の北端にいる。</p>
<p>　東には扉があり、南への通路は２ブロック先の中庭へと続いている。中庭には特に花などなく、雑草が生い茂っているように見える。</p>
<ul class="choices">
  <li>東の扉を入るなら<a href="p939.xhtml">９３９</a>へ進む。</li>
  <li>南の中庭中央へ向かうなら<a href="p985.xhtml">９８５</a>へ進む。</li>
</ul>

</section>
