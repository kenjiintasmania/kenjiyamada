<p class="chname">獅子宮</p>
<h2 class="pnum">218</h2>

<p>　通路西端の南にある扉には古の女神のレリーフが施されているが、扉が開かない。鍵穴どころか、取っ手さえ見当たらない。心臓の形の凹みがあるだけだ。</p>
<ul class="choices">
  <li>心臓の彫り物を持っていて、はめてみるなら<a href="p232.xhtml">２３２</a>へ進む。</li>
  <li>廊下へ戻るなら<a href="p251.xhtml">２５１</a>へ進む。</li>
</ul>

</section>
