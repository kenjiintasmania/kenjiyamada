<p class="chname">獅子宮</p>
<h2 class="pnum">287</h2>

<pre class="grid">■□■</pre>
<pre class="grid">■□□</pre>
<pre class="grid">■□■</pre>
<p>　第５層の東に位置する、３×３の合計９ブロックの大部屋にいる。北と東と南に進めるようになっているが、東はそのままピラミッドの外壁へとぶち当たっており、実質は南北にしか移動できない。西には石壁がそそり立っており歩いては進めないが、中央の床石にスイッチがあるということはスライド移動することはできるようだ。</p>
<p>――この状況でスライドできるとしたら、西方向ということになるな。見えてないけど。</p>
<ul class="choices">
  <li>北へ進むなら<a href="p289.xhtml">２８９</a>へ進む。</li>
  <li>南へ進むなら<a href="p282.xhtml">２８２</a>へ進む。</li>
  <li>スイッチを押す<a href="p000.xhtml">ならへ進む。</a></li>
</ul>

</section>
