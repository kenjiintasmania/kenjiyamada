<p class="chname">巨蟹宮</p>
<h2 class="pnum">608</h2>

<p>　目が覚めると、ぼくは巨蟹宮の前に倒れていた。</p>
<p>――生きている？</p>
<p>　どうやら、ぼくはカニ型迷宮から不純物として廃棄されたらしい。</p>
<ul class="choices">
  <li>ともかく生きていたことに感謝して<a href="p601.xhtml">６０１</a>へ進め。</li>
</ul>
