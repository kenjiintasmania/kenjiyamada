<p class="chname">白羊宮</p>
<h2 class="pname">山岳</h2>

<p>　山岳は、この夢の空間のひとつの終着点であるようだった。ここから先には行けないかわりに、ここから<a href="aries-16.xhtml">【河川】</a>が<a href="aries-17.xhtml">【海岸】</a>に向かって流れていた。また山岳の内側には<a href="aries-14.xhtml">【盆地】</a>が見える。</p>
