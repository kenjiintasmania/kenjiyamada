<p class="chname">宝瓶宮</p>
<h2 class="pnum">412</h2>

<p>　東西３ブロックの部屋の西端にいる。西壁には何か文字のようなものが刻まれており、岩場を伝って東に戻れば迷宮玄関へと戻ることができる。</p>
<ul class="choices">
  <li>文字を調べてみるなら<a href="p470.xhtml">４７０</a>へ進む。</li>
  <li>岩場を伝って玄関へ戻るなら<a href="p414.xhtml">４１４</a>へ進む。</li>
</ul>
