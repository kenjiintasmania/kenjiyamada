<p class="chname">宝瓶宮</p>
<h2 class="pnum">472</h2>

<p>　東と北に折れる曲がり角にいる。</p>
<p>　南側は壁というよりは高い塔になっており、見上げると元の水面くらいまでの高さがあるようだった。目を凝らすとオベリスクのようなものが、ちらりと見えた。</p>
<p>「そうか。これは滝壺の飛び石の一つなんだ」</p>
<ul class="choices">
  <li>東へ進むなら<a href="p467.xhtml">４６７</a>へ進む。</li>
  <li>北へ進むなら<a href="p474.xhtml">４７４</a>へ進む。</li>
</ul>
