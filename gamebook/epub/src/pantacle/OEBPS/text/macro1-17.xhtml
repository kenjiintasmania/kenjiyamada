<p class="chname">マクロの街１</p>
<h2 class="pname">宿場</h2>

<p>獣帯コンパスが【水瓶－獅子】を示している。何人も住める大きな家屋が並んでいるところを見ると、ここはかつて宿場だったのかもしれない。だが今は酒を出すパブの一軒も見つけられない。通りの突きあたりの東南角にはひときわ大きな建造物が見えるが、やはり人の姿は見えない。北に２スクエア進めば、大通りにつながる。</p>
<p>（北西のレストラン）</p>
<p>（西の◆）</p>
<p>（南西の◆）</p>
<p>（北西～東のアドリアーンセズ・イン）</p>
