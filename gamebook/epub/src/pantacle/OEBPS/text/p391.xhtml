<p class="chname">天蝎宮</p>
<h2 class="pnum">391</h2>

<p>　ぼくは迷宮戦車クアドルアガの破壊に成功した。御者席がどこにあるか突き止めた、ぼくの機転の勝利だ。ペンは剣よりも強し。パンタクルは戦車よりも強しだ。</p>
<p>　<strong>星読み表に３００</strong>を足すこと。</p>
<ul class="choices">
  <li><a href="p393.xhtml">３９３</a>へ進む。</li>
</ul>
