<p class="chname">人馬宮</p>
<h2 class="pnum">1106</h2>

<p>　目が覚めると、ぼくは人馬宮の前に倒れていた。</p>
<p>「おい、大丈夫か？」</p>
<p>　タウルスが、ぼくを揺すっている。</p>
<p>　過去に食べたミツユビオニトカゲの効果で復活したのだ。記号「Ｍ」を消しておくこと。</p>
<p>「お前さんのことだから心配はしてなかったが、あまり心配させるもんじゃないぞ、メスロン」</p>
<p>　辻褄の合わないタウルスの苦言は、どこか、あたたかかった。</p>
<ul class="choices">
  <li><a href="p1110.xhtml">１１１０</a>へ進め。</li>
