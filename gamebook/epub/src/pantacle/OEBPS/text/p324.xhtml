<p class="chname">天蝎宮</p>
<h2 class="pnum">324</h2>

<p>　北と東に扉があり、南には６ブロックの長さの通路が伸びている。この通路には骨の姿は見えない。</p>
<ul class="choices">
  <li>北の扉に入るなら<a href="p321.xhtml">３２１</a>へ進む。</li>
  <li>東の扉に入るなら<a href="p327.xhtml">３２７</a>へ進む。</li>
  <li>通路を南に進むなら<a href="p326.xhtml">３２６</a>へ進む。</li>
</ul>
