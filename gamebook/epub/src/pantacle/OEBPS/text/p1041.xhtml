<p class="chname">処女宮</p>
<h2 class="pnum">1041</h2>

<p>　三叉路にいる。</p>
<p>「アバドン、距離的にはどうかな？」</p>
<p>「西と南は少し行けば角に行くつくが、東は……そこそこかかりそうだな」</p>
<p>「その”そこそこ”って、いったいどれくらいなのさ」</p>
<p>「”そこそこ”というのはだな……」</p>
<p>「うん」</p>
<p>「”そこそこ”の距離があるということだ」</p>
<p>　ぼくがガッカリしたかイライラしたかは、ここでは言及しないことにする。</p>
<p>　ぼくは、ただ歩みを進めることにした。</p>
<ul class="choices">
  <li>通路は南（<a href="p1042.xhtml">一〇四二</a>）、東（<a href="p1061.xhtml">一〇六一</a>）、西（<a href="p1031.xhtml">一〇三一</a>）に続いている。</li>
</ul>

</section>
