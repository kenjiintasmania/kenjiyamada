<p class="chname">天蝎宮</p>
<h2 class="pnum">327</h2>

<p>　東と西に扉があり、南には５ブロックの長さの通路が伸びている。この通路には骨の姿は見えないが、通路全体がけっこう揺れている。</p>
<ul class="choices">
  <li>東の扉に入るなら<a href="p330.xhtml">３３０</a>へ進む。</li>
  <li>西の扉に入るなら<a href="p324.xhtml">３２４</a>へ進む。</li>
  <li>通路を南に進むなら<a href="p335.xhtml">３３５</a>へ進む。</li>
</ul>

</section>
