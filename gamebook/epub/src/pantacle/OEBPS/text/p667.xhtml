<p class="chname">巨蟹宮</p>
<h2 class="pnum">667</h2>

<p>　左右６ブロックの通路の左端にいる。カニさんがそろそろ波へとダイビングして腹這いになるだろうが、それに先んじてぼくはすでに迷宮を縦に（後方に）落ちていた。そこは１ブロックですぐに行き止まりとなっており、その壁にできた亀裂からぼくは迷宮外に放り出された。</p>
