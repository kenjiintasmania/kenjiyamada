<p class="chname">天秤宮</p>
<h2 class="pnum">730</h2>

<p>　ぼくは１・２階ドームの天井中央に乗るかたちで、３階部分に立っている。</p>
<p>　３階といっても、ドームからの伸びる天秤の柱のようなもので、直径１ブロックの円形の空間しかなく、ここからはハシゴが上へと伸びているだけだ。そのハシゴを１ブロック上がった４階部分で、柱内の空間は東西に分かれていた。</p>
<ul class="choices">
  <li>ハシゴを４階まで上がるなら<a href="p735.xhtml">７３５</a>へ進む。</li>
  <li>足元の蓋を開けて階下のドームに降りるなら<a href="p713.xhtml">７１３</a>へ進む。</li>
</ul>

</section>
