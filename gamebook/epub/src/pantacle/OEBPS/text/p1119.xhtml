<p class="chname">人馬宮</p>
<h2 class="pnum">1119</h2>

<p>　六角形のブロックにいる。</p>
<p>「なるほど。六角形の繰り返しなわけだ」</p>
<p>「四角形のブロックなら吐くほど見てきたがな」</p>
<p>「新しいね」</p>
<p>　迷わないように気をつけて進もう。</p>
<ul class="choices">
  <li>北東の壁面に設置された扉を抜けるなら<a href="p1115.xhtml">１１１５</a>へ進む。</li>
  <li>北西の壁面に設置された扉を抜けるなら<a href="p1125.xhtml">１１２５</a>へ進む。</li>
  <li>東の壁面に設置された扉を抜けるなら<a href="p1114.xhtml">１１１４</a>へ進む。</li>
</ul>

</section>
