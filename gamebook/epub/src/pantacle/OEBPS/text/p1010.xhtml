<p class="chname">処女宮</p>
<h2 class="pnum">1010</h2>

<p>　ぼくは処女宮の前にいる。</p>
<p>　おそらくは。</p>
<p>　というのも、東西南北見渡しても端が見えない広大な一階建ての迷宮が横たわっていたからだ。</p>
<p>「アバドンは、端までどれくらいあると思う？」</p>
<p>「歩いて半日くらいかな」</p>
<p>　見えてるのか見えてないのか、分かってるのか分かってないのか、アバドンはそそくさと角に見える入口へと向かった。</p>
<ul class="choices">
  <li><a href="p1011.xhtml">一〇一一</a>へ進む。</li>
</ul>
