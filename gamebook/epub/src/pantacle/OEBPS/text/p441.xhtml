<p class="chname">宝瓶宮</p>
<h2 class="pnum">441</h2>

<p>　しばらく逡巡していると突然、部屋の中央上方からダバッという音とともに滝のような水が吹き出してきた。いや実際、これは滝なのだが。水をせき止めていた水瓶が回転を始めたらしい。ぼぅっと惚けていたぼくは、すぐに動き出すのを怠った。</p>
<p>「しまった」</p>
<p>　滝水の勢いはすぐに激しくなり、気がつくと大瀑布となって部屋の中央に水の壁を作っていた。部屋の西には到底抜けられそうにない。あとできることはといえば……</p>
<ul class="choices">
  <li>落下する滝水ごと階下に落下することだけだ。<a href="p437.xhtml">４３７</a>へ進め。</li>
</ul>
