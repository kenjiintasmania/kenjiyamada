<p class="chname">双児宮</p>
<h2 class="pnum">990ーＢ</h2>

<p>　南北９ブロック、幅２ブロックの庭園の南端、西側にいる。</p>
<p>　おそらく、ここが双児宮の西南端だろう。</p>
<p>　足元が雑草から月見草に変わっており、雲隠れした弱々しい月明かりの下でほんのりと白く花びらが揺れていた。その周囲を楽しそうにホタルが飛び回っている。</p>
<p>「ここだけが……」とリオネが言い、</p>
<p>「うん。きれいだ」とぼくが返した。</p>
<p>　薄暗い迷宮で、ここだけが生き生きとしている気がした。</p>
<p>　この南西端から東を見ると、１ブロック先に暗い空間が見えた。</p>
<ul class="choices">
  <li>東に１ブロック進むなら<a href="p991b.xhtml">９９１</a>へ進む。</li>
  <li>庭園の中央へと北に進むなら<a href="p985.xhtml">９８５</a>へ進む。</li>
</ul>

</section>
