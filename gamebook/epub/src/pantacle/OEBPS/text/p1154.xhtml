<h2 class="pnum">1154</h2>

<p>　第３層の六角形のクリスタルブロックにいる。</p>
<p>　ブロック中央のクリスタル柱には『ロ』という文字が刻まれている。何を意味しているのだろうか。</p>
<ul class="choices">
  <li>東の壁面に設置された扉を抜けるなら<a href="p1159.xhtml">１１５９</a>へ進む。</li>
  <li>北東の壁面に設置された扉を抜けるなら<a href="p1155.xhtml">１１５５</a>へ進む。</li>
  <li>南東の壁面に設置された扉を抜けるなら<a href="p1158.xhtml">１１５８</a>へ進む。</li>
</ul>
