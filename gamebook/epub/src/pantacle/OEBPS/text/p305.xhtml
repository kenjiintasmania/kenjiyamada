<p class="chname">天蝎宮</p>
<h2 class="pnum">305</h2>

<p>　もう宮殿の裏手には荒野が広がっているのみだ。少し傾いた毒岩が激しい戦いの跡を物語っている。もうここにはクアドルアガもドルアガノンもドルナイトもいない。平和そのものだ。だがアゾットの部下にはヘンな迷宮を造るやつが多いということが、よくわかった。巫女一人では対処できないように、各宮殿を迷宮化しているのだろう。だからこそ、ぼくの活躍の場もあろうというものだ。</p>
<p>「すべての魔法書を取り戻すために、すべての迷宮を踏破してやる」</p>
<p>　ぼくは決意も新たに、天蝎宮をあとにした。</p>
