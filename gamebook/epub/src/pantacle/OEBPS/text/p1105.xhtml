<p class="chname">人馬宮</p>
<h2 class="pnum">1105</h2>

<p>　人馬宮は、しずかにたたずんでおり、その屋上のテラスだけが黄金色に光っていた。</p>
<p>「タウルス、すまない。テラスから矢に乗って飛べるのは一人だけなんだ」</p>
<p>　だが返事をしたのは、タウルスではなかった。</p>
<p>「頭蓋骨一つ増えたところで手荷物過多にはならないだろうさ」</p>
<p>　返事をしたのは、タウルスの背負い袋から現れたウェイブヒルだった。</p>
<ul class="choices">
  <li>ウェイブヒルと双魚宮の流氷まで飛ぶなら<a href="p1250.xhtml">１２５０</a>へ進む。</li>
  <li>引き返すなら<a href="p001.xhtml">オフィユカス島の【呪門】</a>へ戻る。</li>
</ul>

</section>
