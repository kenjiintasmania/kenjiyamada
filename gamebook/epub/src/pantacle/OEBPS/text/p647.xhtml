<p class="chname">巨蟹宮</p>
<h2 class="pnum">647</h2>

<p>　１×１ブロックの小部屋にいる。いま入ってきたゲートしか出入り口はないが、右壁に鉄製のハンドルが取り付けられていた。</p>
<p>『予備停止装置』</p>
<p>ふむ。カニさんには、ぜひ心を静めてほしいところだが……</p>
