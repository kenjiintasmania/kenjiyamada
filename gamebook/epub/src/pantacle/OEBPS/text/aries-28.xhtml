<p class="chname">白羊宮</p>
<h2 class="pname">三角形のモヤ</h2>

<p>　三角形のモヤの中を進むと、徐々にタテとヨコと奥行きがはっきりしてゆき、曖昧な空間から現実感のある空間へと変わってゆき、気がつくと【<a href="p590.xhtml">５９０</a>】にいた。</p>
