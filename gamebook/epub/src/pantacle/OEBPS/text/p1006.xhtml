<p class="chname">処女宮</p>
<h2 class="pnum">1006</h2>

<p>　目が覚めると、ぼくは処女宮の前に倒れていた。過去に食べたミツユビオニトカゲの効果で復活したのだ。</p>
<p>「お、目が覚めたな」アバドンが、そばに立っていた。「ま、人間、じっとしてりゃ復活するっていうしな。やはり、生き返ったか」</p>
<p>「いや、何度も生き返れるのはキミだけだろう。アバドン」</p>
<p>　ぼくは少し笑い、再び歩み始めた。</p>

  <li>記号「Ｍ」を消して、<a href="p1010.xhtml">１０１０</a>へ進め。</li>
