<p class="chname">白羊宮</p>
<h2 class="pname">四角いモヤ</h2>

<p>　四角いモヤは、四角い呪門へと続いていた。ここはスタート地点だ。<a href="aries-01.xhtml">【呪門】</a>からオフィユカス島に戻ってもいいし、<a href="aries-02.xhtml">【モヤ】</a>の中に足を踏み入れてもいい。</p>
