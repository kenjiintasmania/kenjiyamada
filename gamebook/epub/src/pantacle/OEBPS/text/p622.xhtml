<p class="chname">巨蟹宮</p>
<h2 class="pnum">622</h2>

<p>　ゲート越しに前後５ブロック繋がった小部屋の、前から２つめ（カニさん起立時、天井から２つめ）の小部屋にいる。カニ型迷宮の外殻ごしにゴゴゴ、ザザザという鈍い波の音が聞こえているが、カニさんがいつまで腹這いでいるかは分からない。用件があるなら早めに済ませたいところだ。</p>
<ul class="choices">
  <li>前（旧天井側）へゲートを抜けるなら<a href="p629.xhtml">６２９</a>へ進む。</li>
  <li>後ろ（旧床側）へゲートを抜けるなら<a href="p624.xhtml">６２４</a>へ進む。</li>
</ul>

</section>
