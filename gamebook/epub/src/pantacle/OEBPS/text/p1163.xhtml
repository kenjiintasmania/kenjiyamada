<p class="chname">人馬宮</p>
<h2 class="pnum">1163</h2>

<p>　柱だけの第４層を、風が吹き抜けている。</p>
<p>　ここは７つの正六角形からなるフロアの南ブロックだ。床には２つの呪印が描かれている。</p>
<p>♍：処女宮の象形。その呪印に触れたのち、左掌底を差し出せば、それは他を寄せ付けぬ礫を生むだろう。</p>
<p>♌：獅子宮の象形。その呪印に触れたのち、両手を地につけよ。大地から跳ね返る呪力は、その身を天高く弾けさせるだろう。</p>
<ul class="choices">
  <li>北東のブロックへ向かうなら<a href="p1165.xhtml">１１６５</a>へ進む。</li>
  <li>北のブロックへ向かうなら<a href="p1169.xhtml">１１６９</a>へ進む。</li>
  <li>北西のブロックへ向かうなら<a href="p1166.xhtml">１１６６</a>へ進む。</li>
</ul>

</section>
