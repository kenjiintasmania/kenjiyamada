<p class="chname">天蝎宮</p>
<h2 class="pname">M</h2>

<p>　南北３ブロックの通路の中央あたりにいる。この辺は急な増改築で立て付けが不安定なようで、飛射角を放てば壁を壊せそうだ。</p>
<ul class="choices">
  <li>ここで飛射角を使うなら１カウント追加して<a href="scorpio-18.xhtml">Q</a>へ</li>
  <li>北へ戻るなら１カウント追加して<a href="scorpio-11.xhtml">J</a>へ</li>
  <li>南へ進むなら１カウント追加して<a href="scorpio-15.xhtml">N</a>へ</li>
  <li>カウントが２１以上になったら<a href="scorpio-27.xhtml">Z</a>へ</li>
</ul>
