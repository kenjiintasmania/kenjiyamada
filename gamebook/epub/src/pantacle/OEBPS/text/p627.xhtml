<p class="chname">巨蟹宮</p>
<h2 class="pnum">627</h2>

<p>　ぼくは古いフィドルを取り出した。</p>
<p>「おお、それは私の愛用のフィドル！　おかえりマイフィドル！　ああ、きみ。もう用はない。とっとと行き給えよ」</p>
<p>　なかなか最低の部類の人間だ。ぼくは、なるだけ気にせずにその場を去ることにした。</p>
<p>「ああ、きみ。待ちたまえよ。感謝はしているのだ。言い遅れたがね。私もそろそろここを出ようと思う。楽団に戻れたら演奏会を開くよ。せひ聞きに来てくれたまえ」</p>
<p>　<strong>カリスマ値に１</strong>を加えること。また<strong>星読み表に３</strong>を足すこと。</p>
<p>　ぼくは通路を東に戻った。</p>
