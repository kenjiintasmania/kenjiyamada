<p class="chname">双児宮</p>
<h2 class="pnum">945</h2>

<p>　南北７ブロックの通路の中央にいる。東壁には薄く切れ込みが見られ、そこが隠し扉の切れ目であるとわかる。ただし、こちら側からは開かないようになっているようだ。</p>
<p>　足元には複数の遺体が転がっている。</p>
<p>「見張りのドルイドがいつ追加派遣されてくるかわからない。先へ進もう」</p>
<p>　リオネも、うなづいた。</p>
<ul class="choices">
  <li>北へ３ブロック進むなら<a href="p922.xhtml">９２２</a>へ進む。</li>
  <li>南へ３ブロック進むなら<a href="p915.xhtml">９１５</a>へ進む。</li>
</ul>

</section>
