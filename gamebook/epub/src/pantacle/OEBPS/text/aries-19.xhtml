<p class="chname">白羊宮</p>
<h2 class="pname">海流</h2>

<p>　グルグルグルと、渦を巻くように海中を流される。頭がボーッとしてきた。夢の中にいるようだ。いや、夢の中みたいなものだが。ぼくは溺れないよう<a href="aries-20.xhtml">【夢中】</a>で泳いだ。夢の中で夢中ってなんだ？　ゴボゴボゴボと渦に飲まれているうちに<a href="aries-09.xhtml">【深海】</a>へとたどり着いてしまいそうだ。</p>
