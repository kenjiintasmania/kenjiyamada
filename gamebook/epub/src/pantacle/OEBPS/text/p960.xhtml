<p class="chname">双児宮</p>
<h2 class="pnum">960</h2>

<p>　南北２ブロックの通路の南端にいる。ここは行き止まりだ。</p>
<p>　北への通路は２ブロック先の中庭へと続いており、鮮やかなバラが咲き乱れているのがわかる。</p>
<ul class="choices">
  <li>行き止まりを調べるなら<a href="p968.xhtml">９６８</a>へ進む。</li>
  <li>南の中庭中央へ向かうなら<a href="p965.xhtml">９６５</a>へ進む。</li>
</ul>

</section>
