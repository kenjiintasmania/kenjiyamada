<p class="chname">双児宮</p>
<h2 class="pnum">961</h2>

<p>　寝台は全くもって質素なものだった。</p>
<p>「ベッドが２つだけとはね」</p>
<p>「客が少ないのでしょうか」</p>
<p>「そもそも宮殿に来客などあるのかな」</p>
<p>「では宮殿の巫女の寝屋では？」</p>
<p>「でも巫女は普通一人では？」</p>
<p>「ええ、まあ……」</p>
<p>「ふむ、さて……」</p>
