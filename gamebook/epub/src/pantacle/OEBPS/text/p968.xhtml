<p class="chname">双児宮</p>
<h2 class="pnum">968</h2>

<p>「メスロン、これを」</p>
<p>　行き止まりの壁の隅を、リオネが指さした。白墨で書かれた文字の跡がうすっらと残っていた。走り書きで書かれたゾディアック文字なので、後半に行くほど判別がつきにくい。</p>
<p>　MAY…NA…HA…E…U…NO…SHIMAI</p>
<p>――読めそうで読めないな。</p>
<p>「眉無し禿げづら野武士舞い……？」とぼくがつぶやく。</p>
<p>「真夜中は別の姉妹……では？」とリオネが返す。</p>
<p>　結局、結論はでなかった。</p>
