<p class="chname">人馬宮</p>
<h2 class="pnum">1189</h2>

<p>　彫像の北側に回り込んだところで、ぼくは急に落下した。</p>
<p>　透明床か、とタウルスが言う声が上方から追いかけてきた。</p>
<p>「いてっ！」</p>
<p>　ぼくは尻餅をついた。</p>
<p>　そして、ぼくは塔の第２層へとついた。</p>
<ul class="choices">
  <li><a href="p1120.xhtml">１１２０</a>へ進む。</li>
</ul>
