<p class="chname">獅子宮</p>
<h2 class="pnum">212</h2>

<p>　南北２ブロック、東西３ブロックのホールにいる。南壁の中央からは入口へと向かう通路が伸びている。北側の壁には、２匹の獅子が引くチャリオットと、その上に立つ女性の姿が描かれている。壁の何カ所かに小さな通風孔が空いているため、入口からホールまでの空気の流れを生んでおり、またわずかに差し込むぼんやりした光が女性のレリーフを神々しく包んでいた。このピラミッドを設計した人間は、相当な美的センスを持っているようだ。</p>
<ul class="choices">
  <li>北壁のレリーフをよく見るなら<a href="p213.xhtml">２１３</a>へ進む。</li>
  <li>南へと通路を戻るなら<a href="p211.xhtml">２１１</a>へ進む。</li>
</ul>
