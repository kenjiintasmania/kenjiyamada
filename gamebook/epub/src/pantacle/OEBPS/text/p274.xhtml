<p class="chname">獅子宮</p>
<h2 class="pnum">274</h2>

<p>　ちょうど４２を数えたところで、門がひとりでに開き出した。</p>
<p>――待っている間に逃げられたのでは？</p>
<p>　中は、東西２ブロック×南北３ブロックの部屋だった。北壁の西側と、南壁の西側とに扉がある。</p>
<p>　部屋は豪奢に飾り付けられていた。精密な壁画に、象形文字のタペストリー。東壁のスリットから審判の間の惨劇を見学できるように設計された座席とベッド。円卓に積まれた果物類に、金の盃に注がれた果実酒。少しだけ飲み残しがある。部屋の主が急いでこの部屋を離れたのは間違いない。</p>
<ul class="choices">
  <li>北壁の西側の扉から廊下に出るなら<a href="p251.xhtml">２５１</a>へ進む。</li>
  <li>南壁の西側の扉から先に進むなら<a href="p271.xhtml">２７１</a>へ進む。</li>
</ul>

</section>
