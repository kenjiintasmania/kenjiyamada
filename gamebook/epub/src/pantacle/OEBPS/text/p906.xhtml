<p class="chname">双児宮</p>
<h2 class="pnum">906</h2>

<p>　目が覚めると、ぼくは双児宮の前に倒れていた。過去に食べたミツユビオニトカゲの効果で復活したのだ。</p>
<p>「よかった、目を覚ましたのですね」リオネが、そばで介抱してくれていたらしい。「次は気をつけてくださいね」</p>
<p>「心配かけて、すまない」</p>
<p>　そして、ぼくらは再び動きだした。</p>
