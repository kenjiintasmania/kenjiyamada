<p class="chname">宝瓶宮</p>
<h2 class="pnum">466</h2>

<p>　螺旋階段を登り、解錠済みの扉を抜けてさらに２ブロックはしごを上がると、今にも天井から滝が滝のように落ちてこようとするところだった。</p>
<p>「獅四肢！」</p>
<p>　ぼくは反射的に術を使って、水車を足場に最上階へと駆け上がった。</p>
<ul class="choices">
  <li><a href="p434.xhtml">４３４</a>へ進め。</li>
