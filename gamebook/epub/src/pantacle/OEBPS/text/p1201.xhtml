<p class="chname">双魚宮</p>
<h2 class="pnum">1201</h2>

<p>　双魚宮へ向かうべく呪門の前に立つと、足元からウェイブヒルの声がした。</p>
<p>「ずっとじってしていると肩がこってしかたないわい。たまには冒険に連れて行け、メスロン。魔導書の解読には気分転換も必要だ」</p>
<p>　頭蓋骨だけのウェイブヒルのどこに、こるべき肩があるのか理解に苦しんだが、ウェイブヒルの解読が捗るのであれば是非もない。</p>
<p>「いいですよ。一緒に行きましょう」</p>
<p>　そう言ってぼくはウェイブヒルを肩に乗せ、双魚宮の呪門まで転移した。</p>
<p>　星読み表の千の位が……</p>
<ul class="choices">
  <li>１か４か６か９ならへ<a href="p1205.xhtml">１２０５</a>進む。</li>
  <li>それ以外なら<a href="p1210.xhtml">１２１０</a>へ進む。</li>
</ul>
