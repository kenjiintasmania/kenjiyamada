<p class="chname">巨蟹宮</p>
<h2 class="pnum">635</h2>

<p>　左右６ブロックの通路の右端にいる。この通路はハサミの刃に当たる部分らしく、若干床側が細くなっている気がする。また床には階下へ降りる（落ちる）ゲートがある。</p>
<ul class="choices">
  <li>通路を左へ進むなら<a href="p638.xhtml">６３８</a>へ進む。</li>
  <li>床から階下へ降りるなら<a href="p633.xhtml">６３３</a>へ進む。</li>
</ul>
