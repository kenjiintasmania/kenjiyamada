<p class="chname">双児宮</p>
<h2 class="pnum">970</h2>

<p>　南北２ブロックの通路の北端にいる。</p>
<p>　西には扉があり、南への通路は２ブロック先の中庭へと続いている。中庭には遠目にもわかるくらい鮮やかなバラが咲いていた。</p>
<ul class="choices">
  <li>西の扉を入るなら<a href="p937.xhtml">９３７</a>へ進む。</li>
  <li>南の中庭中央へ向かうなら<a href="p965.xhtml">９６５</a>へ進む。</li>
</ul>

</section>
