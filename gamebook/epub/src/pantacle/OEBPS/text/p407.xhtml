<p class="chname">宝瓶宮</p>
<h2 class="pnum">407</h2>

<p>　７×７ブロックの滝壺の東から２列目、南北ど真ん中の飛び石にいる。獅四肢で東へ飛べば、滝壺脇の小路を通って滝の中腹へと登れそうだ。また西には呪門のある飛び石が見える。</p>
<ul class="choices">
  <li>東へ飛んで滝の東側から迷宮に登るなら<a href="p420.xhtml">４２０</a>へ進む。</li>
  <li>西へ飛んで呪門のある飛び石に移るなら<a href="p409.xhtml">４０９</a>へ進む。</li>
</ul>

</section>
