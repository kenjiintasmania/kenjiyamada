<p class="chname">獅子宮</p>
<h2 class="pnum">210</h2>

<p>　入口から１つ北のブロックにいる。通路の左右には獅子をあしらったレリーフが並んでいる。入口から流れ込む風を受けたかのように、獅子のたてがみが通路の奥へと流れていた。</p>
<ul class="choices">
  <li>北へと通路を進むなら<a href="p211.xhtml">２１１</a>へ進む。</li>
  <li>南へと通路を戻るなら<a href="p270.xhtml">２７０</a>へ進む。</li>
</ul>

</section>
