<p class="chname">天蝎宮</p>
<h2 class="pname">J</h2>

<p>　東と西に扉があり、南には２ブロック先まで進める。</p>
<ul class="choices">
  <li>東へ入るなら１カウント追加して<a href="scorpio-13.xhtml">L</a>へ</li>
  <li>西へ入るなら１カウント追加して<a href="scorpio-10.xhtml">I</a>へ</li>
  <li>南へ少し進むなら１カウント追加して<a href="scorpio-14.xhtml">M</a>へ</li>
  <li>南端まで進むなら２カウント追加して<a href="scorpio-15.xhtml">N</a>へ</li>
  <li>カウントが２１以上になったら<a href="scorpio-27.xhtml">Z</a>へ</li>
</ul>
