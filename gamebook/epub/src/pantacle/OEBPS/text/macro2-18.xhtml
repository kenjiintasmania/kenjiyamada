<p class="chname">マクロの街２</p>
<h2 class="pname">宿場</h2>

<p>獣帯コンパスが【水瓶－獅子】を示している。何人も住める大きな家屋が並んでいるところを見ると、ここはかつて宿場だったのかもしれない。東と北東のスクエアには、２スクエア繋がりの古びたパブ付きの宿が見える。通りの突きあたりの東南角にはひときわ大きな建造物が見え、北に２スクエア進めば大通りにつながる。</p>
<p>（北西のレストラン）</p>
