<h2 class="pnum">101</h2>

<p>　ぼくは金牛宮に足を踏み入れた。</p>
<p>　集会が開けそうな吹き抜けの中央ホールは、誰もいないせいで余計にだだっ広く感じる。蛇夫宮よりも太い柱と無骨な装飾の金牛宮は、まさに牡牛を体現したような造りだ。</p>
