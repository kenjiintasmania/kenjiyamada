<p class="chname">天秤宮</p>
<h2 class="pnum">739</h2>

<p>　これは正直者が得をするお話だ。</p>
<p>「自分の落としたのは普通の斧だから金の斧も銀の斧もほしくない」</p>
<p>　これだ。</p>
<p>【懲役３０年ヲ量刑ニ加算ス】</p>
<p>　体がさらに重くなった。</p>
<p>　星読み表に３０を加えること。</p>
<p>「なんでさ！」</p>
<p>　声は答えない。ぼくの叫びの余韻だけが響いている。</p>
<ul class="choices">
  <li>より重くなった体と心をひきずって、<a href="p740.xhtml">７４０</a>へ進む。</li>
</ul>

</section>
