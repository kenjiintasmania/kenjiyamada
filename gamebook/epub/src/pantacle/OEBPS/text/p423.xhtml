<p class="chname">宝瓶宮</p>
<h2 class="pnum">423</h2>

<p>　ぼくは西側の展望室で見つけた予備の鍵を、懐から取り出した。</p>
<p>　はたしてサイズはピッタリ、差し込むとさほど力も必要なく、くるりと回転した。</p>
<p>　ゴポポンと重い音をたてて、ガラスの向こうの巨大瓶の下部が床ではなく北壁へと向きを変えた。これで滝壺へと送られていたと思われる滝の水の多くが、滝壺以外の地下水かどこかへと流れ出ていったはずである。</p>
<p>「今なら行けるよね」</p>
<p>　ぼくは足元のマンホールの片側を引っ張り上げた。抵抗もなくマンホールは引き上げられ、その下に続くはしごを<ruby>見出<rt>みいだ</rt></ruby>した。</p>
<ul class="choices">
  <li>はしごを降りて<a href="p425.xhtml">４２５</a>へ進め。</li>
</ul>

</section>
