<p class="chname">双児宮</p>
<h2 class="pnum">943</h2>

<p>　部屋は生活用品であふれていたが、その雑多さや品質の悪さから下位のドルイドだろうと思われた。</p>
<p>　リオネが西壁の北端にたたずんで、こちらに目配せしている。</p>
<p>――すぐ外にドルイドがいるってのか？</p>
<p>　ぼくもリオネのそばへと静かに歩み寄った。壁の外側から声が聞こえるような気もする。</p>
<p>――声が聞こえる？　どの宮殿も頑丈な防音壁で仕切られてたはずだが。</p>
<ul class="choices">
  <li>壁に触れるなら<a href="p941.xhtml">９４１</a>へ進む。</li>
  <li>そっと部屋を出るなら<a href="p923.xhtml">９２３</a>へ進む。</li>
</ul>

</section>
