<p class="chname">獅子宮</p>
<h2 class="pnum">227</h2>

<p>　南北１ブロック×東西２ブロックの部屋にいる。東の扉以外に出入り口はないが、北壁と床との隙間に僅かな穴がいくつかあいており、かすかな明かりと風が入り込むようになっていた。部屋には肉や穀物、木の実や果物など多様な食材が積まれており、ここが食料庫だとわかる。葡萄の房から一粒ちぎって口に放り込むと、甘みと水分が口中に広がった。砂漠の中でも屋内は涼しく、物の保管もきく。なかなかいい暮らしじゃないか。</p>
<p>　ぼくは葡萄をもう一粒口に放り込んで部屋を出た。</p>
