<section id="aries-06" class="paragraph">
<p class="chname">白羊宮</p>
<h2 class="pname">青空</h2>

<p>　空はいい。自由。爽快。太古の賢者は空の向こうに、さらに広い海が広がっていると考えていたらしい。夜にだけ、その姿を見せる<a href="aries-07.xhtml">【<ruby>宇宙<rt>そら</rt></ruby>の海】</a>。海よりも深い青で、海中のように呼吸ができず、<a href="aries-09.xhtml">【深海】</a>のように暗く孤独。でも、その先に星々の<a href="aries-10.xhtml">【希望の光】</a>が満ちていると。</p>
