<p class="chname">巨蟹宮</p>
<h2 class="pnum">674</h2>

<p>　左右４ブロックの通路の右端にいる。ここから前方（上方）へ１ブロック進めるようになっており、２ブロックかけて曲がり角へ到達したぼくは、タイミングよく腹ばいになったカニさんに合わせて前方（上方）進んだ。</p>
