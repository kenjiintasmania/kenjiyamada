<p class="chname">天蝎宮</p>
<h2 class="pnum">323</h2>

<p>　迷宮の北東の角にいる。西と南に８ブロックの長さの通路が続いている。北東の角から例の骨が２本突き出ていて若干振動している。なかなかにキモい。</p>
<ul class="choices">
  <li>西へ歩くなら<a href="p321.xhtml">３２１</a>へ進む。</li>
  <li>南へ歩くなら<a href="p320.xhtml">３２０</a>へ進む。</li>
</ul>
