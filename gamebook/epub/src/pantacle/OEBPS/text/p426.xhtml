<p class="chname">宝瓶宮</p>
<h2 class="pnum">426</h2>

<p>　螺旋階段を登り、解錠済みの扉を抜けてさらに２ブロックはしごを上がる。すでに屋上の水瓶は回転を再開していたらしく、滝中滝の西側には行けそうになかった。</p>
<ul class="choices">
  <li>はしごを上って<a href="p424.xhtml">４２４</a>へ進め。</li>
</ul>
