<p class="chname">双児宮</p>
<h2 class="pnum">919</h2>

<p>　角にいる。</p>
<p>　東西６ブロックの通路の西端で、南北２ブロックの短い通路の北側だ。</p>
<ul class="choices">
  <li>東に１ブロック進むなら<a href="p915.xhtml">９１５</a>へ進む。</li>
  <li>南に１ブロック進むなら<a href="p920.xhtml">９２０</a>へ進む。</li>
</ul>
