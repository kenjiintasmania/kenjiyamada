<h2 class="pname">L</h2>

<p>　ぼくは東西２ブロック×南北１ブロックの部屋……だったところから落下していた。床が抜けていたからだ。ぼくは地上にドサッと落ちていた。ほどなくしてぼくは瓦礫に押しつぶされるだろう。なぜなら、もうカウント数が残っていないからだ。</p>
