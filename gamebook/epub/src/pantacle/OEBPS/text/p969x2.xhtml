<p class="chname">双児宮</p>
<h2 class="pnum">969</h2>
<p class="memo">※ 同じ番号の定義が複数あります（デバッグ一覧参照）</p>
<p>「おはようございます」とリオネ。</p>
<p>「……おはよう」とぼく。</p>
<p>「気づかれましたか？」</p>
<p>「そうだね」</p>
<p>　そう。何も変わっていないことに、ぼくらは気付いた。</p>
<p>　部屋の中からでもわかる薄暗さ。</p>
<p>「どうも……真夜中の夢から覚めてない感じだね」</p>
<p>　ぼくらは何度目かになる扉を開けて部屋を出た。</p>
<ul class="choices">
  <li><a href="p930.xhtml">９３０</a>へ進む。</li>
