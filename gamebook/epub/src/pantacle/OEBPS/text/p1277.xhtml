<p class="chname">双魚宮</p>
<h2 class="pnum">1277</h2>

<p>　キューブ状のテラスにいる。</p>
<p>　通用門のある東側をのぞいて、すべての方角がクリアな氷壁になっており、海中の様子がよく見えた。南に２キューブ、俯角３０度くらいの位置に何か光るものが見えるが、目の前を渦巻く海流に翻弄される回遊魚たちが舞っているため、よく見えない。</p>
<p>「あぁ、つまらん、つまらん。なぜに男二人でじっと海を見つめねばならんのだ。浪漫のかけらもなかろうが」</p>
<p>　ウェイブヒルがご機嫌ナナメなので、ぼくはそそくさとテラスを出た。</p>
<ul class="choices">
  <li>東の通用門から<a href="p1274.xhtml">１２７４</a>へ進む。</li>
</ul>

</section>
