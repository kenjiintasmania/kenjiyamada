<p class="chname">獅子宮</p>
<h2 class="pnum">237</h2>

<p>　南北１ブロック×東西２ブロックの部屋にいる。部屋は大きくないものの食卓や棚などの調度品が設置されており、客人をもてなす貴賓室のように見えた。西壁の扉だけが出入り口のようだ。</p>
<ul class="choices">
  <li>部屋を調べてみるなら<a href="p231.xhtml">２３１</a>へ進む。</li>
  <li>西の扉から出るなら<a href="p239.xhtml">２３９</a>へ進む。</li>
</ul>

</section>
