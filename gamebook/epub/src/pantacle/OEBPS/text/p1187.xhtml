<p class="chname">人馬宮</p>
<h2 class="pnum">1187</h2>

<p>　ぼくは足を踏み出した。細くて不安感はあったが、確実に最上階へとぼくをいざなってくれた。</p>
<p>　天井に近づいたところで、鋼鉄製の蓋の蝶番を外す。とくに施錠されたりはしていなかった。</p>
<ul class="choices">
  <li>このまま蓋を開けて最上階へ上がるなら<a href="p1160.xhtml">１１６０</a>へ進む。</li>
  <li>いったん下へ戻るなら<a href="p1182.xhtml">１１８２</a>へ進む。</li>
</ul>

</section>
