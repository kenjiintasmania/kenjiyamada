<p class="chname">白羊宮</p>
<h2 class="pname">宿屋跡</h2>

<p>　足元には、羊毛でできたヒツジ柄の敷物が残されている。ここは宿屋に出会った場所に違いない。目の前の空間がユラユラグラグラと揺れていて、かろうじて<a href="aries-25.xhtml">【丸いモヤ】</a>と<a href="aries-26.xhtml">【四角いモヤ】</a>が見えた。</p>
