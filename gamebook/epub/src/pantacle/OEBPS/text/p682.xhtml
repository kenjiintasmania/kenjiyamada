<p class="chname">巨蟹宮</p>
<h2 class="pnum">682</h2>

<p>　左右４ブロックの通路の左端にいる。子ガニの進軍速度は低下したものの、ここは行き止まりだ。どこかで通路を引き返し、前方（上方）へと進む必要がある。</p>
<ul class="choices">
  <li>すぐに右へと引き返すなら<a href="p684.xhtml">６８４</a>へ進む。</li>
  <li>ひと呼吸おいてから引き返すなら<a href="p686.xhtml">６８６</a>へ進む。</li>
  <li>ふた呼吸おいてから引き返すなら<a href="p689.xhtml">６８９</a>へ進む。</li>
</ul>
