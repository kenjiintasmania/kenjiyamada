<p class="chname">処女宮</p>
<h2 class="pnum">1025</h2>

<p>　通路はここで行き止まりだった。</p>
<p>　行き止まりの壁に看板がはめまれている。</p>
<p>『経緯度違反により埋め立て予定地』</p>
<p>　何を言ってるのかよくわかないが、ここから先に進めないのだけは確実だ。</p>
<ul class="choices">
  <li>通路は北（<a href="p1024.xhtml">一〇二四</a>）にだけ続いている。</li>
</ul>
