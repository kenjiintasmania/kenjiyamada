<p class="chname">双児宮</p>
<h2 class="pnum">970ーＢ</h2>

<p>　東西８ブロック✕南北９ブロックの双児宮の北東端にいる。</p>
<p>　東西２ブロック✕南北９ブロックの東庭園の北東端とも言える。西は、２ブロックめから先が通路になっているようだ。</p>
<p>　西には向日葵が、南には薔薇が咲いているのが遠目にも見て取れた。</p>
<ul class="choices">
  <li>西の通路を進むなら<a href="p975.xhtml">９７５</a>へ進む。</li>
  <li>南の中庭中央へ向かうなら<a href="p965.xhtml">９６５</a>へ進む。</li>
</ul>

</section>
