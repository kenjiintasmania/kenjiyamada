<p class="chname">天蝎宮</p>
<h2 class="pnum">332</h2>

<p>　ぼくは曲がり角に立っている。北は２ブロック先で行き止まり。東は３ブロック先で曲がり角になっているのが見える。通路の揺れは激しく、ぼくが布教中の重金属音楽のように頭が前後にガクガク揺れる。</p>
<ul class="choices">
  <li>東に進むなら<a href="p338.xhtml">３３８</a>へ進む。</li>
  <li>北に進むなら<a href="p330.xhtml">３３０</a>へ進む。</li>
</ul>

</section>
