<p class="chname">天秤宮</p>
<h2 class="pnum">747</h2>

<p>　ぼくは通路を西に３ブロック進み、突き当りの壁にあるハシゴの前へとたどり着いた。</p>
<p>　ここは東西７ブロックの通路の西端だ。上方には１ブロック上までハシゴが続いており、その天井に押し上げるタイプの蓋がついている。</p>
<p>　星読み表の十の位が……</p>
<ul class="choices">
  <li>２なら<a href="p744.xhtml">７４４</a>へ進む。</li>
  <li>それ以外なら<a href="p749.xhtml">７４９</a>へ進む。</li>
</ul>
