<p class="chname">双児宮</p>
<h2 class="pnum">930ーＢ</h2>

<p>　南北３ブロックの通路の南端にいる。西側には素朴な装飾の木製扉があり、南壁には薔薇をあしらったレリーフのついた扉がある。</p>
<ul class="choices">
  <li>北へ２ブロック進むなら<a href="p925.xhtml">９２５</a>へ進む。</li>
  <li>南の薔薇の扉に入るなら<a href="p923.xhtml">９２３</a>へ進む。</li>
  <li>西の木製の扉に入るなら<a href="p996b.xhtml">９９６</a>へ進む。</li>
</ul>

</section>
