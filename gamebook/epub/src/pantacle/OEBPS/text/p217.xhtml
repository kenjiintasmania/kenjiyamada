<p class="chname">獅子宮</p>
<h2 class="pnum">217</h2>

<p>　ぼくはあらゆる術を試して大扉を開けようと試みた。最終的には逆鱗の力で強引に扉を開くことになったが、敵が沈黙していなければ、暴走してるところを狙われただろう。</p>
