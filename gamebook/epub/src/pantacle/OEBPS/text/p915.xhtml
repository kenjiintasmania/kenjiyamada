<p class="chname">双児宮</p>
<h2 class="pnum">915</h2>

<p>　Ｔ字路にいる。</p>
<p>　東西６ブロックの通路の西から２ブロックめで、南北７ブロックの通路の南端だ。</p>
<p>　東は３ブロック先で北へ、４ブロック先で南へ折れており、西は１ブロック先で南へ折れている。また北は７ブロック先の突き当りで東西に分かれており、その通路の中央辺りに複数の人影が倒れているのがわかる。始末された侵入者の末路だろうか。</p>
<ul class="choices">
  <li>北に７ブロック進むなら<a href="p949.xhtml">９４９</a>へ進む。</li>
  <li>東に３ブロック進むなら<a href="p913.xhtml">９１３</a>へ進む。</li>
  <li>西に１ブロック進むなら<a href="p919.xhtml">９１９</a>へ進む。</li>
</ul>

</section>
