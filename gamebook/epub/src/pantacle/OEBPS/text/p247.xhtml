<p class="chname">獅子宮</p>
<h2 class="pnum">247</h2>

<p>　Ｔ字路に入ったところで通路の東側、椅子の向こうから飛びかかってくる人影が見えた。</p>
<p>――ドルイドだ！</p>
<p>　殴りかかろうとするかのように右拳を突き出してきている。何を繰り出そうとしているのかは推測がついたが、それに対応するこちらの構えができていなかった。強い衝撃波が全身を貫き、ぼくは気を失った。<a href="p252.xhtml">２５２</a>へ進む。</p>

</section>
