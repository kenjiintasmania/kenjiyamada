<p class="chname">天秤宮</p>
<h2 class="pnum">715</h2>

<p>　女神像の周囲をぐるぐると回ってみる。</p>
<p>　台座に載った脚線美、腰のくびれ。砕けそうなそれらが支える上半身と、天秤のように大きく左右に広げた両手から吊り下がる２つの小天秤。小天秤をさらに大きな天秤が支えているかのようだ。</p>
<p>　足元をみると腰までの高さの台座がわずかに振動しており、上を見上げると天井の一部に円形の切り込みが入っている。あこから天井裏へ上がれるかもしれない。</p>
