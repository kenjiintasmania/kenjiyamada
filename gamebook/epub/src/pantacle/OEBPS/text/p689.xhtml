<p class="chname">巨蟹宮</p>
<h2 class="pnum">689</h2>

<p>　ふた呼吸おいてから引き返そうとしたが、自分の予測よりも早くカニさんはスライディングを開始した。激しく揺れる迷宮内。オレンジ色の流動体をかき分けながら、急いで上階へと駆け上がろうとしたが、そのときにはすでにカニが腹這いから直立状態へと戻ろうとしており、つまり、ぼくは、迷宮内を滑り落ちて、子ガニヤクザの鉄砲玉に自ら飛び込むこととなった。</p>
