<p class="chname">双児宮</p>
<h2 class="pnum">940ーＢ</h2>

<p>　曲がり角にいる。</p>
<p>　東西３ブロックの西端、南北３ブロックの北端だ。</p>
<p>　東に２ブロック進んだところと北には扉があり、３ブロック先は庭園になっている。</p>
<p>　通路は光が差し込みにくい位置にあるせいで薄暗い。</p>
<ul class="choices">
  <li>東へ２ブロック進むなら<a href="p923.xhtml">９２３</a>へ進む。</li>
  <li>南へ２ブロック進むなら<a href="p944.xhtml">９４４</a>へ進む。</li>
</ul>

</section>
