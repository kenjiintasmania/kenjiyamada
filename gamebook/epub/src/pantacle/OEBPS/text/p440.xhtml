<p class="chname">宝瓶宮</p>
<h2 class="pnum">440</h2>

<p>　東西３ブロックの部屋の東端にいる。</p>
<p>　壁際の床には手前に引くタイプのレバーが設置されている。</p>
<p>　部屋の西側は、吹き出した水が滝のように激しく流れ落ちている。いや、そういえば滝そのものだった。</p>
<p>「しまった」</p>
<p>　そこでぼくは気づいた。西側へ戻れないということに。</p>
<p>「なんて馬鹿なんだ。魔道士の片隅にもおけないじゃないか」</p>
<p>　間抜けな魔道士にできることは……</p>
<ul class="choices">
  <li>落下する滝水ごと階下に落下することだけだ。<a href="p437.xhtml">４３７</a>へ進め。</li>
</ul>

</section>
