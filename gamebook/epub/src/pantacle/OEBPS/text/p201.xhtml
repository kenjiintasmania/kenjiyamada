<p class="chname">獅子宮</p>
<h2 class="pnum">201</h2>

<p>　ぼくは獅子宮に足を踏み入れた。</p>
<p>　太さに変化をつけた柱と豪奢な装飾の獅子宮は、まさに百獣の王を体現したような造りだ。吹き抜けの中央ホールはだだっ広いだけで何もないが、吹き抜けの向こうに三角形の建造物が見える。</p>
<p>　星読み表の十の位が……</p>
<ul class="choices">
  <li>３か４なら<a href="p207.xhtml">２０７</a>へ進む。（スフィンクス討伐ずみ）</li>
  <li>８か９なら<a href="p209.xhtml">２０９</a>へ進む。（獅子宮クリア）</li>
  <li>それ以外なら<a href="p205.xhtml">２０５</a>へ進む。</li>
</ul>
