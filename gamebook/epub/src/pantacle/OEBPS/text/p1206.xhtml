<p class="chname">双魚宮</p>
<h2 class="pnum">1206</h2>

<p>　目が覚めると、ぼくは双魚宮の呪門の前に倒れていた。過去に食べたミツユビオニトカゲの効果で復活したのだ。</p>
<p>「むぐ、うぐ」</p>
<p>　そばに、布でグルグル巻きにされたウェイブヒルが転がっていた。</p>
<p>「むぐぐ……はぁ、死んだかと思ったわい」頭蓋骨が何か意味のわからないことを言っている。</p>
<p>「はいはい、行きますよ！」</p>
<p>　ぼくは再び歩みを進めた。</p>
