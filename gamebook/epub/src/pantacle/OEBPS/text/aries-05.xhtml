<p class="chname">白羊宮</p>
<h2 class="pname">白雲</h2>

<p>　淡い色の<a href="aries-06.xhtml">【青空】</a>を、白雲が駆けてゆく。<a href="aries-11.xhtml">【上空の風】</a>は強そうだ。おそらくは、その奥の<a href="aries-12.xhtml">【黒雲】</a>を連れてこようとしているのだろう。</p>
