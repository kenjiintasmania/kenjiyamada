<h2 class="pname">井戸</h2>

<p>井戸が徐々に生活の中心らしくなってきている。羊飼いが犬とともに喉を潤しに来たり、薬売りの商人が調合用に澄んだ水をくみに来たり。</p>
<ul class="choices">
