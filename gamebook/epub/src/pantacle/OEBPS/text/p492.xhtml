<p class="chname">宝瓶宮</p>
<h2 class="pnum">492</h2>

<p>　ぼくは７×７の滝壺底の南西角にいる。周囲に半魚ドルイドの姿は見えない。北は５ブロック先で格子扉に行き当たる。東は３ブロック先で壁に当たるが、そこまでのすべてのブロックに北へと入る横道がつながっている。</p>
<ul class="choices">
  <li>北に進むなら<a href="p478.xhtml">４７８</a>へ進め。</li>
  <li>東へ１ブロック進むなら<a href="p494.xhtml">４９４</a>へ進む。</li>
</ul>

</section>
