<p class="chname">白羊宮</p>
<h2 class="pname">秘術</h2>

<p>　秘術といえば、この夢のような空間も、そうとうの秘術だろう。抜け出す術があるのかどうか。もしくは、抜け出す術を見つけられないくらい集中力を奪うのが、この秘術の本当の目的なのかもしれない。</p>
<p>　ぼくの目の間には、ふたたび<a href="aries-02.xhtml">【モヤ】</a>が広がっていた。</p>
