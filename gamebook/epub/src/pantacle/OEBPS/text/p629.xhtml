<p class="chname">巨蟹宮</p>
<h2 class="pnum">629</h2>

<p>　ゲートを抜けると、カニ型迷宮がおもむろに９０°回転した。カニさんが立ち上がったのだ。これにより前方は天井へ、後方は床へと変わり、ぼくは後方側へと転げた。あやうく自分が通ってきたゲートから４ブロックも下へと落ちるところだったが、さいわい縁にしがみついて事なきを得た。</p>
<ul class="choices">
  <li><a href="p634.xhtml">６３４</a>へ進む。</li>
</ul>
