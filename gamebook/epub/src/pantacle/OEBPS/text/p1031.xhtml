<p class="chname">処女宮</p>
<h2 class="pnum">1031</h2>

<p>　少し歩いたところで三叉路にたどり着いた。</p>
<p>「どうだい、アバドン？」</p>
<p>「南も東も西も、少し行ったところに曲がり角が見えるな」</p>
<p>「少し……それこそ、もう少し具体的にならないものかねぇ」</p>
<ul class="choices">
  <li>通路は南（<a href="p1032.xhtml">一〇三二</a>）、東（<a href="p1041.xhtml">一〇四一</a>）、西（<a href="p1011.xhtml">一〇一一</a>）に続いている。</li>
</ul>

</section>
