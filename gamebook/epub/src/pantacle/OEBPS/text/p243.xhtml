<p class="chname">獅子宮</p>
<h2 class="pnum">243</h2>

<p>「……！」</p>
<p>　思わず息を呑んだ。牢屋の中には無数の骸骨が散らばっていたからだ。死体を積み上げて、干からびるに任せたようにも見える。</p>
<p>――ここは牢屋か、死体置き場か。</p>
<p>　どちらにせよ、ろくな場所ではなさそうだ。また鉄格子は硬く、扉の錠は強固だ。中に入る方法も意味もないだろう。</p>
<ul class="choices">
  <li>東の牢屋を覗いてみるなら<a href="p245.xhtml">２４５</a>へ進む。</li>
  <li>Ｔ字路に入るなら<a href="p247.xhtml">２４７</a>へ進む。</li>
  <li>椅子に近寄るなら<a href="p249.xhtml">２４９</a>へ進む。</li>
</ul>
