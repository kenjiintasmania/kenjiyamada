<p class="chname">宝瓶宮</p>
<h2 class="pnum">448</h2>

<p>　東西３ブロックの部屋の東端にいる。</p>
<p>　壁際の床には手前に引くタイプのレバーが設置されている。</p>
<ul class="choices">
  <li>勢いよく引いてみるなら<a href="p439.xhtml">４３９</a>へ進む。</li>
  <li>しばらく逡巡してみるなら<a href="p441.xhtml">４４１</a>へ進む。</li>
  <li>西の階段を登って部屋を出るなら<a href="p430.xhtml">４３０</a>へ進む。</li>
</ul>
