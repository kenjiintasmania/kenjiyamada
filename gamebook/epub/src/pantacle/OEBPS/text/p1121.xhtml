<p class="chname">人馬宮</p>
<h2 class="pnum">1121</h2>

<p>　六角形のブロックにいる。</p>
<p>「位置的に、ここが塔の中心だな」元盗賊王タウルスが天井を見上げながら言った。「少し寒いな」</p>
<p>　西の扉の隙間から冷気が漂ってきていた。外気が流れてきているのだろうか。</p>
<ul class="choices">
  <li>東の壁面に設置された扉を抜けるなら<a href="p1127.xhtml">１１２７</a>へ進む。</li>
  <li>西の壁面に設置された扉を抜けるなら<a href="p1139.xhtml">１１３９</a>へ進む。</li>
  <li>南東の壁面に設置された扉を抜けるなら<a href="p1113.xhtml">１１１３</a>へ進む。</li>
</ul>
