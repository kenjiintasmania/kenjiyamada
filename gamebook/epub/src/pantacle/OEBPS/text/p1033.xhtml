<p class="chname">処女宮</p>
<h2 class="pnum">1033</h2>

<p>　曲がり角にいる。</p>
<p>「うぅむ、北も西も、少し行ったところで曲がり角のようだぞ」</p>
<p>「適当に応えてないよな？」</p>
<p>「しごく適当・適切に応えているつもりだが？」</p>
<p>「……ああ、そうだろうさ」</p>
<ul class="choices">
  <li>通路は北（<a href="p1032.xhtml">一〇三二</a>）、西（<a href="p1013.xhtml">一〇一三</a>）に続いている。</li>
</ul>
