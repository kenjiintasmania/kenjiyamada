<p class="chname">巨蟹宮</p>
<h2 class="pnum">623</h2>

<p>　床のゲートから下の小部屋に飛び降りた。着地の振動で、グラグラグラと床が揺れている。天井と左壁にゲートが見える。</p>
<ul class="choices">
  <li>上の部屋へ上がるなら<a href="p625.xhtml">６２５</a>へ進む。</li>
  <li>左の部屋に入るなら<a href="p613.xhtml">６１３</a>へ進む。</li>
</ul>

</section>
