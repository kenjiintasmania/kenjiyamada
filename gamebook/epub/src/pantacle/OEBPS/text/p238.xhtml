<p class="chname">獅子宮</p>
<h2 class="pnum">238</h2>

<p>　スイッチを押すと、石壁が床と擦れてゴゴゴと音を立てながらスライドし、北側へと行けるようになった。隠し扉だったのだ。ぼくが心を踊らせながら、隠し部屋へと身を躍らせると、ほどなくして背後で隠し扉が自動的に閉じた。</p>
