<p class="chname">処女宮</p>
<h2 class="pnum">1050</h2>

<p>　行き止まりだった。</p>
<p>　行き止まりの壁に荒い文字が刻まれている。</p>
<p>『なんだ、この通路は！　ここはコンクリ（混合粘着クリーム）で埋め立てろと言ったろうが！　なぜこんな無意味な空間を残してしまったのだ！？　お前をコンクリで埋めてやろうか！？　これでは出鱈目に見えて実は緯度と経度を正確に計測できるようにした私の計画が台無しなのである！！』</p>
<p>　何を言ってるのかよくわかないが、他人が怒っていると自分の怒りが収まるものらしく、疲れてるのに行き止まりに巻き込まれた苛立ちは、雑に解消された。</p>
<ul class="choices">
  <li>通路は東（<a href="p1056.xhtml">一〇五六</a>）にだけ続いている。</li>
</ul>

</section>
