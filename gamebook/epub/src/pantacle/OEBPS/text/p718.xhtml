<p class="chname">天秤宮</p>
<h2 class="pnum">718</h2>

<p>　ホールの出口を探してみるが、そもそも取っ手のようなものがなく、門戸だった部分も壁の中に溶け込み、そもそもどの辺りから入ってきたかさえ自信がない。</p>
<p>――先に進んだほうが建設的だろうな。</p>
<ul class="choices">
  <li>女神像をよじ登るなら<a href="p720.xhtml">７２０</a>へ進む。</li>
  <li>女神像の周囲を回ってみるなら<a href="p715.xhtml">７１５</a>へ進む。</li>
</ul>

</section>
