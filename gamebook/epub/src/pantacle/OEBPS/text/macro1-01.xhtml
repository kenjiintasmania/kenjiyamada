<p class="chname">マクロの街１</p>
<h2 class="pname">蛇夫宮の呪門</h2>

<p>獣帯コンパスが【蠍－獅子】を示している。ぼくは蛇夫宮の呪門のまん前にいる。巫女によると、マクロの街は東西６スクエア×南北６スクエアの区画で構成されており、獣帯コンパスで位置を正確に把握できるそうだ。北側には蛇夫宮があり、西には大かまどのある家屋が見える。東にはぼくらが不時着した岩場があり、南には十字路が見える。</p>
