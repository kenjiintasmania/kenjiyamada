<p class="chname">双児宮</p>
<h2 class="pnum">963</h2>

<p>　カウンターらしき木の台が入口横にあるせいで宿屋かと思ってしまっているが、宿主も宿帳もない。奥には簡単な炊事用具と暖炉があった。</p>
<p>「じゃあ、宿じゃなく料理屋だ」</p>
<p>「うーん、ただの自宅ではないでしょうか」</p>
<p>「寝台の方も見てみるか……」</p>
<p>　星読み表を見ること。十の位が……</p>
<ul class="choices">
  <li>１か４か６か９なら９６６進む。</li>
  <li>それ以外なら<a href="p961.xhtml">９６１</a>へ進む。</li>
</ul>

</section>
