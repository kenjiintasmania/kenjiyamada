<p class="chname">宝瓶宮</p>
<h2 class="pnum">422</h2>

<p>　東西３ブロック×上下２ブロックの空間の東下にいる。東壁に設置されたはしごからは上下に行けるようだ。ふだんは部屋の中央に滝が激しく流れ落ちていて西側へ行けなかったろうが、今は滝が止まっているせいで様子がよく見えた。迷宮内の滝の滝壺だったであろう、部屋中央部分の床には無数の穴が空いており、滝の水はさらに下方へと流れていくようになっていた。そして部屋の西側には、何か亀のようなものがモゾモゾしている。</p>
<ul class="choices">
  <li>部屋の西側へ行くなら<a href="p411.xhtml">４１１</a>へ進む。</li>
  <li>２ブロック上の階まで上がるなら<a href="p414.xhtml">４１４</a>へ進む。</li>
  <li>床の穴からはしごを伝って２ブロック下まで降りるなら<a href="p450.xhtml">４５０</a>へ進む。</li>
</ul>

</section>
