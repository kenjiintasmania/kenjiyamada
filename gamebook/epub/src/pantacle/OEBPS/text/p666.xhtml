<p class="chname">巨蟹宮</p>
<h2 class="pnum">666</h2>

<p>――どうせ、すぐに立ち上がるんだろう？</p>
<p>　足場の悪さにイラつきながら、ぼくはあえて通路を左側へと進んだ。もう１ブロック進めば６ブロック通路の左端へとたどり着く。子ガニたちは（当然ながら）道を右折せず、ぼくを追って直進してくる。もう１ブロック進むと、通路の左端にたどり着くが、そこで道は下方向へと折れており、このまま進めば落ちることになる。だが子ガニに追われるぼくに選択肢はなかった。</p>
