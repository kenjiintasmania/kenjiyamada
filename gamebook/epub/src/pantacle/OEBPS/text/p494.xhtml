<p class="chname">宝瓶宮</p>
<h2 class="pnum">494</h2>

<p>　東西４ブロック幅の通路の西から２ブロック目にいる。この通路は、すべてのブロックから北へと道がつながっている。ここから北を見ると、２ブロック先で高い塔に突き当たり、その壁には扉がついているのが分かる。</p>
<ul class="choices">
  <li>北に見える扉まで進むなら<a href="p496.xhtml">４９６</a>へ進む。</li>
  <li>東へ１ブロック進むなら<a href="p465.xhtml">４６５</a>へ進む。</li>
  <li>西へ１ブロック進むなら<a href="p492.xhtml">４９２</a>へ進む。</li>
</ul>

</section>
