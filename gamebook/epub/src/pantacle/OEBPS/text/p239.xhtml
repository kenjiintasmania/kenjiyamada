<p class="chname">獅子宮</p>
<h2 class="pnum">239</h2>

<p>　南北２ブロック×東西１ブロックの部屋にいる。部屋の北側には上に登る螺旋階段があり、東壁の南側には扉がある。南壁には肉を喰らうライオンとそのたてがみを撫でる女性のレリーフが刻まれており、プレートには『従者をもてなすキュベレー様』と銘打たれていた。</p>
<ul class="choices">
  <li>螺旋階段を登るなら<a href="p230.xhtml">２３０</a>へ進む。</li>
  <li>東壁の南側には扉に入るなら<a href="p237.xhtml">２３７</a>へ進む。</li>
</ul>
