<p class="chname">宝瓶宮</p>
<h2 class="pnum">484</h2>

<p>　ぼくは敵に背を向けて、北へと走り出した。</p>
<p>　そのぼくの後頭部を硬いものが直撃し、ぼくは気を失ったのだが、それが何だったのか知るすべもない。ぼくは命も失ったからだ。</p>
