<section id="scorpio-18" class="paragraph">
<p class="chname">天蝎宮</p>
<h2 class="pname">Q</h2>

<p>　ぼくは飛射角で壁に穴をあけると同時に中へと飛び込んだ。</p>
<p>　ぼくは東西１ブロック×南北１ブロックの部屋にいる。出入口はなく、自分がぶち破ってきた西壁にだけ穴が空いている。床の中央で長い尾骨がグリグリと回転するように蠢いている。これが毒尾の根本だということは直感でわかった。同時に、もうタイムリミットが近いということも。</p>
<ul class="choices">
  <li>北の壁をぶち破るなら１カウント追加して<a href="scorpio-22.xhtml">U</a>へ</li>
  <li>東の壁をぶち破るなら１カウント追加して<a href="scorpio-20.xhtml">S</a>へ</li>
  <li>南の壁をぶち破るなら１カウント追加して<a href="scorpio-23.xhtml">V</a>へ</li>
  <li>カウントが２１以上になったら<a href="scorpio-27.xhtml">Z</a>へ</li>
</ul>

</section>
