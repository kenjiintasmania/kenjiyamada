<p class="chname">巨蟹宮</p>
<h2 class="pnum">681</h2>

<p>　左右４ブロックの通路の左端にいる。カニさんが立ち上がるとともに１ブロック後方（下方）へとぼくは滑り落ち、そこで絶望を目にする。そこも左右４ブロックの通路なのだが、そこはすでに子ガニギャング団で埋め尽くされていたのだ。</p>
<p>――どれだけいるんだ！</p>
<p>　当然、前方（上方）からも子ガニどもは追いすがってきており、ぼくは、これから、洗礼の儀式を受けることだろう……</p>
