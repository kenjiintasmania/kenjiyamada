<p class="chname">処女宮</p>
<h2 class="pnum">1022</h2>

<p>　二刀のクレセントは、なんと９ピンを置いたうえで、華麗に鉄球をかわして帰還した。</p>
<p>　一方、アバドンは肩の肉片が弾け飛ばして、なんとか帰ってきたが、置けたのは予告通りの８ピンだけだ。これはアバドンではなく、ぼくが悪い。</p>
<p>「では、あんたらのことは好きにさせてもらうッスよ」そう言うと、クレセントの腰に吊られていた二振りの湾刀が閃いた。「オイラの望みは、一時的に不戦の協定を解いて、不遜な侵入者の首を狩ること。お疲れ様でしたッス」</p>
<p>　ぼくとアバドンの首が宙を待った。アバドンは程なく生き返るだろうが……ぼくは無理だ。</p>
