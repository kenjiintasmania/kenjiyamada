<p class="chname">宝瓶宮</p>
<h2 class="pnum">404</h2>

<p>　すべての体力を失って、ぼくは倒れた。もう動くことはできない。冒険もここで終わりだ。</p>
<p>　星読み表とカリスマ値を０に戻して、最初からやりなおすこと。武器も道具も魔法も築き上げた信頼も、最初からやり直しというわけだ。<a href="p001.xhtml">１</a>へ進め。</p>
<p>　ただし、前作パンタクル２で経験記号「Ｍ」を記していた場合、<a href="p406.xhtml">４０６</a>へ進め。</p>
