<p class="chname">巨蟹宮</p>
<h2 class="pnum">672</h2>

<p>　左右６ブロックの通路の左端から２ブロック目にいる。カニ型迷宮が立ち上がったので、先ほどまで後ろ側の壁だった部分が床になっており、ぼくは流動体と格闘しながら微速前進している。１ブロック先で前方（上方）にも曲がれそうだ。</p>
<p>――いまカニさんは中くらいの砂丘あたりだろうな。このあと大きな砂丘へと向かうから、もう１ブロックはこのまま歩けそうだ。</p>
<p>　ぼくは子ガニから逃げながら、さらに左側のブロックへと進んだ。</p>
