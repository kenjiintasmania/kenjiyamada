<p class="chname">巨蟹宮</p>
<h2 class="pnum">668</h2>

<p>――不吉な金曜日と、業界の定番か。簡単だね。</p>
<p>　ぼくはプレートの数字を、２つの数字を排除した数字へと変更した。すると、そのプレートが地面へと沈んでいった。そして、ガチンという音とともに迷宮の動きが停止した。</p>
<p>――ボタンて、もしかしてプレートの方だったのか。</p>
<p>　前方（天井）に張り付いた目玉がポロリンと外側へ剥がれ落ちた。ぼくは迷宮から脱出できるようになった。</p>
