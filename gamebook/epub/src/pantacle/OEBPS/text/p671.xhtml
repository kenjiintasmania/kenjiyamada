<p class="chname">巨蟹宮</p>
<h2 class="pnum">671</h2>

<p>　ぼくは曲がり角にいる。前後（上下）２ブロックの通路の前側で、左右６ブロックの通路の左端という位置関係だ。右は２ブロック先に前方（上方）に折れる道が見える。後ろ（下）からは無数の子ガニが殺到してくる。しかし、先ほどまで海岸にスライディングしてたカニさんが起き上がろうとしているらしく、このままではぼくは殺到する子ガニの群れの中にダイビングすることになる。</p>
<p>――右へ進むしかない！</p>
