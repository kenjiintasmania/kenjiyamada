<p class="chname">獅子宮</p>
<h2 class="pnum">211</h2>

<p>　入口から２つ北のブロックにいる。通路の左右には、獅子の胴からコウモリの翼とサソリの尻尾が生えた幻獣をあしらったレリーフが並んでいる。入口から流れ込む風を受けたかのように、老人のような獅子の顔のあごヒゲが通路の奥へとなびいていた。</p>
<ul class="choices">
  <li>北へと通路を進むなら<a href="p212.xhtml">２１２</a>へ進む。</li>
  <li>南へと通路を戻るなら<a href="p210.xhtml">２１０</a>へ進む。</li>
</ul>

</section>
