<p class="chname">天蝎宮</p>
<h2 class="pnum">340</h2>

<p>　東と西に扉があり、南には３ブロックの長さの通路が伸びている。通路全体がガタガタ揺れているでの吐きそうだ。西の扉には『まざるな危険』という張り紙がしてある。</p>
<ul class="choices">
  <li>あえて西の扉に入るなら<a href="p344.xhtml">３４４</a>へ進む。</li>
  <li>いったん東の扉に入るなら<a href="p349.xhtml">３４９</a>へ進む。</li>
  <li>とりあえず通路を南に進むなら<a href="p338.xhtml">３３８</a>へ進む。</li>
</ul>

</section>
