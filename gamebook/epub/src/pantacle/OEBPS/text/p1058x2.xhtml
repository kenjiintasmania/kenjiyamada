<p class="chname">処女宮</p>
<h2 class="pnum">1058</h2>
<p class="memo">※ 同じ番号の定義が複数あります（デバッグ一覧参照）</p>
<p>　ヒント２の文字盤の最初には、</p>
<p>『元服前の若造でも解けるのに、ヒントを読むのだな？　本当にそれでよいのだな？』</p>
<p>　と書かれていた。</p>
<ul class="choices">
  <li>それでもヒントを読むなら<a href="p1053.xhtml">一〇五三</a>へ進む。</li>
  <li>ヒントを読まずに謎を解くなら<a href="p1096.xhtml">一〇九六</a>へ戻る。</li>
</ul>
