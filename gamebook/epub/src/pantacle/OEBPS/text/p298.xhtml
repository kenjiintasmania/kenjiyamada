<p class="chname">獅子宮</p>
<h2 class="pnum">298</h2>

<p>　ぼくは、あえて逆方向へ走った。</p>
<p>――これで合ってるのか、メスロン？</p>
<p>　自問自答する。北西の床石が南へ移動する前に、東側へと戻る。もし今スイッチを押せば、南へと移動していた５層北側の床石は西へと動くことになる。</p>
<p>――ものは試しだ！</p>
<p>　ぼくは床のスイッチを押した。ゴンと音がして、元の位置に戻ろうとしていた西側の床を押し止める。</p>
<ul class="choices">
  <li>このまま床石に乗って西へ進むなら<a href="p257.xhtml">２５７</a>へ進む。</li>
  <li>床石が移動し始める前に東へ走るなら<a href="p261.xhtml">２６１</a>へ進む。</li>
  <li>床石が移動し始める前に南へ走るなら<a href="p263.xhtml">２６３</a>へ進む。</li>
</ul>

</section>
