<p class="chname">双児宮</p>
<h2 class="pnum">913ーＢ</h2>

<p>　道は南北と西へ向かっている。</p>
<p>――はて。</p>
<p>「こんな道だったかしら」</p>
<p>　リオネも首をかしげている。</p>
<ul class="choices">
  <li>北に進む<a href="p000.xhtml">ならへ進む。</a></li>
  <li>西に進むなら<a href="p915.xhtml">９１５</a>へ進む。</li>
  <li>南に進むなら<a href="p911.xhtml">９１１</a>へ進む。</li>
</ul>
