<p class="chname">宝瓶宮</p>
<h2 class="pnum">445</h2>

<p>　ぼくは水車が移動しきってから、その水車の上部に飛び乗った。</p>
<p>　東寄りに移動していた水車の西側へ着地したぼくは、グルルと西側へと水車ごと回転し、高さ２ブロック×東西３ブロックの空間の西下へと着地した。</p>
<p>西壁の足元に穴が空いており、そこからはしごが２ブロックしたまで伸びている。</p>
<p>水車の足元の排水口を除けば、先に進めるのは、そのはしごしかない。</p>
<ul class="choices">
  <li>ぼくは迷わずはしごを伝って降りた。<a href="p460.xhtml">４６０</a>ヘ進む。</li>
</ul>

</section>
