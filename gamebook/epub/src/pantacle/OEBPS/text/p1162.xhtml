<p class="chname">人馬宮</p>
<h2 class="pnum">1162</h2>

<p>　柱だけの第４層を、風が吹き抜けている。</p>
<p>　ここは７つの正六角形からなるフロアの北東ブロックだ。床には２つの呪印が描かれている。</p>
<p>♑：磨羯宮の象形。その呪印に触れたのち、右手の人差し指を天に向けて突き上げよ。暗闇を分かつ雷光は周囲を照らし、かつ、雷撃は相対する敵を討つだろう。</p>
<p>♐：人馬宮の象形。その呪印に触れたのち、右腕を振り上げることで、呪力は無数の矢となり、流星のごとく降り注ぐことだろう。</p>
<ul class="choices">
  <li>北西のブロックへ向かうなら<a href="p1167.xhtml">１１６７</a>へ進む。</li>
  <li>南西のブロックへ向かうなら<a href="p1169.xhtml">１１６９</a>へ進む。</li>
  <li>南のブロックへ向かうなら<a href="p1165.xhtml">１１６５</a>へ進む。</li>
</ul>

</section>
