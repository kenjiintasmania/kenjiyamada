<p class="chname">天蝎宮</p>
<h2 class="pnum">331</h2>

<p>　大きな作業机の上には、設計図らしきものが広げられていた。『足×４、腕×２、尾×１、御者席×１』と書かれている。</p>
<p>「なんだこりゃ」</p>
<p>　意味深ではあるのだが、手書きの図が汚くてよくわからない。</p>

  <li>小さな机を見るなら<a href="p337.xhtml">３３７</a>へ進む。</li>
  <li>床を漁るなら<a href="p339.xhtml">３３９</a>へ進む。</li>
  <li>部屋を出るなら<a href="p335.xhtml">３３５</a>へ進む。</li>
