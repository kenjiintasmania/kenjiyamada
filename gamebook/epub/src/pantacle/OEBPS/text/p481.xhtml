<p class="chname">宝瓶宮</p>
<h2 class="pnum">481</h2>

<p>　東西７ブロックの通路の西端にいる。</p>
<p>　東には通路が続いており、南には格子扉が設置されている。格子扉の向こうには薄暗い空と、淀んだ滝底の水が、ゆるゆると揺れていた。</p>
<ul class="choices">
  <li>今いる通路の中央あたりまで東へ進むなら<a href="p455.xhtml">４５５</a>へ進む。</li>
  <li>南の格子扉を抜けるなら<a href="p478.xhtml">４７８</a>へ進む。</li>
</ul>

</section>
