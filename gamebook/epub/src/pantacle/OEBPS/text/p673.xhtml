<p class="chname">巨蟹宮</p>
<h2 class="pnum">673</h2>

<p>　左右６ブロックの通路の右端から３ブロック目にいる。カニさんが波へダイビングして腹ばいになったので、ここで前方（上方）へ曲がることもできる。後ろからは子ガニが狭てきている。</p>
<ul class="choices">
  <li>前方（上方）へ曲がるなら<a href="p677.xhtml">６７７</a>へ進め。</li>
  <li>通路をまっすぐ進むなら<a href="p679.xhtml">６７９</a>へ進め。</li>
</ul>
