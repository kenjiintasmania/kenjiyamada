<p class="chname">獅子宮</p>
<h2 class="pnum">279</h2>

<p>　東西１ブロック×南北１ブロックの部屋にいる。目の前には上にのぼる螺旋階段が、南には隠し扉を開くスイッチがある。東の壁にも小窓があるが、出入りできるほど大きくはない。おそらく食事をやり取りする小窓なのだろう。</p>
<p>――あるいは食物のある場所へ新鮮な空気を送り込んでいるのかも。</p>
<p>　小窓の向こうの調理台を見ながら思った。</p>
<ul class="choices">
  <li>上り階段をあがるなら<a href="p202.xhtml">２０２</a>へ進む。</li>
  <li>南の隠し扉を開けるなら<a href="p237.xhtml">２３７</a>へ進む。</li>
</ul>
