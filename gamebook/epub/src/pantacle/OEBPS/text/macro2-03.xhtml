<h2 class="pname">鍛冶屋</h2>

<p>鍛冶屋には大きな窯と、無数の鍛冶道具と、タウルスがいた。</p>
<p>「よう、メスロン。だいぶ準備が整ってきたぞ。あとは貴重な鉱石でも見つけてきてくれれば、いろいろ作ってやろう」</p>
<p>タウルスが言った。</p>
