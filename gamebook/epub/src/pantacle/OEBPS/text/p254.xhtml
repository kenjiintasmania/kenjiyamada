<p class="chname">獅子宮</p>
<h2 class="pnum">254</h2>

<p>　ぼくは、しばらく呆然としていた。</p>
<p>　キュベレーの自害という、恐るべき結末に。</p>
<p>　その後、ゆっくりと周囲を確認した。</p>
<p>　東西３ブロック×南北２ブロックの部屋２つが、１×１ブロックの通路でつながっている、ピラミッドの最奥。しかしぼくには、気になる箇所があった。</p>

  <li>東側の部屋の南壁を調べるなら<a href="p276.xhtml">２７６</a>へ進む。</li>
