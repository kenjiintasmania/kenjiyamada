<p class="chname">獅子宮</p>
<h2 class="pnum">268</h2>

<p>　幸か不幸か、目の前の壁画は頑丈に作られていて、壊れるどころか欠片さえ飛び散らなかった。あらためて壁画に触れてみると、故国シャンバラーではお目にかかれないような珍しい硬石を削り出して作られていることがわかった。頑丈なかわりにとても重くてなかなか交易されていない貴重な岩石だ。船さえ沈みかねない重さの岩石なので、もしかするとこの島原産なのかもしれない。</p>
<p>――タウルスがわざわざ旅してくるわけだ。</p>
<p>　<a href="p271.xhtml">２７１</a>へ戻る。</p>
