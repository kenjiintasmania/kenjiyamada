<p class="chname">獅子宮</p>
<h2 class="pnum">258</h2>

<p>　ぼくはアゾットの副官キュベレーを倒すことに成功した。</p>
<p>「フフ……アゾット様が金龍から不死力を得るのも時間の問題。私は十分に貢献できた……満足です、フフ」</p>
<p>　不気味な笑みを浮かべたまま、キュベレーは息絶えた。</p>
<p>　<strong>星読み表に５０</strong>を出すこと。</p>
<ul class="choices">
  <li><a href="p273.xhtml">２７３</a>へ進む。</li>
