<p class="chname">天蝎宮</p>
<h2 class="pnum">334</h2>

<p>　ぼくは、すぐに部屋を出ようとした。</p>
<p>　……なんで？</p>
<p>　処置をしなければ、とも思えないほど動転していたのだろうか。しかし扉を開けたところで膝がガクッと折れた。次に上半身も力を失って床に突っ伏してしまった。顔面を強打したが痛くなかった。猛毒が全身に回ってすでに痛覚まで麻痺しているからだ……などと考えているうちに意識も薄れ、ぼくは永遠に眠ることとなった。</p>
