<p class="chname">巨蟹宮</p>
<h2 class="pnum">602</h2>

<p>　ハンドルを回すと『１４』という数字で止まるようになっていた。活動停止にふさわしい不吉な数字だ。</p>
<p>――さて、次はどうするか。</p>
<ul class="choices">
  <li>前（旧天井側）へゲートを抜けるなら<a href="p622.xhtml">６２２</a>へ進む。</li>
  <li>後ろ（旧床側）へゲートを抜けるなら<a href="p628.xhtml">６２８</a>へ進む。</li>
</ul>

</section>
