<p class="chname">白羊宮</p>
<h2 class="pnum">510</h2>

<p>　ぼくは白羊宮の前にいる……はずだった。</p>
<p>　しかし、目の前にうっすらと呪門が見えるだけで、周囲の景色は何も見えなかった。</p>
<p>　ぼんやりと白くかすんでいるだけで、朝モヤの中にいるようだった。</p>
<p>　あるいは夢の中か。</p>
<p>　手探りで行くしかなさそうだ。</p>
<p>　目の前にある<a href="aries-01.xhtml">【呪門】</a>に触れてもいいし、目の前の<a href="aries-02.xhtml">【モヤ】</a>に触れてみてもいい。</p>
