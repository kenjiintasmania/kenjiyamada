<p class="chname">獅子宮</p>
<h2 class="pnum">230</h2>

<p>　縦横２×２ブロックの部屋にいる。北壁の東寄りに螺旋階段がついており、北壁の西寄りと、南壁の西寄りには扉がある。壁沿いには小剣や曲剣、革鎧などの武具が掛けられており、部屋の中央にはがっしりした卓に干し肉や果物などの食物が乱雑に積まれている。冒険の旅をしていると、この手の風景に出会うことがある。兵舎だ。兵士の姿は見えない。</p>
<ul class="choices">
  <li>卓上を調べてみるなら<a href="p233.xhtml">２３３</a>へ進む。</li>
  <li>北の扉に入る<a href="p235.xhtml">２３５</a>ならへ進む。</li>
  <li>北東の螺旋階段を降りるなら<a href="p239.xhtml">２３９</a>へ進む。</li>
  <li>南の扉から出るなら<a href="p270.xhtml">２７０</a>へ進む。</li>
</ul>

</section>
