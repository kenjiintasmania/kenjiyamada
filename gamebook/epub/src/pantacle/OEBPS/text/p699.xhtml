<p class="chname">巨蟹宮</p>
<h2 class="pnum">699</h2>

<p>　ぼくは目ん玉の取れた部分から迷宮外に脱出した。ぼく以外に巫女と、楽器弾きの男が迷宮から這い出して来ていた。</p>
<p>「助かりました。それに、迷宮が爆破されずに残ったことで、海の掃除にも使えそうです。ありがとうございました」巫女がぼくに感謝した。</p>
<p>　<strong>カリスマ値に１</strong>を加えること。</p>
<p>　また<strong>星読み表に５００</strong>を加えること。</p>
<ul class="choices">
  <li>ぼくは静かになった海と砂丘に別れを告げ、<a href="p001.xhtml">オフィユカス島の【呪門】</a>まで帰還した。</li>
</ul>
