<p class="chname">宝瓶宮</p>
<h2 class="pnum">433</h2>

<p>　ゴトンと錠前が開いた。</p>
<p>「よし」</p>
<p>　天才魔道士にとって、謎掛けなどは退屈な午後のおやつにもならないのだ。</p>
<p>　開いた扉の先は１ブロック四方の小部屋で、床中央の螺旋階段から１ブロック下層へと降りられるようになっていた。</p>
<p>「あれっ？」</p>
<p>　ぼくは素っ頓狂な声を上げてしまった。下の階へ降りられる、だって？</p>
<ul class="choices">
  <li>ぼくは記録（あるいは記憶）してきたマップをよく確かめながら螺旋階段を降りていった。<a href="p421.xhtml">４２１</a>へ進め。</li>
</ul>

</section>
