<p class="chname">双児宮</p>
<h2 class="pnum">960ーＢ</h2>

<p>　東西８ブロック✕南北９ブロックの双児宮の南東端にいる。</p>
<p>　東西２ブロック✕南北９ブロックの東庭園の南東端とも言える。</p>
<p>　ここには通路がなく、庭園周辺の柵も飛び越えられそうにない。</p>
<p>　というよりも、その先の風景が曖昧で、ここがどうやら異空間であるようだった。</p>
<p>　柵の隙間から手を伸ばそうとすると、ぐにゃりと景色が歪んだ。</p>
<p>「お気をつけて。無理やり外へ出ようとすると、一生戻れないかもしれません」リオネが諭した。</p>
<p>「もう少し探索するしかないか」</p>
<p>　ぼくらは東庭園中央へと戻った。</p>
