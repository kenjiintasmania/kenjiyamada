<p class="chname">宝瓶宮</p>
<h2 class="pnum">479</h2>

<p>「何もない……か」</p>
<p>　水飛沫を浴びながら、ぼくはつぶやいた。</p>
<p>　何もない行き止まりだった。たまにヒントもバトルも何もない行き止まりがあったりすると、ぼくは迷宮作家に思いを馳せる。それは構造上必要な行き止まりだったのか、探索者をイラつかせるギミックなのか、はたまた単なる怠慢なのか。</p>
<p>　ぼくは最後の理由でないことを祈りながら道を引き返した。</p>
