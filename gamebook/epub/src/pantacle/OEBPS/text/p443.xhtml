<p class="chname">宝瓶宮</p>
<h2 class="pnum">443</h2>

<p>「えいやっ」</p>
<p>　落ちてくる滝とともに大穴に飛び込むと、すぐ１ブロック下で滝の水流は流れを変え、ぼくは東（だと思われる方向）へと２ブロック流された。</p>
<p>「うぷっ」</p>
<p>　そこで水流は混濁し、ぐるぐると渦を巻き、ぼくはとうとう滝の水を飲み込んでしまった！</p>
<p>　パニック状態になり、そして徐々に意識を失いつつあるぼくの目に、不思議なものが映った。</p>
<p>――あれ、キリンさんが見える……水の中なのに。</p>
<ul class="choices">
  <li>ぼくは意識を失いつつ……<a href="p444.xhtml">４４４</a>へ進め。</li>
</ul>

</section>
