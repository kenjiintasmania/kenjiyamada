<p class="chname">巨蟹宮</p>
<h2 class="pnum">664</h2>

<p>　左右６ブロックの通路の右端から４ブロック目にいる。カニさんが波へとダイビングしたせいで、ぼくも９０°転がされる。今なら前方（上方）にも左方にも行けそうだ。</p>
<p>　右方から迫る子ガニから逃げて、どちらへ向かうか。</p>
<ul class="choices">
  <li>前方へ逃げるなら<a href="p665.xhtml">６６５</a>へ進む。</li>
  <li>左方へ逃げるなら<a href="p666.xhtml">６６６</a>へ進む。</li>
</ul>

</section>
