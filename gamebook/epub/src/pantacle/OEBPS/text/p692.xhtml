<p class="chname">巨蟹宮</p>
<h2 class="pnum">692</h2>

<p>　左右４ブロックの通路の右から２ブロック目にいる。子ガニの進軍速度は低下したものの、このまま右へ進んでも行き止まりになっているようだった。どこかで通路を引き返し、前方（上方）へと進む必要がある。</p>
<ul class="choices">
  <li>すぐに左へと引き返すなら<a href="p694.xhtml">６９４</a>へ進む。</li>
  <li>ひと呼吸おいてから引き返すなら<a href="p697.xhtml">６９７</a>へ進む。</li>
  <li>通路の右端に行ってから引き返すなら<a href="p687.xhtml">６８７</a>へ進む。</li>
</ul>

</section>
