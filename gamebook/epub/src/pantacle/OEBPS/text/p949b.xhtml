<section id="p949b" class="paragraph">
<p class="chname">双児宮</p>
<h2 class="pnum">949ーＢ</h2>

<p>「ぉおっと！」</p>
<p>　ぼくは肝を冷やした。</p>
<p>　何も無いと思っていた突き当りの壁の足元に、衰弱したドルイドが倒れていたからだ。黒いローブが裏路地の暗さに溶け込んで、判別がつかなかったのだ。ローブと装飾から見て、双児宮を支配するべく遣わされた中級ドルイドのようだが。</p>
<p>「息はあるようです」とリオネ。</p>
<p>「でも反応はないね」とぼく。</p>
<p>「夢でも見てるような状態でしょうか」</p>
<p>「生かさず殺さずか……誰がやったのかな」</p>
<p>　自分たちがこうならないようにしなければいけない。ぼくらは道を戻った。</p>
