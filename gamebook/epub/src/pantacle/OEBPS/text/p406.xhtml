<h2 class="pnum">406</h2>

<p>　目が覚めると、ぼくは滝壺の飛び石の淵に引っかかるように倒れていた。死体だと思って捨てられたのだろうか。そのままもう一度溺れ死ななかったのは僥倖だ。ぼくは浮石に上がり、改めて滝を見上げた。</p>
<p>　記号「Ｍ」を消しておくこと。</p>
