<p class="chname">獅子宮</p>
<h2 class="pnum">231</h2>

<p>　ぼくは部屋に違和感を感じていた。</p>
<p>――貴賓室だというなら客用の出入り口以外に、主が使う出入り口もありそうなものだが。</p>
<p>　しかし西壁以外に出入り口はないように見える。強引に飛射角で壁を破壊してもいいが、この建築物に傷をつけるのは何となくはばかられた。</p>
<p>――隠し扉をつけるなら、どこだろうか。</p>
<ul class="choices">
  <li>東壁だと思うなら<a href="p222.xhtml">２２２</a>へ進む。</li>
  <li>南壁の東側だと思うなら<a href="p224.xhtml">２２４</a>へ進む。</li>
  <li>南壁の西側だと思うなら<a href="p226.xhtml">２２６</a>へ進む。</li>
  <li>北壁の東側だと思うなら<a href="p228.xhtml">２２８</a>へ進む。</li>
  <li>北壁の西側だと思うなら<a href="p236.xhtml">２３６</a>へ進む。</li>
  <li>西壁の扉から出ていくなら<a href="p239.xhtml">２３９</a>へ進む。</li>
</ul>

</section>
