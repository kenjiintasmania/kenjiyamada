<p class="chname">双児宮</p>
<h2 class="pnum">930</h2>

<p>　南北７ブロックの通路の北から３ブロックめにいる。西側には素朴な装飾の木製扉があり、となりの１ブロック南側にも頑丈な鉄製の扉が見える。</p>
<ul class="choices">
  <li>北へ２ブロック進むなら<a href="p925.xhtml">９２５</a>へ進む。</li>
  <li>南へ１ブロック進むなら<a href="p923.xhtml">９２３</a>へ進む。</li>
  <li>木製の扉に入るな<a href="p969.xhtml">９６９</a>へ進む。</li>
</ul>

</section>
