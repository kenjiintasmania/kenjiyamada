<p class="chname">パンタクル終盤</p>
<h2 class="pname">ありがとう</h2>

<p>「ありがとう」</p>
<p>　と言って、ぼくはリオネの手を取った……と思った。お互いの伸ばした手がすれ違ったとき、まだ揺れているせいだと思った。リオネの左手の中指だけが伸びてきた時、強烈な既視感が襲ってきた。どこかで見た仕草。見慣れた術式。</p>
<p>「まさか……」</p>
<p>　その中指はそっと、しかし確実にぼくの胸に突き刺さり、ぼくはさっきの巫女のように倒れ込んだ。体中におぞましい何かが駆け巡り、ぼくは……絶命した。</p>
<p>　最後に聞いたのは「今までありがとう、メスロン」というリオネの声だった。</p>
