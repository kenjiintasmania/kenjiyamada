<p class="chname">天蝎宮</p>
<h2 class="pnum">335</h2>

<p>　東に扉があり、北には５ブロックの長さの通路が伸びている。</p>
<p>「痛っ！」</p>
<p>　通路全体がそうとう揺れているため、体がはずんだ拍子に舌を噛んでしまったのだ。まあ、回復呪文を唱えるほどではないのだけれど。</p>
<ul class="choices">
  <li>東の扉に入るなら<a href="p333.xhtml">３３３</a>へ進む。</li>
  <li>通路を北に進むなら<a href="p327.xhtml">３２７</a>へ進む。</li>
</ul>

</section>
