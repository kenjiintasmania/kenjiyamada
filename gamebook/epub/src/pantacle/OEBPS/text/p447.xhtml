<p class="chname">宝瓶宮</p>
<h2 class="pnum">447</h2>

<p>　東西３ブロック×上下２ブロックの空間の東下にいる。しかし中央には滝が激しく流れ落ちていて西側へ行けない。滝の途中に岩の突起が北壁面から突き出ているせいで、周囲にも水煙が飛び散っている。晴れた日に滝壺から見上げれば、滝中滝としてちょっとした景観となっただろう。太陽を失った今は、さほどでもないが。</p>
<p>　滝の向こうへは行けないが、東壁には上下に行けるはしごが設置されていた。</p>
<ul class="choices">
  <li>２ブロック上の階まで上がるなら<a href="p424.xhtml">４２４</a>へ進む。</li>
  <li>床の穴からはしごを伝って２ブロック下まで降りるなら<a href="p450.xhtml">４５０</a>へ進む。</li>
</ul>

</section>
