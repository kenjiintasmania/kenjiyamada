<p class="chname">獅子宮</p>
<h2 class="pnum">261</h2>

<p>　床石が移動し始める前に東へと走った。</p>
<p>　その先には……北東の床石があった。</p>
<pre class="grid">■■■</pre>
<pre class="grid">□□■</pre>
<pre class="grid">■□■</pre>
<p>「ん？」</p>
<p>　この北東の床石を動かしても北側には進めない。目的とする紋章の扉には、文字通り手が届かないのだ。</p>
<p>　呆然としているうちに、すべての床石は元の位置へと戻り、第５層とぼくは、ただただ静かになった。</p>
