<p class="chname">天秤宮</p>
<h2 class="pnum">770</h2>

<p>　蓋を半分押し開けたところで、ぼくは手を止めた。</p>
<p>　真っ暗な空間だったからだ。</p>
<p>――おかしいな。外観から判断するに、ここは東側の天秤皿の上のはずだが。</p>
<p>　空くらい見えてもおかしくないのだ。</p>
<p>　だが悩んでいても仕方ない。</p>
<ul class="choices">
  <li>蓋を押し開けて、<a href="p780.xhtml">７８０</a>へ進む。</li>
</ul>
