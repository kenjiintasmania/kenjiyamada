<p class="chname">双魚宮</p>
<h2 class="pnum">1205</h2>

<p>　荒れ狂った海原は、穏やかな波と翠玉の色合いを取り戻していた。これで太陽の光が降り注げば、さらに美しい絶景になるに違いない。そのためには金龍を復活させなければ。</p>
<ul class="choices">
  <li>ぼくは<a href="p001.xhtml">オフィユカス島の【呪門】</a>へ戻った。</li>
</ul>
