<p class="chname">人馬宮</p>
<h2 class="pname">1099</h2>

<p>「９９だ！」</p>
<p>　ぼくはきっちり９９回、数珠を叩きつけ、しばらく待った。</p>
<p>　しかしドゥルガーは昇天するどころか、さらにマナを増し、そしてそれは災禍の渦となってぼくらを打った。手元の数珠が弾け飛び、つづいてぼくも弾け飛んだ。ぼくは往生できるだろうか。</p>
<ul class="choices">
  <li><a href="p1104.xhtml">１１０４</a>へ進む。</li>
