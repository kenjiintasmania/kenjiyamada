<p class="chname">巨蟹宮</p>
<h2 class="pnum">641</h2>

<p>　１×１ブロックの小部屋におり、カニから見て上（天井）と右と左にゲートが見える。ひと部屋程度の高さなら、獅四肢のジャンプで飛び移れるだろう。</p>
<ul class="choices">
  <li>上の部屋に飛び上がるなら<a href="p645.xhtml">６４５</a>へ進む。</li>
  <li>右の部屋に移動するなら<a href="p643.xhtml">６４３</a>へ進む。</li>
  <li>左の部屋に移動するなら<a href="p633.xhtml">６３３</a>へ進む。</li>
</ul>

</section>
