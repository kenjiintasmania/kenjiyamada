<p class="chname">人馬宮</p>
<h2 class="pnum">1172</h2>

<p>　塔の第５層の最初のブロックにいる。</p>
<p>　北東と北西の壁に人型の穴があいており、次のブロックへ進めるようになっている。</p>
<p>　人馬宮の巫女は立ち疲れたのか、北の隅の角にもたれて座って休んでいる。タウルスはそれを気遣って護衛をしているのか、単に彼も疲れたのか、少し離れたところで周囲に目を配っている。</p>
<p>　ぼくは一人で奥のブロックへと足を進めた。</p>
<ul class="choices">
  <li>北東の壁の穴を抜けるなら<a href="p1174.xhtml">１１７４</a>へ進む。</li>
  <li>北西の壁の穴を抜けるなら<a href="p1176.xhtml">１１７６</a>へ進む。</li>
</ul>

</section>
