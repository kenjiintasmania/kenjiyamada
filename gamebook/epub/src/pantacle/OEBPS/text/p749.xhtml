<p class="chname">天秤宮</p>
<h2 class="pnum">749</h2>

<p>　とくに異変は感じない。</p>
<p>　体も多少重いが、ハシゴを登れないというほどではない。</p>
<p>ぼくはハシゴを登り、天井の蓋を押しげて上階へと上がった。</p>
