<p class="chname">双児宮</p>
<h2 class="pnum">965ーＢ</h2>

<p>　夜の双児宮の東庭園にいる。</p>
<p>　幅２ブロック、南北９ブロックの縦長の庭園は、暗がりの中ながら赤と白のバラの花に埋め尽くされていた。</p>
<p>　庭園の北端西側に１ブロック幅の通路が続いているのが、かすかに見える。</p>
<ul class="choices">
  <li>庭園の北端に向かうなら<a href="p970.xhtml">９７０</a>へ進む。</li>
  <li>庭園の南端に向かうなら<a href="p960.xhtml">９６０</a>へ進む。</li>
</ul>

</section>
