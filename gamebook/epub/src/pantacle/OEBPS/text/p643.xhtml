<p class="chname">巨蟹宮</p>
<h2 class="pnum">643</h2>

<p>　１×１ブロックの小部屋におり、左と下にゲートが見える。下の部屋のさらに下にも部屋が続いているらしく、ゲートがいくつか下の階層まで続いているのが見える。</p>
<ul class="choices">
  <li>左の部屋に移動するなら<a href="p641.xhtml">６４１</a>へ進む。</li>
  <li>下の部屋まで落ちるなら<a href="p646.xhtml">６４６</a>へ進む。</li>
</ul>
