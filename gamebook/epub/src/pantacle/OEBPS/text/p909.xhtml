<p class="chname">双児宮</p>
<h2 class="pnum">909</h2>

<p>「そうだ。これを……」ぼくは目と口がバッテンに縫われたクマのぬいぐるみを取り出した。「宮殿内に落ちてたのを渡し忘れていました」</p>
<p>「これは……！」</p>
<p>　巫女が目と口を大きく開いた。</p>
<p>「双子の妹のものです。きっと。考え方やデザインセンスは私と大きく違いましたが、悪い子ではなかったんです」</p>
<p>　いつしか巫女の目から涙が流れていた。</p>
<p>　<strong>カリスマ値に１</strong>を加えること。</p>
<p>　ぼくらは静かに中庭をあとにした。</p>
