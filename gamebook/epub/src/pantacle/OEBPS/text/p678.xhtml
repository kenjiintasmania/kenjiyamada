<p class="chname">巨蟹宮</p>
<h2 class="pnum">678</h2>

<p>　左右４ブロックの通路の左から２ブロック目にいる。カニさんが立ち上がろうとしているから、すぐに左右どちらかに進まなければならない。左は１ブロック先で行き止まりに、右は２ブロック先で同じく行き止まりになっている。ここから前方（上方）にも進めるようになっているが、カニ型迷宮が直立しようとしている以上、すぐにそちらには行けない。後方（下方）ではさすがヘバッたのか速度を落とした子ガニ王国が、それでもジワジワと領土を広げてきつつある。</p>
<ul class="choices">
  <li>左へ進むなら<a href="p682.xhtml">６８２</a>へ進む。</li>
  <li>右へ進むなら<a href="p692.xhtml">６９２</a>へ進む。</li>
</ul>

</section>
