<p class="chname">獅子宮</p>
<h2 class="pnum">214</h2>

<p>　異臭でぼくは目を覚ました。目を開けると自分がワラの上に倒れていることを知った。周囲に腐った肉や残飯などが積まれている。どうやらぼくは死んだと判断され、何かの餌にされるべく残飯置き場へと運ばれたらしい。何の餌にされる予定だったのか考えたくもないが、喰われる前に目が冷めたのは僥倖だ。ぼくは立ち上がり、周囲を見渡した。探索の再開だ。</p>
<p>　記号「Ｍ」を消しておくこと。</p>
