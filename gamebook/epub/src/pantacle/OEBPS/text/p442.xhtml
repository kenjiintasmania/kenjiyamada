<p class="chname">宝瓶宮</p>
<h2 class="pnum">442</h2>

<p>　水濡れた床に足を取られないよう気をつけながら、穴へと近づき、そっと下をのぞき込む。階下は高さ２ブロック、東西３ブロックの空間になっており、その西寄り２×２ブロックに大型の水車が設置されていた。晴れた日に滝壺から見上げれば、ちょっとした水工芸に見えたことだろうが、今は常に暗雲に閉ざされているし、水を止めたことで水車は回っていない。</p>
<ul class="choices">
  <li>部屋の西へ戻るなら<a href="p446.xhtml">４４６</a>へ進む。</li>
  <li>部屋の東へ進むなら<a href="p448.xhtml">４４８</a>へ進む。</li>
</ul>

</section>
