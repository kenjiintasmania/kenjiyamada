<p class="chname">天蝎宮</p>
<h2 class="pnum">320</h2>

<p>　ぼくは今、迷宮の東南の角にいる。北と西に通路が伸びており、南には出入り口の扉がある。北も西もそれぞれの方角の外壁に突き当たるまでまっすぐ８ブロック続いている。入口から入り込んだと思われる砂利が足元でピリピリと振動しており、東南の角の足元からは大きな骨のようなものが２本突き出ている。</p>
<ul class="choices">
  <li>大きな骨を調べてみるなら<a href="p325.xhtml">３２５</a>へ進む。</li>
  <li>北へ歩くなら<a href="p323.xhtml">３２３</a>へ進む。</li>
  <li>西へ歩くなら<a href="p328.xhtml">３２８</a>へ進む。</li>
  <li>マクロの街に戻るなら<a href="p001.xhtml">【呪門】</a>へ進む。</li>
</ul>

</section>
