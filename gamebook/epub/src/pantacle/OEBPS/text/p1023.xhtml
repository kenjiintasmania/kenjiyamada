<p class="chname">処女宮</p>
<h2 class="pnum">1023</h2>

<p>　髭頭のラキュラーは、あっさり９ピンを置いて帰ってきた。</p>
<p>　一方、アバドンは肩の肉片が弾け飛ばしながら、ようよう帰ってきたが、置けたのは予告通りの８ピンだけだ。これはアバドンではなく、ぼくが悪い。</p>
<p>「不戦の協定と言ったな。あれは嘘だ。勝者だけは協定を破る権利が得られる」</p>
<p>　そういってラキュラーはぼくの首筋に牙を突き立てた。敗者は抵抗できないらしく、気がつくとぼくは全身の血を吸い取られ……<strong>一〇〇四にいた</strong>。</p>
<p class="fin">■ 執筆中（この先のジャンプが原稿に未記載） ■</p>
