<p class="chname">宝瓶宮</p>
<h2 class="pnum">489</h2>

<p>　扉を開けると中はかなり暗かった。中央に螺旋階段があり、上階へと続いている。静寂そのもので、人や魚の気配はなかった。ここは高い塔のような構造のようだ。</p>
<ul class="choices">
  <li>階段を上がるなら<a href="p487.xhtml">４８７</a>へ進む。</li>
  <li>扉から出るなら<a href="p496.xhtml">４９６</a>へ進む。</li>
</ul>

</section>
