<p class="chname">双魚宮</p>
<h2 class="pnum">1261</h2>

<p>　キューブ状のテラスにいる。</p>
<p>　通用門のある西側をのぞいて、すべての方角がクリアな氷壁になっており、回遊魚たちが海流に乗って南に泳いでゆくのが見えた。</p>
<p>「そういえば、たまにはこういう話はどうだ」ウェイブヒルが言った。「チョコレイトいやポッポレイポのために、チョコレイトは……いやポポレイポラは旅に出る」</p>
<p>「うーん、だったら<ruby>騎士<rt>ナイト</rt></ruby>じゃなくって<ruby>賢者<rt>メイジ</rt></ruby>とすべきだったのでは？」</p>
<p>「しっ！　メスロン、どこで誰が聞いてるとも限らん。それ以上は物申すな」</p>
<p>　ぼくは大きくうなづいて、そっとテラスを出た。</p>
<ul class="choices">
  <li>西の通用門から<a href="p1272.xhtml">１２７２</a>へ進む。</li>
</ul>
