<p class="chname">処女宮</p>
<h2 class="pnum">1097</h2>

<p>　扉の前にいる。</p>
<p>　北はそこそこ行くと扉が、南はかなり行くと扉があるような気がする。</p>
<p>「ちょっと、わかってきたかな？」</p>
<ul class="choices">
  <li>西には扉（<a href="p1096.xhtml">一〇九六</a>）があり、通路は北（<a href="p1095.xhtml">一〇九五</a>）、南（<a href="p1099.xhtml">一〇九九</a>）に続いている。</li>
</ul>
