<p class="chname">獅子宮</p>
<h2 class="pnum">277</h2>

<p>「決着はついた。お互い死ぬまでやる必要はないだろう」</p>
<p>　ぼくはキュベレーに降伏をうながした。だがお互いの価値観が同じだというのは浅はかな考えだと、すぐに気付かされることになる。キュベレーは、伸ばした左手の指を自分の胸に突き刺したからだ。</p>
<p>「これ以上醜態をさらすことも、次期本部となるピラミッドを傷つけることも、私の美学に反するのです。美しき勝利が得られぬのであれば、私は美しいまま死ぬのみ」</p>
<p>　糸が切れたようにキュベレーが倒れ込んだ。</p>
<p>　まるで眠るように、彼女は、息絶えた。</p>
