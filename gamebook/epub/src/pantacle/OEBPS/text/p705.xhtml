<p class="chname">天秤宮</p>
<h2 class="pnum">705</h2>

<p>　宮殿に平穏が戻っている。</p>
<p>　穏やかな風を受けて、天秤型をした天秤宮の上層階がゆったりと左右に揺れている。バランスとは多少ゆらぎがある方がたもたれるのだ、そんなふうに訴えているようだった。</p>
<p>「勝利の天秤は、あなたに傾きつつあるようですね。メスロン」天秤宮の巫女が言った。「でも、不穏な揺れも感じます。足元からグラつくような揺れを。どうか、気を緩めぬよう」</p>
<p>　不安を煽られただけのようにも感じるが、ぼくは感謝の言葉を述べて天秤宮を去った。</p>
