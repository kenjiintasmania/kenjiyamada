<p class="chname">獅子宮</p>
<h2 class="pnum">220</h2>

<p>　縦横２×２ブロックの部屋にいる。北壁の西寄りに螺旋階段がついており、北壁の東寄りと、南壁の東寄りには扉がある。北の扉には太い閂で、こちら側から閉じられている。壁沿いにスキやワラ、腐った肉や残飯、干からびたサソリなどが積まれている。部屋の中央には粗末な卓があり、食べかけの皿が並んでいる。町や村で生活していると、この手の風景に出会うことがある。動物の飼育小屋だ。飼育員の姿は見えない。</p>
<ul class="choices">
  <li>卓上を調べてみるなら<a href="p223.xhtml">２２３</a>へ進む。</li>
  <li>閂を抜いて、北の扉に入る<a href="p225.xhtml">２２５</a>ならへ進む。</li>
  <li>北西の螺旋階段を降りるなら<a href="p229.xhtml">２２９</a>へ進む。</li>
  <li>南の扉から出るなら<a href="p270.xhtml">２７０</a>へ進む。</li>
</ul>

</section>
