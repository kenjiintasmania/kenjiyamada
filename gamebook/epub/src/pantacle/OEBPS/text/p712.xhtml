<p class="chname">天秤宮</p>
<h2 class="pnum">712</h2>

<p>――さて、問題はどうやってアティスを探すかだが。</p>
<p>　この広いホールに出入口はない。</p>
<p>　中央に女神像があるだけだ。</p>
<ul class="choices">
  <li>女神像をよじ登るなら<a href="p720.xhtml">７２０</a>へ進む。</li>
  <li>女神像の周囲を回ってみるなら<a href="p715.xhtml">７１５</a>へ進む。</li>
  <li>ホールの出口を探してみるなら<a href="p718.xhtml">７１８</a>へ進む。</li>
</ul>

</section>
