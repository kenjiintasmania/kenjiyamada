<h2 class="pname">草原</h2>

<p>　丘の草原では、まばらながら<a href="aries-04.xhtml">【羊たち】</a>が草を<ruby>喰<rt>は</rt></ruby>んでおり、水色の空には<a href="aries-05.xhtml">【白雲】</a>が帯をなしていた。</p>
