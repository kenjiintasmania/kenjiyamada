<p class="chname">巨蟹宮</p>
<h2 class="pnum">630</h2>

<p>　中くらいの砂丘から左手に飛び移ると、潮を招かない左手のハサミの付け根あたりにしがみつくことができた。節足の節目から中に入ると、中は意外にも正確に１×１ブロックの小部屋にだった。</p>
