<p class="chname">パンタクル終盤</p>
<h2 class="pname">忍び寄るアゾット。</h2>

<ul class="choices">
  <li>前作パンタクル２で経験記号「Q」を記していた<a href="finale-05.xhtml">場合</a>、◆へ進め。</li>
</ul>
<p>↓</p>
<p>　懐かしい雰囲気を感じた気がした。それは旧友というよりも、若々しい野望の匂いだ。</p>
<p>「アゾットか」</p>
<p>　振り返るよりも早く、ぼくは看破してみせた。</p>
<p>「やはり、きみとはやりにくいな。メスロン」</p>
