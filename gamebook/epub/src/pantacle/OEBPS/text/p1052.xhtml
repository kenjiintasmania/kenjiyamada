<p class="chname">処女宮</p>
<h2 class="pnum">1052</h2>

<p>　通路はここで行き止まりだった。</p>
<p>　行き止まりの壁に迷宮建設記念の碑が刻まれている。</p>
<p>『不確実性は、迷宮を迷宮たらしめるに必要な要素である。距離の測定を難しくすれば、不確実な距離感のまま迷宮を彷徨うことになる――迷宮作家ラ＝ビリンバス』</p>
<ul class="choices">
  <li>通路は東（<a href="p1062.xhtml">一〇六二</a>）にだけ続いている。</li>
</ul>
