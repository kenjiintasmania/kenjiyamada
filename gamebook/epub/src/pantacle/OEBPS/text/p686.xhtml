<p class="chname">巨蟹宮</p>
<h2 class="pnum">686</h2>

<p>　ひと呼吸おいてから引き返すと、ちょうどカニさんが腹這いになろうとしていた。下層から膨れ上がってくる子ガニ暴力団から逃げるようにぼくは上層側へと走り込んだ。そこで何らかのスイッチが入ったらしく、ぼくの足元に壁（床）がスライドしてきた。</p>
<p>　ぼくは左右２ブロックの部屋に閉じ込められた。</p>
<p>――いや、子ガニから避難できたとも言えるか。</p>
<p>　この状況が幸か不幸かは、すぐに分かるだろう。目の前に大きな円形のボタンが２つついていた。</p>
