<p class="chname">人馬宮</p>
<h2 class="pnum">1127</h2>

<p>　六角形のブロックにいる。</p>
<p>「なんとなくだが、俺はこっちに行きたいな」</p>
<p>　タウルスが東南の扉に近寄っていった。</p>
<p>「どうしたんだ、タウルス。野生の勘でも働いたかい？」</p>
<p>「さあな」</p>
<p>　特に解説する気はない、とばかりにタウルスは手を軽く振った。</p>
<ul class="choices">
  <li>西の壁面に設置された扉を抜けるなら<a href="p1121.xhtml">１１２１</a>へ進む。</li>
  <li>南東の壁面に設置された扉を抜けるなら<a href="p1123.xhtml">１１２３</a>へ進む。</li>
  <li>南西の壁面に設置された扉を抜けるなら<a href="p1113.xhtml">１１１３</a>へ進む。</li>
</ul>

</section>
