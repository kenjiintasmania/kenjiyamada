<p class="chname">天秤宮</p>
<h2 class="pnum">778</h2>

<p>「正しいかどうかは人による！」とぼくは叫んだ。</p>
<p>　ぼくの体が急にフッと軽くなった。</p>
<p>　真実かどうかより、ぼくが信じているかどうかをジャッジされているのかもしれない。</p>
<p>　ともかくも、ぼくの手は障害なくアティスに突き刺さり、アティスは苦悶と憤怒の表情を浮かべたのち……息絶えた。</p>
