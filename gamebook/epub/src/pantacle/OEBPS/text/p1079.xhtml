<p class="chname">処女宮</p>
<h2 class="pnum">1079</h2>

<p>　行き止まりにいる。</p>
<p>　西には定期的に鉄球を跳ね上げる床がある。</p>
<p>　その向こうでアバドンが所在なさげに立っている。</p>
<p>　獅四肢を使えば、問題なく遊技場に戻れるだろう。</p>
<p>　そして、それ以外の選択肢はなさそうだ。</p>
<ul class="choices">
  <li>獅四肢を使って、<a href="p1040.xhtml">一〇四〇</a>へ進め。</li>
</ul>
