<p class="chname">人馬宮</p>
<h2 class="pnum">1125</h2>

<p>　六角形のブロックにいる。</p>
<p>　北西の壁の材質が石材ではなくレンガになっており、魔術を跳ね返すくらいに強固ではあるが、ある種の物質に対して耐性が低そうだった。</p>
<p>「メスロン、わかるか」</p>
<p>「うん、通り抜けられるレンガ壁だね」</p>
<ul class="choices">
  <li>もし前作で<strong>壁抜けパウダー</strong>を手に入れていて、ここで北西壁に使用するなら、壁抜けパウダーを持ち物から消して<a href="p1116.xhtml">１１１６</a>へ進む。</li>
  <li>東の壁面に設置された扉を抜けるなら<a href="p1115.xhtml">１１１５</a>へ進む。</li>
  <li>南東の壁面に設置された扉を抜けるなら<a href="p1119.xhtml">１１１９</a>へ進む。</li>
</ul>

</section>
