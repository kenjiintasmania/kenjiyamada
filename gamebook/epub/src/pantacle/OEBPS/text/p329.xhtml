<p class="chname">天蝎宮</p>
<h2 class="pnum">329</h2>

<p>　通路はここで行き止まりだった。いま来た通路が西にむかって６ブロック続いているだけだが、天井からは想像通り大きな骨が突き出ている。ど派手に揺れており、なかなかシュールな絵面だ。また、突き当りの壁には『玄関から数えて１４ブロック』という奇妙なメモがあった。</p>
<ul class="choices">
  <li>西へ戻ろう。<a href="p322.xhtml">３２２</a>へ進む。</li>
</ul>
