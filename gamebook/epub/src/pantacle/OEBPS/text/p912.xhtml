<p class="chname">双児宮</p>
<h2 class="pnum">912</h2>

<p>　通路の角にいる。</p>
<p>　南は１ブロック先で出入り口の扉に突き当たる。</p>
<p>　西は全６ブロック長の通路になっており、１ブロック先と４ブロック先で北に、突き当りとなる５ブロック先では南に折れている。</p>
<ul class="choices">
  <li>南に進むなら<a href="p911.xhtml">９１１</a>へ進む。</li>
  <li>西に１ブロック進むなら<a href="p913.xhtml">９１３</a>へ進む。</li>
</ul>

</section>
