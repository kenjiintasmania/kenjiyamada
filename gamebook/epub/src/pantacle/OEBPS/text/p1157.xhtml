<p class="chname">人馬宮</p>
<h2 class="pnum">1157</h2>

<p>　第３層の六角形のクリスタルブロックにいる。</p>
<p>　ブロック中央のクリスタル柱には『ミ』という文字が刻まれている。何を意味しているのだろうか。</p>
<ul class="choices">
  <li>西の壁面に設置された扉を抜けるなら<a href="p1131.xhtml">１１３１</a>へ進む。</li>
  <li>南西の壁面に設置された扉を抜けるなら<a href="p1153.xhtml">１１５３</a>へ進む。</li>
  <li>南東の壁面に設置された扉を抜けるなら<a href="p1161.xhtml">１１６１</a>へ進む。</li>
</ul>
