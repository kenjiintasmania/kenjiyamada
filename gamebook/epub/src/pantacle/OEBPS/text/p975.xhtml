<p class="chname">双児宮</p>
<h2 class="pnum">975</h2>

<p>　東西４ブロック、南北１ブロック幅の庭園にいる。</p>
<p>　広くはないが、敷地一面に<ruby>向日葵<rt>ひまわり</rt></ruby>が咲き乱れている。光が差し込むべき南側を双児宮に遮られているせいか、あるいはそもそもゾディアック群島の太陽光が弱まっているせいか、少しでも太陽に近づこうと必死なように見える。</p>
<p>　背の高い向日葵ごしに奥に目をやると、庭園の東西に扉があることが見て取れた。</p>
<ul class="choices">
  <li>東の扉から庭園を出るなら<a href="p939.xhtml">９３９</a>へ進む。</li>
  <li>西の扉から庭園を出るなら<a href="p937.xhtml">９３７</a>へ進む。</li>
</ul>

</section>
