<section id="aries-10" class="paragraph">
<p class="chname">白羊宮</p>
<h2 class="pname">希望の光</h2>

<p>　希望の光とは、そもそも何だろうか。星々の煌めきもそうだろうが、それらは人の心の中に光るものでもあるはずだ。そうだ。ぼくは、その希望の光を取り戻すために闘っているのだった。ドルイドの黒魔術が負の魔力だとすれば、巫女たちの白魔術はプラスの魔力。生命力や希望の力だ。それを取り戻してこそ、ゾディアック群島に本当の光を取り戻すことになるのだ。そのときには金龍に力が戻ることもあるかもしれない。</p>
<p>　ぼくが自分の意志を強くもったせいか、周囲のモヤが少し晴れた気がした。目の前には白羊宮の<a href="aries-01.xhtml">【呪門】</a>と<a href="aries-21.xhtml">【くつろぐ女性】</a>とが見えていた。</p>

</section>
