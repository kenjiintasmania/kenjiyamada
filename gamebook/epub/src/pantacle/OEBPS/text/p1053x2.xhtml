<p>『ヒント２</p>
<p>　ではレシピを解説しよう。</p>
<p>　イチゴにミルクをかけると、五箱できる。</p>
<p>　ミルクを酸でわると、重曹になる。</p>
<p>　では、椀にイチゴをたして、ミルクをかけたものから感謝の気持ちを差っ引いてザクっと割ると、何が残るか。</p>
<p>　それが答えだ』</p>
<p>　なんだ、これは。</p>
<p>　本当に、さっきの問題のヒントなのだろうか。</p>
<p>　出題者は計算しすぎて、気が触れたのだろうか。</p>
<ul class="choices">
  <li><a href="p1096.xhtml">一〇九六</a>へ戻って問題を解け。</li>
