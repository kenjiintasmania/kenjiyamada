<p class="chname">天秤宮</p>
<h2 class="pnum">799</h2>

<p>　天秤宮に平穏が戻った。</p>
<p>「ありがとうございました」巫女がぼくに感謝した。</p>
<p>　これで、またひとつ迷宮が解放された。</p>
<p>　そして、またひとつアゾットに近づいたわけだ。</p>
<p>　カリスマ値に１を加えること。</p>
<p>　また星読み表に１０を加えること。</p>
<ul class="choices">
  <li>ぼくは巫女に別れを告げ、<a href="p001.xhtml">オフィユカス島の【呪門】</a>まで帰還した。</li>
</ul>
