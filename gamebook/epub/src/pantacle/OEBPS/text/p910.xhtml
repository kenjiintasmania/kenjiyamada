<p class="chname">双児宮</p>
<h2 class="pnum">910</h2>

<p>　ぼくらは双児宮の前にいる。</p>
<p>　双児宮は東西８ブロック、南北９ブロックというやや縦長な一階建てになっている。外観はいたって普通のゾディアック様式で、特段双子を想起させるものはなかったが、壮麗にデザインされつつも侵入者を阻む高い格子状の外壁で取り囲まれており、隙間からは色々な花の咲く中庭が見えたが、実際に通れる入り口は南壁の東から２ブロックめに設置された格子門だけのようだった。</p>
<p>「秘密の花園……といった趣ですね」とリオネはつぶやいた。</p>
<ul class="choices">
  <li>ぼくはその格子門を開けて双児宮に入った。<a href="p911.xhtml">９１１</a>へ進む。</li>
</ul>

</section>
