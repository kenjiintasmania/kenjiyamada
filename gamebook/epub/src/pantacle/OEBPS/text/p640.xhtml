<p class="chname">巨蟹宮</p>
<h2 class="pnum">640</h2>

<p>　今いる高い砂丘から右手に飛び移ると、潮を招く右手のハサミの付け根あたりにしがみつくことができた。硬い外殻の節目から中に入ると、中は意外にも正確に１×１ブロックの小部屋になっていた。</p>
