<p class="chname">双児宮</p>
<h2 class="pnum">997</h2>

<p>　そんなすぐに眠れないだろうと思っていたが、ほどよく保温保湿された手入れの良いベッドは、ぼくをすぐに上質な睡眠へといざなった。</p>
<p>　眠りに落ちる瞬間に、一瞬めまいを感じたことなど、ぼくはすぐに忘れてしまっていた。</p>
<p>　どれくらい眠ったのか。周囲が若干暗くなった気がする。ぼくは目を覚まし、体を起こした。リオネもすでに起き上がっていた。</p>
<p>――宿賃は……必要ないよな。</p>
<p>　ぼくらは主人のいないカウンターを横切って部屋を出た。</p>
<ul class="choices">
  <li>９９６（ーB）へ進め。</li>
</ul>
