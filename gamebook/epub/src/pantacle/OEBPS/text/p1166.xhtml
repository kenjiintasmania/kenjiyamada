<p class="chname">人馬宮</p>
<h2 class="pnum">1166</h2>

<p>　柱だけの第４層を、風が吹き抜けている。</p>
<p>　ここは７つの正六角形からなるフロアの南西ブロックだ。床には２つの呪印が描かれている。</p>
<p>♋：巨蟹宮の象形。その呪印に触れたのち、万能章を盾として前方に掲げよ。それは長城となりて、すべてを遮らん。</p>
<p>♊：双児宮の象形。その呪印に触れたのち、顔前から両手を左右に差し出すべし。虚像は実像となり、好機は倍加し、危機は半減することだろう。</p>
<ul class="choices">
  <li>南東のブロックへ向かう<a href="p000.xhtml">ならへ進む。</a></li>
  <li>南のブロックへ向かう<a href="p000.xhtml">ならへ進む。</a></li>
  <li>南西のブロックへ向かう<a href="p000.xhtml">ならへ進む。</a></li>
</ul>

</section>
