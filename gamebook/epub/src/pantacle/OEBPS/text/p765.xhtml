<p class="chname">天秤宮</p>
<h2 class="pnum">765</h2>

<p>　螺旋階段の最下層にいる。登ってきた足元の蓋は、もう閉じてしまって再び開かないようになっている。</p>
<p>　仕方ないので螺旋階段を登る。</p>
<p>　徐々に螺旋階段の回転半径が大きくなっていくのを鑑みるに、ここは天秤宮の西側の天秤皿だと思われた。最初は東西３ブロック分の回転直径だったものが、いつしか５ブロックの幅になっていた。上下２ブロックに渡って徐々に皿の幅が広がっていったというわけだ。</p>
<p>――ということはそろそろ皿の上に出るはずだ。</p>
<p>　果たして螺旋階段は天井の蓋で終わることになる。</p>
<ul class="choices">
  <li>そっと蓋を押し開けて、<a href="p775.xhtml">７７５</a>へ進む。</li>
</ul>

</section>
