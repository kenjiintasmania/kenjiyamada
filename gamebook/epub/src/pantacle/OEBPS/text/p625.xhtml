<p class="chname">巨蟹宮</p>
<h2 class="pnum">625</h2>

<p>　１×１ブロックの小部屋にいる。天井と、床と、右の壁に円形のゲートがあり、接する小部屋へと移動できるようになっている。また壁に細く開いた亀裂からは迷宮の外に出られる。</p>
<ul class="choices">
  <li>上へ進むなら<a href="p621.xhtml">６２１</a>へ進む。</li>
  <li>下へ進むなら<a href="p623.xhtml">６２３</a>へ進む。</li>
  <li>右へ進むなら<a href="p647.xhtml">６４７</a>へ進む。</li>
  <li>ハサミの付け根から帰還するなら<a href="p680.xhtml">６８０</a>へ進む。</li>
</ul>

</section>
