<p class="chname">天秤宮</p>
<h2 class="pnum">789</h2>

<p>「黒テミス像の内側をトゲだらけの拷問器具にするセンスからして、下の灰色テミス像も推して知るべしといったところか」</p>
<p>　ぼくは一階ホールの灰色テミス像の前へ直行した。</p>
<p>「もうアティスの魔力は解けているはずだから、と」</p>
<p>　ぼくが龍尾の術を施すと、テミス像にかけられていた呪いが解けたのか、徐々に像は白い大理石の輝きを取り戻していった。そして同時に、テミス像の裏側でギギギと門扉の開くような音がした。</p>
<p>　この音は、まあ、まちがいなく……</p>
<p>「感謝します、魔道士さま。私は天秤宮の巫女です」</p>
<p>　ほらね。</p>
