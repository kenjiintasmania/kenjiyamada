<p class="chname">人馬宮</p>
<h2 class="pnum">1164</h2>

<p>　柱だけの第４層を、風が吹き抜けている。</p>
<p>　ここは７つの正六角形からなるフロアの北西ブロックだ。床には２つの呪印が描かれている。</p>
<p>♉：金牛宮の象形。その呪印に触れたのち、突き出したる右腕は、猛牛の角が如く眼前のすべてを砕くだろう</p>
<p>。</p>
<p>♈：白羊宮の象形。その呪印に触れたのち、口元で左右の指を組むがいい。無数の身代わりが皆の目を眩ますだろう。</p>
<ul class="choices">
  <li>北東のブロックへ向かうなら<a href="p1167.xhtml">１１６７</a>へ進む。</li>
  <li>南東のブロックへ向かうなら<a href="p1169.xhtml">１１６９</a>へ進む。</li>
  <li>南のブロックへ向かうなら<a href="p1166.xhtml">１１６６</a>へ進む。</li>
</ul>

</section>
