<p class="chname">獅子宮</p>
<h2 class="pnum">246</h2>

<p>　通路東端の南にある扉には古の鳥神のレリーフが施されているが、扉が開かない。鍵穴どころか、取っ手さえ見当たらない。羽根の形の凹みがあるだけだ。</p>
