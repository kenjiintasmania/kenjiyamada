<h2 class="pname">{宇宙/そら}の海</h2>

<p>　<ruby>宇宙<rt>そら</rt></ruby>の海には、星々の<a href="aries-10.xhtml">【希望の光】</a>のほかにも、光らない岩石なども浮遊しているといる。それら遠くの大きなものをも動かす<a href="aries-08.xhtml">【秘術】</a>が、この世界のどこかには存在しているとか、いないとか。</p>
