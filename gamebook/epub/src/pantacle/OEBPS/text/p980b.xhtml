<p class="chname">双児宮</p>
<h2 class="pnum">980ーＢ</h2>

<p>　南北９ブロック、幅２ブロックの庭園の北端、西側にいる。</p>
<p>　おそらく、ここが双児宮の西北端だろう。</p>
<p>　背の低い雑草生えており、迷宮内と大差ない陰鬱さを感じる。</p>
<p>　この南北端から東を見ると、まっすぐ東へ通路が続いている。おそらく７ブロック先で迷宮の東北端にたどり着くのだろうと思われる。</p>
<ul class="choices">
  <li>東に数ブロック進むなら<a href="p975.xhtml">９７５</a>へ進む。</li>
  <li>庭園の中央に向かうべく南に進むなら<a href="p985.xhtml">９８５</a>へ進む。</li>
</ul>

</section>
