<p class="chname">双児宮</p>
<h2 class="pnum">913</h2>

<p>　Ｔ字路にいる。</p>
<p>　東西６ブロック通路の東から２ブロックめで、南北７ブロックの通路の南端だ。</p>
<p>　西は３ブロック先で北へ、４ブロック先で南へ折れており、東は１ブロック先で南へ折れている。また北は３ブロック先の西側に扉が見える。</p>
<p>　すぐそばではリオネが怪訝な顔をしている。</p>
<p>「迷宮とはこういうことだったのですね。面妖なことです」</p>
<p>　まったくもって、そのとおりだ。</p>
<ul class="choices">
  <li>北に３ブロック進むなら<a href="p923.xhtml">９２３</a>へ進む。</li>
  <li>西に３ブロック進むなら<a href="p915.xhtml">９１５</a>へ進む。</li>
  <li>東に１ブロック進むなら<a href="p911.xhtml">９１１</a>へ進む。</li>
</ul>

</section>
