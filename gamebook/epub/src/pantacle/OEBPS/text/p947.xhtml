<p class="chname">双児宮</p>
<h2 class="pnum">947</h2>

<p>――ぼくは右、きみは左だ。</p>
<p>　ぼくは手だけでリオネに合図をし、素早く静かにドルイドたちとの距離を詰めた。</p>
<p>　決着は一瞬で着いていた。</p>
<p>　リオネはドルイドの首に素早く手を回して頸動脈を締め落とし、ぼくはドルイドの頭部をひねって首をへし折ったのだ。</p>
<p>「魔道士にしては腕っぷしが強いんですね」とリオネ。</p>
<p>「そっちこそ、それは気功か何かかい？　細腕でたいしたものだ」とぼく。「さて……」</p>
<p>　ぼくらは乱れた服を整え、周囲を見たわした。</p>
