<p class="chname">宝瓶宮</p>
<h2 class="pnum">463</h2>

<p>　曲がり角へと来た。西に２ブロック進んだところで行き止まりになっており、調べてみても特に変わったところはなかった。</p>
<p>「はぁ」</p>
<p>　この様子だと、おそらくは半魚ドルイドの弾幕の中へ再び飛び込むことになりそうだと思い、思わずため息が出ていた。</p>
<p>　ぼくは先ほどのＴ字路に戻った。</p>
<ul class="choices">
  <li><a href="p453.xhtml">４５３</a>へ戻る。</li>
</ul>
