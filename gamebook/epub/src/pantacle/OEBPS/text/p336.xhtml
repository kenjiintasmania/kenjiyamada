<p class="chname">天蝎宮</p>
<h2 class="pnum">336</h2>

<p>　毒を吸い取らねば！</p>
<p>　ぼくは急いで傷口に唇を当て、血を吸い取りはじめた。順調に血を吸い出していたのだが、三回目あたりから舌にしびれを感じるようになった。</p>
<p>　……さっき舌を噛んだじゃないか！</p>
<p>　そう。口内に傷がある者は絶対やってはいけない行為だ。</p>
<p>　ぼくは指先からやられなかったかわりに、舌先から毒を取り込んでしまい、数秒後には絶命していた。</p>
