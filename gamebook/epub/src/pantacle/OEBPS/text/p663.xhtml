<p class="chname">巨蟹宮</p>
<h2 class="pnum">663</h2>

<p>　左右６ブロックの通路の右端から３ブロック目にいる。１ブロック先で前方（上方）へ曲がれるが、大きな砂丘から次へと移動を始めたカニさんは、そろそろダイビングしようとしている。</p>
<p>　ぼくは子ガニから逃げながら、さらに左側のブロックへと進んだ。</p>
<ul class="choices">
  <li><a href="p664.xhtml">６６４</a>へ進め。</li>
</ul>
