<p class="chname">獅子宮</p>
<h2 class="pnum">286</h2>

<p>　ゴクンゴクンと予備動作をしたあと、床が東側へとガリガリ移動した。</p>
<p>――ありゃあ……</p>
<p>　移動してから気づいたのだが、移動後は西が穴で通れず、北は先ほど自分が通ってきた５層北側の床になっている。当然、その向こうの扉に行くには北側の石壁がじゃまになっている。</p>
<p>――これ、解はあるのか？</p>
<p>　床石がゴクンゴクンと音を立てて元の位置へ戻ろうとしている。</p>
<ul class="choices">
  <li>急いで北へ進むなら<a href="p297.xhtml">２９７</a>へ進む。</li>
  <li>何もせず床石が戻るに任せるなら<a href="p295.xhtml">２９５</a>へ進む。</li>
</ul>

</section>
