<p class="chname">獅子宮</p>
<h2 class="pnum">294</h2>

<p>　ぼくは四肢をフル回転させて駆けて、西側の９ブロックへと駆け込んだ。</p>
<p>――床石が戻る前にスイッチを押せば、あるいは……</p>
<p>　ぼくは滑り込むように床石のスイッチへと手を伸ばした。</p>
<p>　ゴンと聞いたことのない音がした。少し前までいた床石が、元の位置に移動しそこねた音だった。まさにタッチの差で、ぼくの今いる床石が南へと移動し始めていた。</p>
<ul class="choices">
  <li>床石に乗って南へ移動するなら<a href="p296.xhtml">２９６</a>へ進む。</li>
  <li>東へ戻るなら<a href="p298.xhtml">２９８</a>へ進む。</li>
</ul>

</section>
