<p class="chname">獅子宮</p>
<h2 class="pnum">235</h2>

<p>　扉を開けると、そこはやはり兵士宿舎だった。南北２ブロック、東西１ブロックの部屋に簡素な寝台が置かれている。</p>
<p>「やっぱりか」</p>
<p>　幸いにも兵士の姿は見えない。代わりに毛布のそばに、みすぼらしい作業着を着た人物が突っ伏していた。作業着から伸びる手足はどす黒かった。</p>
<ul class="choices">
  <li>毛布と人物を調べてみるなら<a href="p234.xhtml">２３４</a>へ進む。</li>
  <li>部屋を出るなら<a href="p230.xhtml">２３０</a>へ進む。</li>
</ul>

</section>
