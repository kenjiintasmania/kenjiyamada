<p class="chname">人馬宮</p>
<h2 class="pnum">1123</h2>

<p>　六角形のブロックにいる。</p>
<p>「俺の勘だと、こっち」タウルスが北西の扉を指差しながら言った。「……には行きたくないな」</p>
<p>　どうも、奥歯に物が挟まったような言い方だ。</p>
<ul class="choices">
  <li>北東の壁面に設置された扉を抜けるなら<a href="p1118.xhtml">１１１８</a>へ進む。</li>
  <li>北西の壁面に設置された扉を抜けるなら<a href="p1127.xhtml">１１２７</a>へ進む。</li>
  <li>西の壁面に設置された扉を抜けるなら<a href="p1113.xhtml">１１１３</a>へ進む。</li>
  <li>南西の壁面に設置された扉を抜けるなら<a href="p1117.xhtml">１１１７</a>へ進む。</li>
</ul>
