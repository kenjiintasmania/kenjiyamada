<p class="chname">双児宮</p>
<h2 class="pnum">940</h2>

<p>　東西２ブロック×南北３ブロックの大部屋部屋にいる。</p>
<p>　中央テーブルには食料や遊技盤が並んでおり、それを挟む２つの椅子もまちまちの方向を向いていた。すぐさっきまで２人の人間が生活していたようにしか見えない。</p>
<p>「留守なのか、見張りに出てるのか……」</p>
<ul class="choices">
  <li>長居せずに部屋を出るなら<a href="p923.xhtml">９２３</a>へ進む。</li>
  <li>部屋を調べるなら<a href="p943.xhtml">９４３</a>へ進む。</li>
</ul>
