<p class="chname">天蝎宮</p>
<h2 class="pnum">302</h2>

<p>　目が覚めると、荒野のど真ん中に倒れ込んでいた。死んだと判断して、適当なところに捨て置いたのだろう。鴉についばまれなかったのは幸いといえる。少し離れたところに天蝎宮が見える。ぼくは立ち上がり、ゆっくりと宮殿へと歩を進めた。</p>
<p>　記号「Ｍ」を消しておくこと。</p>

  <li><a href="p301.xhtml">３０１</a>へ進め。</li>
