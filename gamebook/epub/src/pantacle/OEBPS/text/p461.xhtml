<p class="chname">宝瓶宮</p>
<h2 class="pnum">461</h2>

<p>　東西７ブロックの通路の東端にいる。</p>
<p>　西には通路が続いており、南には格子戸が設置されている。格子戸の向こうには薄暗い空と、淀んだ滝底の水が、ゆるゆると揺れていた。</p>
<ul class="choices">
  <li>今いる通路の中央あたりまで西へ進むなら<a href="p455.xhtml">４５５</a>へ進む。</li>
  <li>南の格子戸を抜けるなら<a href="p458.xhtml">４５８</a>へ進む。</li>
</ul>

</section>
