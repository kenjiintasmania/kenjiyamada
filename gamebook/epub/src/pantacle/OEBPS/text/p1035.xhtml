<h2 class="pnum">1035</h2>

<p>　曲がり角にいる。</p>
<p>「うーん、どちらも少し行ったところで曲がる必要がありそうだな」</p>
<p>　アバドンは、そろそろ解説が面倒になってきたのか、気だるげに言った。</p>
<ul class="choices">
  <li>通路は北（<a href="p1034.xhtml">一〇三四</a>）、西（<a href="p1015.xhtml">一〇一五</a>）に続いている。</li>
</ul>
