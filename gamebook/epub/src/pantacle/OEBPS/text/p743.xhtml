<p class="chname">天秤宮</p>
<h2 class="pnum">743</h2>

<p>　ぼくは通路を東に進み始めるとともに、ギギギと通路全体が<ruby>軋<rt>きし</rt></ruby>んだ。</p>
<p>　ぼくの（罪の？）重みで天秤宮が揺れてるのかもしれないが、とくに天秤が傾くなどの異変は感じない。</p>
<p>　体も多少重いが、ハシゴを登れないというほどではない。</p>
<p>　ぼくはハシゴを登り、天井の蓋を押しげて上階へと上がった。</p>
