<p class="chname">巨蟹宮</p>
<h2 class="pnum">633</h2>

<p>　１×１ブロックの小部屋におり、天井と右にゲートが見える。ハサミの根本部分だけあって、時々ねじれるように部屋が揺れている。</p>
<ul class="choices">
  <li>上の部屋に飛び上がるなら<a href="p635.xhtml">６３５</a>へ進む。</li>
  <li>右の部屋に移動するなら<a href="p641.xhtml">６４１</a>へ進む。</li>
</ul>
