<p class="chname">処女宮</p>
<h2 class="pnum">1017</h2>

<p>　三叉路にいる。</p>
<p>「アバドン？」</p>
<p>「東は、少し行ったところで左右に分かれてるが、北はそこそこ行ったところに右への分かれ道がある。南は……かなり行ったところで左に曲がってるな」</p>
<p>　アバドンが、さすがに目を凝らしている。</p>
<p>「左へ曲がるってことは、今度は東か……全部、東西南北で言ってくれないかな、アバドン」</p>
<p>「何か言ったか、メスロン。どっちの手でフォークを持つかくらい、分かってるよな？」</p>
<p>「はぁ……問題ないよ、アバドン」</p>
<ul class="choices">
  <li>通路は北（<a href="p1015.xhtml">一〇一五</a>）、南（<a href="p1019.xhtml">一〇一九</a>）、東（<a href="p1037.xhtml">一〇三七</a>）に続いている。</li>
</ul>

</section>
