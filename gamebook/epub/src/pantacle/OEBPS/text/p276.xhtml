<p class="chname">獅子宮</p>
<h2 class="pnum">276</h2>

<p>　部屋の南壁の中央付近を押し込むと、外壁が外側にだけ開くようになっていた。どうやら脱出専用口のようだ。下層が砂に隠れていた状態でもギリギリ砂上に出られるように設計されていた。</p>
<p>――なるほどね。</p>
<p>　ここから抜け出だしてもよいが、ぼくには、まだすることが残っている。</p>
<ul class="choices">
  <li>通路の南壁を調べるなら<a href="p299.xhtml">２９９</a>へ進む。</li>
</ul>

</section>
