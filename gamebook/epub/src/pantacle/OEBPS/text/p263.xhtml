<p class="chname">獅子宮</p>
<h2 class="pnum">263</h2>

<p>　床石が移動し始める前に南へと走った。いま南側に来ている床石は……</p>
<pre class="grid">■□■</pre>
<pre class="grid">□□■</pre>
<pre class="grid">■■■</pre>
<p>――ドンピシャだ！</p>
<p>　この床石は北に戻れる（北から来たのだから当然だ）。</p>
<p>　いま北側の床石は西へ位置を動かそうとしている。その向こうに現れるのは……紋章の扉だ！</p>
<p>　ぼくはタイミングを逃さず、床石のスイッチを押した。床石は北のすき間へと移動し、目の前にちょうど紋章の扉が来る位置関係となった。</p>
<p>　ゴトン。</p>
<p>　この解を出した時点で開くように設定されていたのか、北側の門は何もせずとも勝手に開いてぼくを招き入れた。</p>
<ul class="choices">
  <li><a href="p240.xhtml">２４０</a>へ進む。</li>
</ul>
