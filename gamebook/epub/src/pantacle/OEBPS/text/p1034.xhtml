<p class="chname">処女宮</p>
<h2 class="pnum">1034</h2>

<p>　曲がり角にいる。</p>
<p>　そういえば、どこかの迷宮作家が言っていた。</p>
<p>「通路だけのパラグラフ」「空間だけのパラグラフ」は極力減らすのだと。</p>
<p>　それはリンゴ農家を見たタワー建設者が自らに課したアンチテーゼだったろうか。</p>
<p>　そして、おそらく、高原開拓者は、その禁忌を犯すだろう。</p>
<ul class="choices">
  <li>通路は南（<a href="p1035.xhtml">一〇三五</a>）、西（<a href="p1024.xhtml">一〇二四</a>）に続いている。</li>
</ul>

</section>
