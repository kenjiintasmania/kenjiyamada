<p class="chname">処女宮</p>
<h2 class="pnum">1012</h2>

<p>　少し歩いたところで曲がり角にたどり着いた。</p>
<p>「どうだい、アバドン？」</p>
<p>「北も南も東も、少し行ったところに曲がり角が見えるな」</p>
<p>「少し……ねぇ」</p>
<ul class="choices">
  <li>通路は北（<a href="p1011.xhtml">一〇一一</a>）<strong>、</strong>南（<a href="p1013.xhtml">一〇一三</a>）<strong>、</strong>東（<a href="p1032.xhtml">一〇三二</a>）に続いている。</li>
</ul>
<p class="memo">　　　※↑ここにリンクが３連続でくる↑　　　　↑</p>
