<p class="chname">獅子宮</p>
<h2 class="pnum">240</h2>

<p>　紋章の扉を抜けると、そこは部屋というよりも外壁に偽装した幅狭の隠し部屋だった。</p>
<p>「せまっ！」</p>
<p>　かろうじて人が一人立ってられる程度の幅。扉の真横に備え付けられたハシゴを登れたらそれでよい、という設計だ。もしくはマンティコアのような大型獣が入ってこれない構造にしたのかもしれない。</p>
<p>　後ろで床石が初期配置に戻り、扉を開けなくなった以上、ぼくにできることはハシゴを登ることだけだった。</p>
