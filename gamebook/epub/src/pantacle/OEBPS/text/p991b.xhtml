<p class="chname">双児宮</p>
<h2 class="pnum">991ーＢ</h2>

<p>――やっぱりだ。</p>
<p>　この庭園はここで終わりではなかった。</p>
<p>　ここからさらに東へと路地が続いており、３ブロック先で今度こそ行き止まりになっていた。</p>
<ul class="choices">
  <li>東へ３ブロック進むなら<a href="p999.xhtml">９９９</a>へ進む。</li>
  <li>西へ１ブロック戻るなら<a href="p990.xhtml">９９０</a>へ進む。</li>
</ul>
