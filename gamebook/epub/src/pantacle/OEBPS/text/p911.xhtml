<p class="chname">双児宮</p>
<h2 class="pnum">911</h2>

<p>　迷宮の入り口内部にいる。</p>
<p>　南には唯一の出入り口があり、道は北へ続いている。東西の壁についた格子状の小窓からは中庭が見える。二色のバラの花が、小柄ながら可憐に咲き誇っているのが見えた。北に向かう通路は１ブロック先で西へと折れている。</p>
<ul class="choices">
  <li>北に向かうなら<a href="p912.xhtml">９１２</a>へ進む。</li>
  <li>南の出口を抜けるなら<a href="p001.xhtml">【呪門】</a>からオフィユカス島に戻る。</li>
</ul>

</section>
