<p class="chname">双児宮</p>
<h2 class="pnum">925ーＢ</h2>

<p>　曲がり角にいる。</p>
<p>　東西４ブロックの通路の東端で、南北３ブロックの通路の北端だ。</p>
<p>　西は３ブロック先で南へ折れており、南は３ブロック先の突き当りの南と西に扉が見える。</p>
<ul class="choices">
  <li>西に３ブロック進むなら<a href="p922.xhtml">９２２</a>へ進む。</li>
  <li>南に２ブロック進むなら<a href="p930.xhtml">９３０</a>へ進む。</li>
</ul>

</section>
