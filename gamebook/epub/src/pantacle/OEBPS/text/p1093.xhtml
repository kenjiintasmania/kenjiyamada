<p class="chname">処女宮</p>
<h2 class="pnum">1093</h2>

<p>　曲がり角にいる。</p>
<p>　西は果てしなく遠いが、南はそこそこ行ったところに扉があるような気がする。</p>
<ul class="choices">
  <li>通路は南（<a href="p1095.xhtml">一〇九五</a>）、西（<a href="p1073.xhtml">一〇七三</a>）に続いている。</li>
</ul>
