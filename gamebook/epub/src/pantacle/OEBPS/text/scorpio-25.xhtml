<section id="scorpio-25" class="paragraph">
<p class="chname">天蝎宮</p>
<h2 class="pname">X</h2>

<p>　すでにカウントが２１以上になったら<a href="scorpio-27.xhtml">Z</a>へ。そうでなくとも、もう限界点近いのだが。</p>
<p>――もう１９カウントだ……！</p>
<p>　２×２ブロックの設計室に入ったとき、ぼくは絶望感に全身を支配された。この部屋に御者はいない。認めたくはないが、ぼくの負けは確定だ。</p>
<ul class="choices">
  <li>試しに部屋を歩き回るなら<a href="scorpio-26.xhtml">Y</a>へ進め。</li>
  <li>試しに扉を出て来た道を引き返すなら<a href="scorpio-26.xhtml">Y</a>へ進め。</li>
  <li>素直に残り２カウントを待つなら<a href="scorpio-27.xhtml">Z</a>へ進め。</li>
</ul>
