<p class="chname">巨蟹宮</p>
<h2 class="pnum">687</h2>

<p>　通路の右端に行ってから引き返そうとしたが、自分の予測よりも早くカニさんはスライディングを開始した。激しく揺れる迷宮内。オレンジ色の流動体をかき分けながら、急いで上階へと駆け上がろうとしたが、そのときにはすでに子ガニ帝国が領土を通路内まで拡張してきていた。ぼくは帝国領土に飲み込まれた。</p>
