<p class="chname">宝瓶宮</p>
<h2 class="pnum">476</h2>

<p>　東西５ブロックの長さの通路中央にいる。ここから南へと道が伸びており、１ブロック先の扉で行き止まりになっている。その扉は滝壺中央、呪門のあった飛び石を支える塔に入る扉だと思われた。見上げても窓などは見えない。</p>
<p>　東は２ブロック先で行き止まりになっており、ここには扉も何も見えない。</p>
<ul class="choices">
  <li>南へ進むなら<a href="p483.xhtml">４８３</a>へ進む。</li>
  <li>東へ進むなら<a href="p479.xhtml">４７９</a>へ進む。</li>
</ul>

</section>
