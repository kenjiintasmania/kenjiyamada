<section id="macro2-10" class="paragraph">
<p class="chname">マクロの街２</p>
<h2 class="pname">広場</h2>

<p>獣帯コンパスが【蠍－金牛】を示している。ここは東西３スクエア×南北２スクエアの広場となっており、その南側中央にいる。広場中央北側のスクエアの隅には井戸がある。広場の北西には囲いがあって簡易墓地となっており、また南西のスクエアには何やらテントが張られている。東側の南北２スクエアは何もない広い空間になっている。</p>
<ul class="choices">
  <li>北側にある<a href="macro2-11.xhtml">井戸</a>に近づく</li>
  <li>北西の<a href="macro2-12.xhtml">墓地</a>に入る</li>
</ul>
<p>（東側の青果市に近づく）</p>
<p>（南西の楽団に近づく）</p>

</section>
