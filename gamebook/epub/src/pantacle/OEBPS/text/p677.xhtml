<p class="chname">巨蟹宮</p>
<h2 class="pnum">677</h2>

<p>　ぼくは前方（上方）へと曲がった。そこで道は左右に分かれており、右は２ブロック先で、左は１ブロック先で前方（上方）へと折れている。背後（下方）からは子ガニ軍団が迫っている。</p>
<p>――カニさんが立ち上がろうとしている。</p>
<p>　足場は再び９０°回転しようとしている。猶予はない。どちらかに進むこと。</p>
<ul class="choices">
  <li>右に進むなら<a href="p674.xhtml">６７４</a>へ進め。</li>
  <li>左に進むなら<a href="p679.xhtml">６７９</a>へ進め。</li>
</ul>

</section>
