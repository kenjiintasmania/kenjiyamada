<p class="chname">巨蟹宮</p>
<h2 class="pnum">631</h2>

<p>　１×１ブロックの小部屋にいる。いま入ってきたゲートしか出入り口はない。さっきよりは床の揺れが収まっているが、そのせいで床の上を左右に交互に滑るものがあった。小ぶりな弦楽器のようだ。</p>
<p>――これはフィドル……かな。</p>
<p>　<strong>星読み表に１</strong>を足すこと。</p>
<p>　ほかに見るべきものはない。右側の部屋へ戻ろう。</p>
<ul class="choices">
  <li><a href="p623.xhtml">６２３</a>へ進む。</li>
