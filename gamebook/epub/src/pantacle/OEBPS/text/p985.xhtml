<p class="chname">双児宮</p>
<h2 class="pnum">985</h2>

<p>　ウエストヤードの中央にいる。</p>
<p>　幅２ブロック、南北５ブロックの縦長の庭園には雑草が生い茂っており、とくに見るべきものはなかった。</p>
<p>　庭園の北端西側と、南端西側とにそれぞれブロック幅の通路が続いている。</p>
<ul class="choices">
  <li>北の通路を２ブロック進むなら<a href="p980.xhtml">９８０</a>へ進む。</li>
  <li>南の通路を２ブロック進むなら<a href="p990.xhtml">９９０</a>へ進む。</li>
</ul>

</section>
