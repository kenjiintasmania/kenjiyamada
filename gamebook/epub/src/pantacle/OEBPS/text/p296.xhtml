<p class="chname">獅子宮</p>
<h2 class="pnum">296</h2>

<p>　床石に乗って南へ移動した。今すぐ移動するなら東か南へ行ける。――さすがに時間がかかりすぎたかな。</p>
<p>　移動後は、すべての床石が元の位置に戻りそうだ。</p>
<ul class="choices">
  <li>東へ進むなら<a href="p291.xhtml">２９１</a>へ進む。</li>
  <li>南へ進むなら<a href="p285.xhtml">２８５</a>へ進む。</li>
</ul>

</section>
