<p class="chname">獅子宮</p>
<h2 class="pnum">202</h2>

<p>　ぼくはピラミッドの最上層――頂点にいる。東西１ブロック×南北１ブロックの広さしかなく、これが最上層唯一の部屋でもある。強い太陽光を避けてか、それとも北天に光る不動の星を観測するためか、北側に窓口があいている。もちろんピラミッド内の空気の循環を考えてのことでもあるだろう。</p>
<p>――絶対、なにかあると思ったのだけれど。</p>
<p>　頂上に位置するはずのこの部屋には大きな円卓が１つと窓が１つ、そして下に下りる階段があるだけだった。巫女も敵のドルイドもいない。</p>
<ul class="choices">
  <li>円卓に近づくなら<a href="p206.xhtml">２０６</a>へ進む。</li>
  <li>窓に近づくなら<a href="p208.xhtml">２０８</a>へ進む。</li>
  <li>階段を下りるなら<a href="p279.xhtml">２７９</a>へ進む。</li>
</ul>

</section>
