<p class="chname">双児宮</p>
<h2 class="pnum">974</h2>

<p>「寝心地の良さそうな寝台ですね」</p>
<p>「そうだね」</p>
<p>「せっかくだから一泊しませんか」</p>
<p>「……そうだね」</p>
<p>　ぼくは、そっとリオネを一瞥した。服の裾を整え、掛け布団をめくり、熱い眼差し……ではなく、少し重そうなまぶたを乗せた眼をこちらに向けた。単に眠たいらしい。</p>
<p>「よし、寝よう」</p>
<p>　ぼくは色々と考えを巡らせた自分を苦笑した。</p>
<ul class="choices">
  <li>もう一つの寝台に潜り込んで、<a href="p997.xhtml">９９７</a>へ進め。</li>
</ul>

</section>
