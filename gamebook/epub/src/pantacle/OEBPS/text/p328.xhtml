<p class="chname">天蝎宮</p>
<h2 class="pnum">328</h2>

<p>　迷宮の南西の角にいる。東に８ブロックの長さの通路が続いており、北側には扉がついている。南西の角から例の骨が２本突き出ていて若干振動している。なかなかにキショい。</p>
<ul class="choices">
  <li>北の扉を入るなら<a href="p326.xhtml">３２６</a>へ進む。</li>
  <li>東へ歩くなら<a href="p320.xhtml">３２０</a>へ進む。</li>
</ul>

</section>
