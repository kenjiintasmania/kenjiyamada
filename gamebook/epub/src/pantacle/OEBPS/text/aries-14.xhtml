<p class="chname">白羊宮</p>
<h2 class="pname">盆地</h2>

<p>　盆地は、<a href="aries-12.xhtml">【黒雲】</a>の風雨からも守られていて、ひと休みできそうな場所だった。実際、<a href="aries-21.xhtml">【くつろぐ女性】</a>の姿も見える。<a href="aries-11.xhtml">【上空の風】</a>だけが、すずやかに包み込んでくれていた。</p>
