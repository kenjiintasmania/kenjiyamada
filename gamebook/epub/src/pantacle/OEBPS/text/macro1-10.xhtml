<section id="macro1-10" class="paragraph">
<p class="chname">マクロの街１</p>
<h2 class="pname">広場</h2>

<p>獣帯コンパスが【蠍－金牛】を示している。ここは東西３スクエア×南北２スクエアの広場となっており、その南側中央にいる。かつては人が集まって井戸端会議でもしていたことだろうが、いまは唯一残された井戸だけが広場中央北側のスクエアの隅で寂しげにたたずんでいる。広場の北西には囲いがあり、簡易墓地となっているようだった。この街の人々は全員あの中に入ってるのだろうかと考えると寒気が走る。</p>
<ul class="choices">
  <li>北側にある<a href="macro1-11.xhtml">井戸</a>に近づく</li>
  <li>北西の<a href="macro1-12.xhtml">墓地</a>に入る</li>
</ul>
<p>（東側の青果市に近づく）</p>
<p>（南西の囲いにいる犬や馬に近づく）</p>

</section>
