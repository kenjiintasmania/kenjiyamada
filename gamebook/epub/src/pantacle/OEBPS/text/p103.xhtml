<p class="chname">金牛宮</p>
<h2 class="pnum">103</h2>

<p>　金牛宮には人の姿は見えない。巫女も、敵のドルイドも。</p>
<p>　タウルスに一掃されて以来、新たにドルイドが送り込まれた様子もない。金牛宮は平和そのものだ。</p>
<ul class="choices">
  <li>北に見える崩れた階段に向かうなら<a href="p105.xhtml">１０５</a>へ進め。</li>
  <li>蛇夫宮に転移して戻るなら<a href="p001.xhtml">マクロの街【呪門前】</a>へ進め。</li>
</ul>
