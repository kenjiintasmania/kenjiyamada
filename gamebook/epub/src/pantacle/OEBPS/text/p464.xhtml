<p class="chname">宝瓶宮</p>
<h2 class="pnum">464</h2>

<p>　ぼくは通路の曲がり角にいる。</p>
<p>　通路の東は２ブロック先で北に、南は２ブロック先で東に折れている。</p>
<p>　風が吹いて、膝までの滝水にさざ波が立ち、淡水魚が一匹、宙へはねた。</p>
<ul class="choices">
  <li>東へ進むなら<a href="p468.xhtml">４６８</a>へ進む。</li>
  <li>南へ進むなら<a href="p462.xhtml">４６２</a>へ進む。</li>
</ul>
