<p class="chname">宝瓶宮</p>
<h2 class="pnum">483</h2>

<p>　呪門のある飛び石の塔の北側にいる。南に見える扉がちゃんとした扉ならば、中に入れるはずだ。また北に見えるＴ字路へ１ブロック戻ってもよい。</p>
<ul class="choices">
  <li>扉を開けるなら<a href="p485.xhtml">４８５</a>へ進む。</li>
  <li>北へ戻るなら<a href="p476.xhtml">４７６</a>へ進む。</li>
</ul>

</section>
