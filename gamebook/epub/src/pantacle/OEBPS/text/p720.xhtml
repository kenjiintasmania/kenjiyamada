<p class="chname">天秤宮</p>
<h2 class="pnum">720</h2>

<p>　若干の罰当たり感を感じつつも、女神像をよじ登る。</p>
<p>　頭頂まで登ったところで、天井に直径１ブロックの円形の溝を発見した。</p>
<p>――これは、整備用の通路といったところかな。まさか巫女が常用しているとは思えないが。</p>
<p>　天井を押し上げると、蓋が開いて、その先にハシゴが伸びているのが見えた。</p>
<ul class="choices">
  <li>ぼくはハシゴにつかまったまま、１・２階ドームの天井の蓋を閉じた。<a href="p730.xhtml">７３０</a>へ進む。</li>
</ul>

</section>
