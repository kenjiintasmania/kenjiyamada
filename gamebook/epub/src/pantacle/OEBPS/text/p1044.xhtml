<p class="chname">処女宮</p>
<h2 class="pnum">1044</h2>

<p>――不穏だな。</p>
<p>　天啓に近い何かを感じ取っていたぼくは、部屋に入るなり左から転がってきた何かに衝突する直前、壁際へと身を転がせた。</p>
<p>　突如あがる歓声。</p>
<p>「おやおや、ゲームレーンからピンじゃなく人間が飛び出てきたぞ」</p>
<p>「あのタイミングでかわすとはね」</p>
<p>「これで、いよいよ面白くなってきたというわけだ」</p>
<p>　広い空間の西の端で、４人の人影が騒いでいる。</p>
<ul class="choices">
  <li><a href="p1043.xhtml">一〇四三</a>へ進む。</li>
</ul>
