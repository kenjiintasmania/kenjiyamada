<p class="chname">天蝎宮</p>
<h2 class="pnum">301</h2>

<p>　ぼくは天蝎宮に足を踏み入れた。</p>
<p>　入口左右の柱だけが太く、宮殿内の柱はどれも細かった。いびつな造りだ。また吹き抜けの宮殿を抜けた裏手に毒々しい色の一枚岩が祀られている。</p>
<p>　星読み表の百の位が……</p>
<ul class="choices">
  <li>３か４か８か９なら<a href="p305.xhtml">３０５</a>へ進む。（天蝎宮クリア＆カギ入手済み）</li>
  <li>それ以外なら<a href="p310.xhtml">３１０</a>へ進む。</li>
</ul>
