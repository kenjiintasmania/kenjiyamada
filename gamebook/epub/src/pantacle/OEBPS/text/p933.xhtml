<p class="chname">双児宮</p>
<h2 class="pnum">933</h2>

<p>　角にいる。</p>
<p>　東西６ブロックの通路の西端で、南北２ブロックの短い通路の南側だ。</p>
<ul class="choices">
  <li>東に１ブロック進むなら<a href="p922.xhtml">９２２</a>へ進む。</li>
  <li>北に１ブロック進むなら<a href="p939.xhtml">９３９</a>へ進む。</li>
</ul>
