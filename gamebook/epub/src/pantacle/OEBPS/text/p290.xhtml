<p class="chname">獅子宮</p>
<h2 class="pnum">290</h2>

<p>　ぼくは両足をフル回転させて、西側の９ブロックへと走った。</p>
<p>――床石が戻る前にスイッチを押せば、あるいは……</p>
<p>　ぼくは滑り込むように床石のスイッチへと手を伸ばした。</p>
<p>　ガチンと聞いたことのない音がした。２つの床石がぶつかり合う音だ。どうやら少し遅かったらしい。少し前までいた床石は、元の位置へと移動を終えたらしい。</p>
