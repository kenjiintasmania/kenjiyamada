<p class="chname">処女宮</p>
<h2 class="pnum">1042</h2>

<p>　少し進んだところの曲がり角にいる。</p>
<p>「北も西も……」</p>
<p>「少し行ったら次の角ってんだろ、アバドン？」</p>
<p>「そのとおりだ。どうしてわかった？」</p>
<p>　ぼくはなぜか、深くため息をついていた。</p>
<ul class="choices">
  <li>通路は北（<a href="p1041.xhtml">一〇四一</a>）、西（<a href="p1032.xhtml">一〇三二</a>）に続いている。</li>
</ul>
