<p class="chname">獅子宮</p>
<h2 class="pnum">245</h2>

<p>　牢屋には一人、囚人がうずくまっていた。暗がりで縮こまっているため、最初は誰もいないかと思ったが、何度も同じ言葉を小声でつぶやいているため、人がいるとわかったのだ。</p>
<p>「死にたくない、死にたくない……審判を受けて戻ったヤツはいない……」</p>
<p>　その繰り返しだった。あわれにも思うが、鉄格子は硬く、扉の錠は強固だ。残念ながら、今できることは何もなさそうだ。</p>
<ul class="choices">
  <li>西の牢屋を覗いてみるなら<a href="p243.xhtml">２４３</a>へ進む。</li>
  <li>Ｔ字路に入るなら<a href="p247.xhtml">２４７</a>へ進む。</li>
  <li>椅子に近寄るなら<a href="p249.xhtml">２４９</a>へ進む。</li>
</ul>
