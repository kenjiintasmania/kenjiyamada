<p class="chname">獅子宮</p>
<h2 class="pnum">292</h2>

<p>　外壁には『馬鹿め』と書いてあった。それだけだった。</p>
<p>「獅子だからって調子に乗ってるなよ！　草食獣の意地を見せてやる！」</p>
<p>　ぼくは意味不明に毒づいて、その場を去った。</p>
<p>　<a href="p295.xhtml">２９５</a>へ進む。</p>
