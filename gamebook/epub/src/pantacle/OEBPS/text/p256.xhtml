<p class="chname">獅子宮</p>
<h2 class="pnum">256</h2>

<p>　マドから身を乗り出すと、部屋の屋上――つまりピラミッドの頂上に設置された<ruby>四角錐の石<rt>ベンベネト</rt></ruby>が見えた。ぼくの魔道士としての直感を信じるなら、この石には間違いなく魔力が宿っている。</p>
<p>　星読み表の十の位が……</p>
