<section id="aries-09" class="paragraph">
<p class="chname">白羊宮</p>
<h2 class="pname">深海</h2>

<p>　深海。深い。重い。それゆえに、この先には行けないということだけは、わかった。ならば戻るしかあるまい。深海の水をさかのぼると、<a href="aries-18.xhtml">【海面】</a>にたどりつき、その先には<a href="aries-17.xhtml">【海岸】</a>があるだろう。そこに水を送り込む<a href="aries-16.xhtml">【河川】</a>をさらにさかのぼれば<a href="aries-15.xhtml">【白滝】</a>もあるかもしれないし、そもそもそれらは空の<a href="aries-12.xhtml">【黒雲】</a>からやってくるはずだ。</p>
