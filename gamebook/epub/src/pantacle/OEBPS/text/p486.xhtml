<p class="chname">宝瓶宮</p>
<h2 class="pnum">486</h2>

<p>　ぼくは半魚ドルイドに向けて走り出した。</p>
<p>『おぉっと！　存外、猪突猛進なヤツだな。接近戦と<ruby>一見<rt>いちげん</rt></ruby>さんはお断りやで！』</p>
<p>　意味の分からないことを言って半魚ドルイドは尻尾をひるがえし、とっとと通路の向こうに隠れてしまった。</p>
<p>「おい……」</p>
<p>　かなりヘンな奴だが、やっかいな敵であることは間違いなさそうだ。</p>
<ul class="choices">
  <li>半魚ドルイドを追って南へ進むなら<a href="p492.xhtml">４９２</a>へ進む。</li>
  <li>北に引き返すなら<a href="p478.xhtml">４７８</a>へ進む。</li>
</ul>

</section>
