<p class="chname">宝瓶宮</p>
<h2 class="pnum">485</h2>

<p>　ぼくは用心深く扉を開けた。ギギと音を立てるでもなく扉はスムーズに開き、そこには塔の１階の暗がりがあった。大きめサイズのゆったりとした螺旋階段が上階へと続いている。</p>
<ul class="choices">
  <li>階段を上がるなら<a href="p498.xhtml">４９８</a>へ進む。</li>
  <li>扉から出るなら<a href="p483.xhtml">４８３</a>へ進む。</li>
</ul>

</section>
