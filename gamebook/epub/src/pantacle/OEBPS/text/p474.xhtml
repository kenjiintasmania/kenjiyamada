<p class="chname">宝瓶宮</p>
<h2 class="pnum">474</h2>

<p>「冷たい」</p>
<p>　勢いが弱まったとはいえ、霧雨のような滝が降り注いでいる。ここは滝壺の北から２列目、垂直迷宮のすぐ南側の通路だ。東西５ブロックの長さがあり、その中央から南へと道が伸びている。南は１ブロック先で東に折れている。</p>
<p>　風邪をひく前に、あのヘンな魚を倒さなければ。</p>
<ul class="choices">
  <li>東へ２ブロック進むなら<a href="p476.xhtml">４７６</a>へ進む。</li>
  <li>南へ１ブロック進むなら<a href="p472.xhtml">４７２</a>へ進む。</li>
</ul>

</section>
