<p class="chname">双児宮</p>
<h2 class="pnum">923</h2>

<p>　南北７ブロックの通路の中央にいる。西側には頑丈な鉄製の扉があり、となりの１ブロック北側にも素朴な装飾の木製扉が見える。</p>
<ul class="choices">
  <li>北へ１ブロック進むなら<a href="p930.xhtml">９３０</a>へ進む。</li>
  <li>南へ３ブロック進むなら<a href="p913.xhtml">９１３</a>へ進む。</li>
  <li>鉄製の扉に入るなら<a href="p940.xhtml">９４０</a>へ進む。</li>
</ul>

</section>
