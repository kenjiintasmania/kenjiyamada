<p class="chname">双児宮</p>
<h2 class="pnum">922ーＢ</h2>

<p>　曲がり角にいる。</p>
<p>　東西４ブロックの通路の西端で、南北７ブロックの通路の北端だ。</p>
<p>　東は３ブロック先で南へ折れており、南は６ブロック先の突き当りで東に折れている。</p>
<ul class="choices">
  <li>南に６ブロック進むなら<a href="p915.xhtml">９１５</a>へ進む。</li>
  <li>東に３ブロック進むなら<a href="p925.xhtml">９２５</a>へ進む。</li>
</ul>

</section>
