<p class="chname">天蝎宮</p>
<h2 class="pnum">338</h2>

<p>　ぼくは曲がり角にいる。北は２ブロック先で行き止まり。西は３ブロック先で曲がり角になっている。通路の揺れはいよいよ激しく、ときどき体が浮くくらいだ。</p>
<ul class="choices">
  <li>西に進むなら<a href="p332.xhtml">３３２</a>へ進む。</li>
  <li>北に進むなら<a href="p340.xhtml">３４０</a>へ進む。</li>
</ul>
