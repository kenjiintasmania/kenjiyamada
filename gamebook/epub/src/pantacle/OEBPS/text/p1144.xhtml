<p class="chname">人馬宮</p>
<h2 class="pnum">1144</h2>

<p>　六角形のブロックにいる。</p>
<p>　２層の各ブロックは一方通行になっているらしく、スタート地点の北側には戻れなくなっている。</p>
<ul class="choices">
  <li>南東の壁面に設置された扉を抜けるなら１１<a href="p000.xhtml">◆へ進む。</a></li>
  <li>南の壁面に設置された扉を抜けるなら１１<a href="p000.xhtml">◆へ進む。</a></li>
  <li>南西の壁面に設置された扉を抜けるなら１１<a href="p000.xhtml">◆へ進む。</a></li>
</ul>
