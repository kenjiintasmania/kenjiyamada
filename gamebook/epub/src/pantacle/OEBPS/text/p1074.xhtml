<p class="chname">処女宮</p>
<h2 class="pnum">1074</h2>

<p>　とても短い通路の西端にいる。</p>
<p>　東への通路はすぐに南へと折れている。</p>
<p>　西には鉄球を落とすための観音開きの床があり、その向こうでアバドンが所在なさげに立っている。獅四肢を使えば、問題なく遊技場に戻れるだろう。</p>
<ul class="choices">
  <li>東へ進むならへ<a href="p1084.xhtml">一〇八四</a>へ進む。</li>
  <li>獅四肢を使って西の遊技場へ戻るなら<a href="p1040.xhtml">一〇四〇</a>へ進め。</li>
</ul>

</section>
