<p class="chname">宝瓶宮</p>
<h2 class="pnum">467</h2>

<p>　曲がり角にぼくはいる。</p>
<p>　西は１ブロック先で北に折れている。</p>
<p>　南は４ブロック先でＴ字路に突き当たる。</p>
<p>「おや」</p>
<p>　足元の水面に大きなヒレが浮いていた。</p>
<p>「アイツのヒレか？」</p>
<p>　半魚ドルイドのヒレも顔も見たくはないが、決着をつけねばならないのは間違いない。</p>
<ul class="choices">
  <li>西へ進むなら<a href="p472.xhtml">４７２</a>へ進む。</li>
  <li>南へ進むなら<a href="p465.xhtml">４６５</a>へ進む。</li>
</ul>

</section>
