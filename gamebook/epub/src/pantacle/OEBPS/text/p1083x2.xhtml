<p class="chname">処女宮</p>
<h2 class="pnum">1083</h2>
<p class="memo">※ 同じ番号の定義が複数あります（デバッグ一覧参照）</p>
<p>『ヒント１</p>
<p>　では解説しよう。</p>
<p>　支点である胴体から１プルーグの距離に重り１ウェイトを置くとき、その傾こうとする力は１ティルト。２プルーグの位置に１ウェイト置くと、傾きは２ティルト。１プルーグに２ウェイト置いても、傾きは２ティルト。</p>
<p>　さて、では６ランタン＝何ミルメコか。そこから始めよ』</p>
<p>　わかりやすいような、わかりにくいような解説だ。</p>
<ul class="choices">
  <li><a href="p1096.xhtml">一〇九六</a>へ戻って問題を解け。</li>
</ul>
