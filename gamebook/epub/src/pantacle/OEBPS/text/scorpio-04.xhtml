<h2 class="pname">C</h2>

<ul class="choices">
  <li>北へ入るなら１カウント追加して<a href="scorpio-06.xhtml">E</a>へ</li>

  <li>カウントが２１以上になったら<a href="scorpio-27.xhtml">Z</a>へ</li>
</ul>
