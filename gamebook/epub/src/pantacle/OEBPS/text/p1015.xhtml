<p class="chname">処女宮</p>
<h2 class="pnum">1015</h2>

<p>　三叉路にいる。</p>
<p>「どうだ、アバドン？」</p>
<p>「東は、少し行ったところで左に曲がってるが、北と南は、そこそこ離れているようだ」</p>
<p>「左へ曲がるってことは、北か……」</p>
<ul class="choices">
  <li>通路は北（<a href="p1013.xhtml">一〇一三</a>）、南（<a href="p1017.xhtml">一〇一七</a>）、東（<a href="p1035.xhtml">一〇三五</a>）に続いている。</li>
</ul>
