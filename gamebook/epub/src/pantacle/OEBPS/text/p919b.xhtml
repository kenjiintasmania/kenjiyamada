<p class="chname">双児宮</p>
<h2 class="pnum">919ーＢ</h2>

<p>　１ブロック進んだところで、ぼくは違和感を感じて立ち止まった。</p>
<p>　星読み表の一の位が０、１、５、６なら、<strong>星読み表に３を足すこと。</strong></p>
<p>「はて。空間が歪んだような気がしたが……」</p>
<p>　道は１ブロック先で正面と左に分かれている。</p>
<ul class="choices">
  <li>１ブロック進むなら<a href="p914b.xhtml">９１４</a>へ進む。</li>
  <li>後ろに戻るなら<a href="p918b.xhtml">９１８</a>へ進む。</li>
</ul>

</section>
