<p class="chname">巨蟹宮</p>
<h2 class="pnum">636</h2>

<p>　ひとブロック飛び降りたところで、迷宮が大きく揺れた。</p>
<p>「ヤバっ……！」</p>
<p>　ぼくは自分でも驚くほどの声を上げた。飛び降りた先の部屋の床にもゲートがあって、連続してさらに落ちる羽目になったからだ。ぼくはさらに３ブロック下まで落下した。目の前まで床が急接近したところで、ぼくの記憶は途切れる。死んだのだ。</p>
