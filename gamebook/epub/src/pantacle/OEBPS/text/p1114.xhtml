<p class="chname">人馬宮</p>
<h2 class="pnum">1114</h2>

<p>　最初に入ってきたブロックにいる。</p>
<p>　南東の壁面に外部へつながる扉があるが、今は開かないようだった。</p>
<p>「施錠されているわけではない。これは仕掛けではなく、魔力での施錠だな。ここを牛耳るボスを倒すしかあるまいて」</p>
<p>「そうだね。どちらにせよ、そのつもりだ。先に進もう」</p>
<ul class="choices">
  <li>北東の壁面に設置された扉を抜けるなら<a href="p1113.xhtml">１１１３</a>へ進む。</li>
  <li>北西の壁面に設置された扉を抜けるなら<a href="p1115.xhtml">１１１５</a>へ進む。</li>
  <li>東の壁面に設置された扉を抜けるなら<a href="p1117.xhtml">１１１７</a>へ進む。</li>
  <li>西の壁面に設置された扉を抜けるなら<a href="p1119.xhtml">１１１９</a>へ進む。</li>
</ul>

</section>
