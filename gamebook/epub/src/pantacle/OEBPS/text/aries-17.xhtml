<p class="chname">白羊宮</p>
<h2 class="pname">海岸</h2>

<p>　黄色と青色と水色の３つのラインが層をなしていた。大地と、海と、空の色だ。大地は緑色の<a href="aries-03.xhtml">【草原】</a>へと繋がり、海の波は<a href="aries-18.xhtml">【海面】</a>をさざめかせ、空には<a href="aries-11.xhtml">【上空の風】</a>が旅していた。</p>
