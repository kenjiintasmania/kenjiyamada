<p class="chname">巨蟹宮</p>
<h2 class="pnum">628</h2>

<p>　ゲート越しに前後５ブロック繋がった小部屋の、後ろから２つめ（カニさん起立時、床から２つめ）の小部屋にいる。左側の壁には鉄製のハンドルが備え付けられている。</p>
<p>『予備停止装置』</p>
<p>ふむ。カニさんには、ぜひ停止してほしいところだが……</p>
<ul class="choices">
  <li>ハンドルを回してみるなら<a href="p602.xhtml">６０２</a>へ進む。</li>
  <li>前（旧天井側）へゲートを抜けるなら<a href="p624.xhtml">６２４</a>へ進む。</li>
  <li>後ろ（旧床側）へゲートを抜けるなら<a href="p626.xhtml">６２６</a>へ進む。</li>
</ul>

</section>
