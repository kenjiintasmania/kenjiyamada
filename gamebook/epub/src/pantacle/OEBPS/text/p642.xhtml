<p class="chname">巨蟹宮</p>
<h2 class="pnum">642</h2>

<p>　左右６ブロックの通路の右端にいる。真下に降りるゲートがあり、その先にもう１つ下へのゲートがつながっているのが見える。左１ブロック先にも下への穴が見える。また天井にもゲートが見える。</p>
<ul class="choices">
  <li>上に飛び上がるなら<a href="p643.xhtml">６４３</a>へ進む。</li>
  <li>下に１ブロック降りるなら<a href="p644.xhtml">６４４</a>へ進む。</li>
  <li>左へ１ブロック進むなら<a href="p634.xhtml">６３４</a>へ進む。</li>
</ul>

</section>
