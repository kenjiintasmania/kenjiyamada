<p class="chname">天蝎宮</p>
<h2 class="pnum">321</h2>

<p>　迷宮の北西の角にいる。東に８ブロックの長さの通路が続いており、南側には扉がついている。北西の角から例の骨が２本突き出ていて若干振動している。考えようによってはエモいか……いやいや、やっぱダメだ。</p>
<ul class="choices">
  <li>南の扉を入るなら<a href="p324.xhtml">３２４</a>へ進む。</li>
  <li>東へ歩くなら<a href="p323.xhtml">３２３</a>へ進む。</li>
</ul>
