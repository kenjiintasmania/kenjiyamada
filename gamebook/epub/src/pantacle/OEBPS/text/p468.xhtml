<p class="chname">宝瓶宮</p>
<h2 class="pnum">468</h2>

<p>　ぼくは通路の曲がり角にいる。</p>
<p>　北は１ブロック先で格子戸に、西は２ブロック先で南への曲がり角に行き当たる。</p>
<p>　空は相変わらず、どんよりしていた。</p>
<ul class="choices">
  <li>北へ進むなら<a href="p458.xhtml">４５８</a>へ進む。</li>
  <li>西へ進むなら<a href="p464.xhtml">４６４</a>へ進む。</li>
</ul>

</section>
