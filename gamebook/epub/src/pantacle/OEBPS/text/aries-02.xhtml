<section id="aries-02" class="paragraph">
<p class="chname">白羊宮</p>
<h2 class="pname">モヤ</h2>

<p>　ぼくはモヤの中に足を踏み入れた。</p>
<p>　まだまだ存在感は希薄だったが、なんとなく景色らしきものが浮かび上がってきた。</p>
<p>　最初に見えたのは正面の<a href="aries-03.xhtml">【草原】</a>で、緑色の丘に水色の空が乗っかっていた。</p>
<p>　次に見えたのは右手の<a href="aries-15.xhtml">【白滝】</a>で、茶色い岩肌に白い縦筋が走っていた。</p>
<p>　最後に見えたのは左手の<a href="aries-17.xhtml">【海岸】</a>で、黄色と青色と水色の３つのラインが層をなしていた。</p>

</section>
