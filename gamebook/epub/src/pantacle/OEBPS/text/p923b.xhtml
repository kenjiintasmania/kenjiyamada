<section id="p923b" class="paragraph">
<p class="chname">双児宮</p>
<h2 class="pnum">923ーＢ</h2>

<p>　夜風が頬を撫でた。</p>
<p>　空に朧月が見える。</p>
<p>　北に扉がある。</p>
<p>　西は２ブロック先で南に折れている。</p>
<p>　東には庭園が広がっている。</p>
<p>　夢でも見ているかのよいうな風景だ。</p>
<ul class="choices">
  <li>北の扉に入るなら<a href="p930.xhtml">９３０</a>へ進む。</li>
  <li>西へ２ブロック進むなら<a href="p940.xhtml">９４０</a>へ進む。</li>
  <li>東の庭園へ向かうなら<a href="p965.xhtml">９６５</a>へ進む。</li>
</ul>

</section>
