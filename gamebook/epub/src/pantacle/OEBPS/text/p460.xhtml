<p class="chname">宝瓶宮</p>
<h2 class="pnum">460</h2>

<p>　東西２ブロックの部屋にいる。西壁には２ブロック上に登るはしごが設置されており、東壁には何やら不思議な装置がついている。</p>
<p>　装置は石造りの天秤になっており、そばに１～９の数字が書かれた重りがわりの石片が設置されている。そばのプレートには『所定の数を加えよ』とある。</p>
<ul class="choices">
  <li>どうすべきか分かるなら、ここのパラグラフ番号（<a href="p460.xhtml">４６０</a>）から『所定の数』を加えたパラグラフへ進め。</li>
  <li>分からないなら、この先へは進めない。東のはしごからドドドという音の聞こえ始めた上階に戻ること。<a href="p447.xhtml">４４７</a>へ進め。</li>
</ul>

</section>
