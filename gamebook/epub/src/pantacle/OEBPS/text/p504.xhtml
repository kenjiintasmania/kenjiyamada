<p class="chname">白羊宮</p>
<h2 class="pnum">504</h2>

<p>　すべての気力を失って、ぼくは倒れた。しかし、しばらくして、ぼくは<a href="p001.xhtml">オフィユカス島の呪門</a>の前で目を覚ますことになる。</p>
<p>「メスロン、大丈夫ですか」</p>
<p>　巫女リオネが心配そうに、ぼくの目をのぞき込んでいた。すべて夢の中のことだったのだ。ぼくは生きている。生きているなら、何度でも再挑戦すればいいだけのことだ。ぼくは立ち上がった。</p>
<p>「次こそは……！」</p>
<ul class="choices">
  <li>白羊宮の呪門へ行くなら<a href="p510.xhtml">５１０</a>へ進め。</li>
  <li>いったん休息を取るなら<a href="p001.xhtml">オフィユカス島の【呪門】</a>へ進め。</li>
</ul>

</section>
