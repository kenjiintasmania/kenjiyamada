<p class="chname">天蝎宮</p>
<h2 class="pnum">333</h2>

<p>　ここは東西２ブロック×２ブロックの部屋で、作業机やら椅子やら巻物やらがいたるところに散乱している。迷宮が振動しているせいか、飛び散った書類もカサカサ揺れている。</p>
<p>――なるほど、設計室ね。</p>
<p>　見るべきものがあるのかどうかさえ判断できない荒れようだが、さて調べる意味があるのかどうか。</p>
<ul class="choices">
  <li>一番大きな作業机を漁るなら<a href="p331.xhtml">３３１</a>へ進む。</li>
  <li>小さな机を見るなら<a href="p337.xhtml">３３７</a>へ進む。</li>
  <li>床を漁るなら<a href="p339.xhtml">３３９</a>へ進む。</li>
  <li>部屋を出るなら<a href="p335.xhtml">３３５</a>へ進む。</li>
</ul>

</section>
