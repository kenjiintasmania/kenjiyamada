<p class="chname">獅子宮</p>
<h2 class="pnum">266</h2>

<p>　ぼくは南北３ブロックの長さの通路の北端にいる。道はここで行き止まりになっており、その北壁には『急がば回れ』と書いてある。なんて言い草だ。ぼくが道を間違ったみたいじゃないか。いや、実際そうなんだけど。</p>
<ul class="choices">
  <li>道を引き返すなら<a href="p286.xhtml">２８６</a>へ進む。</li>
  <li>パンタクルを使ってみてもいい。</li>
</ul>

<p class="branch">■それ以外　効果なし。南（<a href="p286.xhtml">２８６</a>）へ進む。</p>
