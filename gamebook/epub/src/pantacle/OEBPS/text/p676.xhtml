<p class="chname">巨蟹宮</p>
<h2 class="pnum">676</h2>

<p>　左右４ブロックの通路の左から２ブロック目にいる。道は前方（上方）と左へと続いている。右からは子ガニギャングが殺到してきている。２ブロックかけてＴ字路へ到達したぼくは、タイミングよく腹ばいになったカニさんに合わせて、前方（上方）でも左方でも進める。</p>
<ul class="choices">
  <li>前方（上方）に進むなら<a href="p678.xhtml">６７８</a>へ進む。</li>
  <li>左方に進むなら<a href="p681.xhtml">６８１</a>へ進む。</li>
</ul>
