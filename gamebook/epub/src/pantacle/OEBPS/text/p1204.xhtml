<p class="chname">双魚宮</p>
<h2 class="pnum">1204</h2>

<p>　すべての体力を失って、ぼくは倒れた。冒険はここで終わる。星読み表とカリスマ値を０に戻して、パラグラフ１からやりなおすこと。ただし、前作パンタクル２で経験記号「Ｍ」を記していた場合、<a href="p1206.xhtml">１２０６</a>へ進め。</p>
