<p class="chname">双児宮</p>
<h2 class="pnum">920ーＢ</h2>

<p>　曲がって２ブロック進んだところで道が前と右に分かれているＴ字路に来た。</p>
<p>　右の道は３ブロック先で右に折れていた。</p>
<ul class="choices">
  <li>まっすぐ進むなら<a href="p911.xhtml">９１１</a>へ進む。</li>
  <li>右へ３ブロック進むなら<a href="p915.xhtml">９１５</a>へ進む。</li>
  <li>後ろへ戻るなら<a href="p912.xhtml">９１２</a>へ進む。</li>
</ul>
