<section id="macro2-06" class="paragraph">
<p class="chname">マクロの街２</p>
<h2 class="pname">大通り東</h2>

<p>獣帯コンパスが【人馬－獅子】を示している。ぼくはマクロの街を東西につらぬく大通りの東側にある十字路に立っている。十字路を北に進めば蛇夫宮や呪門のある場所で、南に進めば大きな建物の並ぶ通りを進むことになる。東に少し行けば今は使われていない牢へと突き当たるが、西にはまだまだ大通りが続いている。この島にほとんど人の気配は感じられない。この街が再びひと気を取り戻す日は来るのだろうか。</p>
<ul class="choices">
  <li>北の<a href="macro2-01.xhtml">呪門</a>へ向かう</li>
  <li><a href="part-macro2.xhtml">南へと通りを進む</a></li>
  <li>東の牢に近づく</li>
  <li><a href="part-macro2.xhtml">大通りを西に向かう</a></li>
</ul>

</section>
