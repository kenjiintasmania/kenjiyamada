<p class="chname">双児宮</p>
<h2 class="pnum">944ーＢ</h2>

<p>　曲がり角にいる。</p>
<p>　東西２ブロックの西端、南北３ブロックの南端だ。</p>
<p>　通路はいよいよ暗く、東１ブロック先の行き止まりの様子さえ、あまりよく見えなかった。</p>
<ul class="choices">
  <li>北へ２ブロック進むなら<a href="p940.xhtml">９４０</a>へ進む。</li>
  <li>東へ１ブロック進むなら<a href="p949.xhtml">９４９</a>へ進む。</li>
</ul>
