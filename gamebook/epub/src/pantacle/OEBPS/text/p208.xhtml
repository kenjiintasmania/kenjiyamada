<p class="chname">獅子宮</p>
<h2 class="pnum">208</h2>

<p>　ぼくは窓からピラミッド周辺の風景を眺めた。</p>
<p>　オフィユカス島は群島の中心にあっていつも雨雲に覆われていたが、この獅子宮のある島は群島の外縁にあるのか比較的雲が薄く、ときおり太陽や星も見えるようだ。客間や天体観測にはいいかもしれないが、たとえばアゾットの玉座とかそういう風格までは備わっていない。</p>
<ul class="choices">
  <li>窓から体を乗り出すなら<a href="p256.xhtml">２５６</a>へ進む。</li>
  <li>円卓に近づくなら<a href="p206.xhtml">２０６</a>へ進む。</li>
  <li>階段を下りるなら<a href="p279.xhtml">２７９</a>へ進む。</li>
</ul>
