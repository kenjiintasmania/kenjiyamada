<p class="chname">巨蟹宮</p>
<h2 class="pnum">626</h2>

<p>　ゲート越しに前後５ブロック繋がった小部屋の、いちばん後ろにいる。カニさんが立ち上がったときに、最も下になる小部屋だ。最上階から垂直落下したら即死は間違いないだろう。先に続くゲートはなく、この部屋が行き止まりになっている。そんな位置の小部屋だからか、床には海のゴミが散乱していた。衣服、木材、道具類……ぜんぶ人間のせいじゃないか。カニさんが正気だった頃は、海の掃除屋として活躍していたのかもしれない。</p>
<p>　ここに見るべきものはない。</p>
<ul class="choices">
  <li>獅四肢で飛び上がって<a href="p628.xhtml">６２８</a>へ戻れ。</li>
</ul>
