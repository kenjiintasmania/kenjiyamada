<p class="chname">双児宮</p>
<h2 class="pnum">969</h2>

<p>　東西２ブロック×南北２ブロックの中部屋にいる。</p>
<p>　東壁の南寄りには扉がついており、廊下へとつながっている。その扉の横には、ちょっとしたカウンターが設置されており、店か宿のようにも見えた。</p>
<p>「豪華な寝台がありますね」</p>
<p>　リオネに言われて見渡すと、たしかに大きめの寝台が２つ、壁に寄せて設置されていた。</p>
<p>「だったら宿だな。客が２人だけで儲かるのかどうかは知らないけど」</p>
<ul class="choices">
  <li>寝台を調べるなら<a href="p961.xhtml">９６１</a>へ進む</li>
  <li>カウンターを調べるなら<a href="p963.xhtml">９６３</a>へ進む</li>
  <li>扉を出るなら<a href="p930.xhtml">９３０</a>へ進む</li>
</ul>

</section>
