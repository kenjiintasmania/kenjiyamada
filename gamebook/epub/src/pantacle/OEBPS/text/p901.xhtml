<p class="chname">双児宮</p>
<h2 class="pnum">901</h2>

<p>　双児宮へ向かうべく呪門の前に立つと、そばにリオネが近寄ってきた。</p>
<p>「少し……同行させていただいてよろしいでしょうか。学んだ白魔術がどのように使われているのか、この目で見たいのです」</p>
<p>　リオネは、左手につけた白魔術のパンタクルを右手でなぞった。すべての呪印がほんのりと光を帯びており、彼女がこのわずかな期間にこのぼくメスロンと同じレベルまで白魔術を習得したことがうかがえる。なるほど、断る理由はなさそうだ。</p>
<p>「どうぞ」</p>
<p>　ぼくらは双児宮の呪門まで転移した。</p>
<p>　星読み表の百の位が……</p>
<ul class="choices">
  <li>１か４か６か９なら<a href="p905.xhtml">９０５</a>へ進む</li>
  <li>それ以外なら<a href="p910.xhtml">９１０</a>へ進む。</li>
</ul>

</section>
