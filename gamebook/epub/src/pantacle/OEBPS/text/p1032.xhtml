<p class="chname">処女宮</p>
<h2 class="pnum">1032</h2>

<p>　少し歩いたところで曲がり角にたどり着いた。</p>
<p>「どうした、アバドン？」</p>
<p>「全部だな」</p>
<p>「はい？」</p>
<p>「全方位どこへ行っても、少ししたら曲がり角だ。自信を持って、そう宣言しよう」</p>
<p>「距離感にも自信を持てるようにしてほしいもんだよ」</p>
<ul class="choices">
  <li>通路は北（<a href="p1031.xhtml">一〇三一</a>）、南（<a href="p1033.xhtml">一〇三三</a>）、東（<a href="p1042.xhtml">一〇四二</a>）、西（<a href="p1012.xhtml">一〇一二</a>）に続いている。</li>
</ul>
