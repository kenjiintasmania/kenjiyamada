<p class="chname">人馬宮</p>
<h2 class="pnum">1186</h2>

<p>　ぼくは足を踏み出した。細くて不安感はあったが、確実に最上階へとぼくをいざなってくれた。</p>
<p>　天井に近づいたところで、鋼鉄製の蓋の蝶番を外す。とくに施錠されたりはしていなかった。</p>
<p>　痛い足のまま、じっとしているのはキツい。</p>
<p>　ぼくはすばやく蓋を押し開けて、上層へと上がった。</p>

  <li><a href="p1190.xhtml">１１９０</a>へ進む。</li>
