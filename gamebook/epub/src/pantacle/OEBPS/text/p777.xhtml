<p class="chname">天秤宮</p>
<h2 class="pnum">777</h2>

<p>　運命の天秤はぼくに傾き、運命の女神はぼくに微笑んだ。</p>
<p>　天才魔道士メスロンの勝利、というわけだ。</p>
<p>　帰り道、ドアのロックがすべて解除されていた。アティスの魔力によるものだったのだろう。</p>
<p>「そういえば、巫女はどこに囚われているのだろう」</p>
<p>　中央の螺旋階段を降りながら、ぼくは思った。</p>
<p>　もし囚われているとすれば……</p>
<ul class="choices">
  <li>天秤上の黒テミス像（鋼鉄の処女）の中だと思うなら<a href="p788.xhtml">７８８</a>へ進む。</li>
  <li>一階ホールの灰色テミス像の中だと思うなら<a href="p789.xhtml">７８９</a>へ進む。</li>
</ul>

</section>
