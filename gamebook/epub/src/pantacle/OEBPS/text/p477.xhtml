<p class="chname">宝瓶宮</p>
<h2 class="pnum">477</h2>

<p>　ゴトンと錠前が開いた。</p>
<p>「よし」</p>
<p>　天才魔道士にとって、謎掛けなどは朝飯前の農作業にもならないのだ。</p>
<p>　はたして扉の向こうには１ブロック四方の小部屋があり、床中央の螺旋階段から１ブロック下層へと降りられるようになっていた。</p>
<p>「あれっ？」</p>
<p>　ぼくは奇天烈な声を上げた。なんで下の階へ降りられるんだ？</p>
<ul class="choices">
  <li>ぼくは記憶（あるいは記録）してきたマップをよく確かめながら螺旋階段を降りていった。<a href="p471.xhtml">４７１</a>へ進め。</li>
</ul>

</section>
