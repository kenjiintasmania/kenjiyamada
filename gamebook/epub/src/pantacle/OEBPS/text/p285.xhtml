<p class="chname">獅子宮</p>
<h2 class="pnum">285</h2>

<pre class="grid">■□■</pre>
<pre class="grid">■□□</pre>
<pre class="grid">■■■</pre>
<p>　第５層の南西に位置する、３×３の合計９ブロックの大部屋にいる。北と東に進めるようになっているが、どの方向にも穴はないためスイッチでスライド移動することはできないようだ。また、北に道が続いているとはいえ、その向こう側の床に設置された壁が道を塞いでいるため、実質東に戻るしかない構造になっている。</p>
<p>――この空間、必要だったか？</p>
<ul class="choices">
  <li>ぼくは首を傾げながら、元いた東側の床石へと戻った。<a href="p281.xhtml">２８１</a>へ進む。</li>
</ul>
