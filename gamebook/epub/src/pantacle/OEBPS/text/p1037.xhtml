<p class="chname">処女宮</p>
<h2 class="pnum">1037</h2>

<p>　三叉路にいる。</p>
<p>「すぐに行き止まりが１つと、少し行って三叉路が２つだ」</p>
<p>「それで解説したつもりか、アバドン？」</p>
<ul class="choices">
  <li>通路は北（<a href="p1036.xhtml">一〇三六</a>）、南（<a href="p1038.xhtml">一〇三八</a>）、西（<a href="p1017.xhtml">一〇一七</a>）に続いている。</li>
</ul>
