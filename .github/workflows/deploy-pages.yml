name: Deploy to GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

# Pages へのデプロイに必要な権限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行は1つに（古い実行はキャンセルしない）
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        # enablement: true で Pages 未設定でも自動的に有効化する
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Build site directory
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.claude' \
            --exclude='node_modules' \
            --exclude='shots' \
            --exclude='tools' \
            --exclude='data/source' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='.gitignore' \
            --exclude='_site' \
            ./ _site/
          touch _site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
